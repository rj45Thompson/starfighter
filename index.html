// ===== A0: GROUNDED REASONING CHAIN — a 10-link TDRE-style chain-of-thought tracing the pilot's REAL decision =====
// Honest: every line reads real perceptions + the pilot's actual brain.mode/target (no fabrication; hold/abstain when uncertain).
// Structure mirrors the TDRE reasoning engine: parallel hypotheses (rays) → evidence → defeasible prune → verify → commit → predict/learn.
function reasonChain(s){ if(!s) return []; const b=s.brain||{}, sr=s.senseR||CFG.SENSE_R, dsort=(a,c)=>s.pos.distanceTo(a.pos)-s.pos.distanceTo(c.pos);
  const enemies=ships.filter(o=>o.alive&&o.team!==s.team&&s.pos.distanceTo(o.pos)<sr).sort(dsort);
  const allies=ships.filter(o=>o!==s&&o.alive&&o.team===s.team&&s.pos.distanceTo(o.pos)<sr);
  const rocks=asteroids.filter(a=>s.pos.distanceTo(a.pos)<sr).sort(dsort);
  const gm=gems.filter(g=>!g.artifact&&s.pos.distanceTo(g.pos)<sr).sort(dsort);
  const hpPct=Math.round(100*s.hp/Math.max(1,s.maxHp)), near=enemies[0], nd=near?Math.round(s.pos.distanceTo(near.pos)):null;
  const tgt=b.target, mode=b.mode||s.mode||'HOLD', c=b.ctrl||s.ctrl||{}, dot=b.dot||0;
  const ch=[];
  ch.push(`① perceive — sensor r${sr|0}: ${enemies.length} hostile · ${allies.length} ally · ${rocks.length} rock · ${gm.length} gem.`);
  ch.push(`② self — hull ${hpPct}% · ${s.credits|0}c · fuel ${(s.fuel||0)|0} · ${WEAPONS[s.weaponType||'energy'].n} W${s.lvl.weapon}.`);
  ch.push(`③ recall — ${s.foeNote?('logged: '+s.foeNote):(s.deaths?('lost hull '+s.deaths+'× here — stay wary.'):'no prior contacts on file.')}`);
  const H=[]; if(near) H.push('ENGAGE '+near.name); if(gm.length) H.push('COLLECT gem'); if(rocks.length) H.push('MINE rock'); if(hpPct<45) H.push('FLEE+regen'); if(s.role==='trader') H.push('TRADE'); if(!H.length) H.push('PATROL');
  ch.push(`④ hypotheses — ${H.length} rays: ${H.join(' · ')}.`);
  const evd=[]; if(near) evd.push(`${near.name}@${nd}u hull${Math.round(100*near.hp/Math.max(1,near.maxHp))}%`); if(gm.length) evd.push(`gem@${Math.round(s.pos.distanceTo(gm[0].pos))}u`); if(rocks.length) evd.push(`rock@${Math.round(s.pos.distanceTo(rocks[0].pos))}u`);
  ch.push(`⑤ evidence — ${evd.join(' · ')||'sector quiet'}.`);
  let prune='no contradiction — rays hold.';
  if(hpPct<45&&near) prune=`hull ${hpPct}%<45% ⟹ defeat ENGAGE (survive first).`;
  else if(near&&near.hp>s.hp*1.5) prune=`${near.name} out-hulls me ~${(near.hp/Math.max(1,s.hp)).toFixed(1)}× ⟹ defeat ENGAGE.`;
  else if(b.threat) prune='under fire ⟹ defeat MINE/COLLECT (cannot sit still).';
  else if(!enemies.length&&!gm.length&&!rocks.length) prune='nothing in range ⟹ defeat all but PATROL.';
  ch.push(`⑥ prune — ${prune}`);
  const tname = tgt ? (tgt.name || (mode==='MINE'?'ore rock':mode==='COLLECT'?'gem':'target')) : null;
  ch.push(`⑦ verify — ${tgt?`${tname} in reach${tgt.alive===false?' (already dead — drop!)':''}, align dot ${dot.toFixed(2)} (${dot>0.9?'on-target — act':'still turning in'}).`:`${mode} needs no lock; commit unconditionally.`}`);
  ch.push(`⑧ commit — <b>${mode}</b>${tname?(' → '+tname):''} — survives prune + verify, highest-value ray.`);
  ch.push(`⑨ act — throttle ${Math.round((c.thr||0)*100)}% · pitch ${Math.round((c.pitch||0)*90)}° · yaw ${Math.round((c.yaw||0)*90)}°.`);
  let pred; if(mode==='HUNT'&&near) pred=`close on ${near.name}; fire when dot>0.9; if it out-runs me, re-evaluate next tick.`;
  else if(mode==='MINE') pred='crack rock → gem → credits+heal; abort if a hostile enters half-sensor.';
  else if(mode==='FLEE'||mode==='EVADE') pred='break contact, regen toward 60%, then reassess the front.';
  else if(mode==='COLLECT') pred='scoop gem for credits/food before a rival reaches it.';
  else pred='hold value; watch for a higher-value ray as the board changes.';
  ch.push(`⑩ predict/learn — ${pred}`);
  return ch; }
function speakChain(s){ if(!s) return; const ch=reasonChain(s);   // A0: the pilot "speaks" its full reasoning chain to the radio log
  log('radio', `<div style="margin:3px 0;padding:4px 7px;border-left:2px solid #3a6ea5;background:rgba(28,48,78,.28);border-radius:3px"><b style="color:#9fe0ff">${s.name}</b> reasons —<br>${ch.join('<br>')}</div>`); }

// =================================================================================================
//  TALK TO A SHIP — grounded conversation over a LIVE per-ship vector-triple graph (NEVER fabricates).
//  Every triple is built from the ship's ACTUAL state: identity, status, its decision + a grounded reason,
//  and what it currently perceives (sensor range only). A turn = crush the concepts in your question ->
//  extrapolate multi-hop chains -> answer with the DEEPEST grounded chain, else ABSTAIN. (Port of converse_vec.js.)
// =================================================================================================
function shipKnowledge(s){ const G={T:[],bySubj:{},byObj:{}};
  const add=(a,r,o,p)=>{ if(a==null||o==null) return; const t={s:a,r,o,pillar:p||'status'}; G.T.push(t); (G.bySubj[a]=G.bySubj[a]||[]).push(t); (G.byObj[o]=G.byObj[o]||[]).push(t); };
  const me=s.name, b=s.brain||{}, sr=s.senseR||CFG.SENSE_R, dsort=(a,c)=>s.pos.distanceTo(a.pos)-s.pos.distanceTo(c.pos);
  add(me,'is a', HULLS[s.hullClass||'fighter'].n,'identity');                                   // IDENTITY (real)
  add(me,'serves', s.team==='pirate'?'the Hegemon':'the Coalition','identity');
  if(s.score!=null) add(me,'holds rank', rankOf(s.score||0).n,'identity');
  const hpPct=Math.round(100*s.hp/Math.max(1,s.maxHp));                                          // STATUS (real)
  add(me,'at hull', hpPct+'%','status'); add(me,'carries', (s.credits|0)+' credits','status');
  add(me,'armed with', WEAPONS[s.weaponType||'energy'].n,'status');
  const mode=b.mode||s.mode||'HOLD', tgt=b.target, tname=tgt?(tgt.name||(mode==='MINE'?'an ore rock':mode==='COLLECT'?'a gem':'its target')):null;
  add(me,'intends', mode,'decision'); if(tname && tname!=='its target') add(mode,'aimed at', tname,'decision');          // DECISION (real, from brain; skip the placeholder target)
  const enemies=ships.filter(o=>o.alive&&o.team!==s.team&&s.pos.distanceTo(o.pos)<sr).sort(dsort);
  const allies=ships.filter(o=>o!==s&&o.alive&&o.team===s.team&&s.pos.distanceTo(o.pos)<sr).sort(dsort);
  const gm=gems.filter(g=>!g.artifact&&s.pos.distanceTo(g.pos)<sr).sort(dsort);
  const rk=asteroids.filter(a=>s.pos.distanceTo(a.pos)<sr).sort(dsort);
  const pl=planets.filter(p=>s.pos.distanceTo(p.pos)<sr*1.4).sort(dsort);
  let reason;                                                                                    // GROUNDED reason for the mode
  if(hpPct<45&&enemies[0]) reason='hull is low, surviving comes first';
  else if(enemies[0]&&/HUNT|ENGAGE|ATTACK/.test(mode)) reason=enemies[0].name+' is the nearest threat in range';
  else if(mode==='MINE') reason='ore pays and the sector is calm enough to work';
  else if(mode==='COLLECT') reason='a gem is worth grabbing before a rival gets it';
  else if(/FLEE|EVADE/.test(mode)) reason='under pressure, breaking off to regen';
  else if(!enemies.length&&!gm.length&&!rk.length) reason='nothing in range, holding and watching';
  else reason='it is the highest-value option on the board right now';
  add(mode,'because', reason,'decision');
  if(enemies[0]){ const e=enemies[0]; add(me,'sees', e.name,'threat'); add(e.name,'is','a threat','threat'); add(e.name,'at range', Math.round(s.pos.distanceTo(e.pos))+'u','threat'); add(e.name,'at hull', Math.round(100*e.hp/Math.max(1,e.maxHp))+'%','threat'); }
  if(allies[0]){ const al=allies[0]; add(me,'sees', al.name,'ally'); add(al.name,'is','a wingman','ally'); add(al.name,'at range', Math.round(s.pos.distanceTo(al.pos))+'u','ally'); }
  if(gm[0]){ add(me,'sees','a gem','resource'); add('a gem','worth', (gm[0].credits|0)+' credits','resource'); add('a gem','at range', Math.round(s.pos.distanceTo(gm[0].pos))+'u','resource'); }
  if(rk[0]){ add(me,'sees','an ore rock','resource'); add('an ore rock','at range', Math.round(s.pos.distanceTo(rk[0].pos))+'u','resource'); }
  if(pl[0]){ const p=pl[0]; add(me,'near', p.name,'economy'); add(p.name,'is','a port','economy');
    let ck=null,cp=1e9; GOODS.forEach(g=>{ const pr=priceOf(p,g.k); if(pr<cp){cp=pr;ck=g;} }); if(ck) add(p.name,'sells cheap', ck.n+' at '+Math.round(cp)+'c','economy'); }
  return {G, ctx:{me,enemies,allies,gm,rk,pl,mode,tname,hpPct}}; }
// map a question to the pillar(s) it is really about (most-wanted first); [] = no strong intent -> deepest/most-diverse.
function tIntent(text){ const t=' '+text.toLowerCase().replace(/[^a-z0-9 ]/g,' ')+' ', has=(...ws)=>ws.some(w=>t.indexOf(' '+w+' ')>=0), P=[], add=(...ps)=>{ for(const p of ps) if(!P.includes(p)) P.push(p); };
  if(has('war','hegemon','front','escalation','invasion','campaign','offensive','stronghold')) add('war','threat');   // accumulate ALL topics (compound questions)
  if(has('danger','dangerous','threat','threats','hostile','hostiles','safe','risky','trouble','enemy','enemies','attack','attacking','fight','fighting','pirate','pirates','shoot','kill')) add('threat');
  if(has('doing','why','plan','plans','intent','intend','mission','task','objective','goal','strategy','orders','purpose','engaging')) add('decision');
  if(has('hull','health','hp','damage','damaged','hurt','wounded','shield','armor','armour','condition','ok','alive')) add('status');
  if(has('money','credits','credit','rich','cargo','wealth','cash','weapon','weapons','gun','guns','armed','arms','loadout','firepower','missile','laser','cannon')) add('status');
  if(has('ally','allies','friend','friends','friendlies','friendly','wingman','wingmen','buddies','squad','squadmate','help')) add('ally');
  if(has('gem','gems','loot','food','crystal','rock','rocks','ore','mine','mining','asteroid','asteroids','resource')) add('resource');
  if(has('rank','ranks','promotion','promoted','veteran','ace','legend','commander','recruit','ranger','rating')) add('identity','meta');
  if(has('contract','contracts','job','jobs','missions','bounty','work')) add('meta','economy');
  if(has('standing','reputation','faction','factions','coalition','territory','systems','system')) add('faction');
  if(has('planet','planets','port','dock','where','station','market','price','prices','sell','buy','trade','trading','nearest','profit','commodity','goods')) add('economy');
  if(has('who','yourself','identity','class','kind','name')) add('identity','status');
  if(has('story','backstory','history','origin','lore','background','bio','past','who','yourself','fight')) add('lore');
  return P; }

function tCrush(c,G){ return [...(G.bySubj[c]||[]), ...(G.byObj[c]||[])]; }
function tChains(c,depth,G,seen,path){ seen=seen||new Set([c]); path=path||[]; const out=[];
  for(const t of (G.bySubj[c]||[])){ const step={s:t.s,r:t.r,o:t.o,pillar:t.pillar}, np=[...path,step];
    out.push(np); if(depth>1 && !seen.has(t.o)){ const s2=new Set(seen); s2.add(t.o); for(const ch of tChains(t.o,depth-1,G,s2,np)) out.push(ch); } }
  return out; }
function gAdd(G,a,r,o,p){ if(a==null||o==null) return; if(G.T.some(t=>t.s===a&&t.r===r&&t.o===o)) return;   // append a triple (dedup)
  const t={s:a,r,o,pillar:p||'meta'}; G.T.push(t); (G.bySubj[a]=G.bySubj[a]||[]).push(t); (G.byObj[o]=G.byObj[o]||[]).push(t); }
// LAZY WORLD-LOAD ("the crusher"): for every noun/topic the statement mentions, pull everything GROUNDED about it from
// live game data into the graph, so the crush can find + speak it. Only real state -> still 0-fab. Perception stays
// honest: another ship's live hull/range is added only if within THIS pilot's sensor range, else "beyond my sensors".
function lazyWorld(question, focus, G){ const q=' '+String(question||'').toLowerCase().replace(/[^a-z0-9· \-]/g,' ').replace(/\s+/g,' ')+' ';
  const qt=q.trim().split(/\s+/), has=(...w)=>w.some(x=>qt.includes(x)), me=focus.name, sr=focus.senseR||CFG.SENSE_R, inRange=e=>focus.pos.distanceTo(e.pos)<sr;
  for(const o of ships){ if(!o.alive||o===focus) continue; const nm=o.name.toLowerCase(), seg=nm.split('·').pop();                 // NAMED SHIPS (token-exact, so "Halc" ⊄ "Halcyon")
    if(qt.includes(nm) || (seg&&seg.length>2&&qt.includes(seg))){ const foe=o.team!==focus.team;
      gAdd(G,o.name,'flies for', o.team==='pirate'?'the Hegemon':'the Coalition','faction');
      if(inRange(o)||o.role==='player'){ gAdd(G,me,'sees',o.name, foe?'threat':'ally'); gAdd(G,o.name,'is', foe?'a threat':'a wingman', foe?'threat':'ally');
        gAdd(G,o.name,'at range',Math.round(focus.pos.distanceTo(o.pos))+'u', foe?'threat':'ally'); gAdd(G,o.name,'at hull',Math.round(100*o.hp/Math.max(1,o.maxHp))+'%', foe?'threat':'ally'); }
      else gAdd(G,o.name,'is','beyond my sensors','faction'); } }
  for(const p of planets){ if(q.indexOf(' '+p.name.toLowerCase())<0) continue;                                                    // NAMED PLANETS
    gAdd(G,me,'near',p.name,'economy'); gAdd(G,p.name,'is','a '+p.type.t+' world','economy'); if(p.system) gAdd(G,p.name,'lies in',p.system.name,'economy'); gAdd(G,p.name,'worth',Math.round(p.wealth)+'c','economy');
    let ck=null,cp=1e9,dk=null,dp=-1; GOODS.forEach(g=>{const pr=priceOf(p,g.k); if(pr<cp){cp=pr;ck=g;} if(pr>dp){dp=pr;dk=g;}}); if(ck) gAdd(G,p.name,'sells cheap',ck.n+' at '+Math.round(cp)+'c','economy'); if(dk) gAdd(G,p.name,'pays most for',dk.n+' at '+Math.round(dp)+'c','economy');
    if(p.underThreat) gAdd(G,p.name,'is','under Hegemon threat','war'); if(p.rep!=null) gAdd(G,p.name,'standing',(p.rep>0?'+':'')+Math.round(p.rep),'faction'); }
  if(has('war','hegemon','front','escalation','invasion','campaign','battle','offensive','stronghold')){ const T=HEG_TIERS[hegTier()], cc=systems.filter(sy=>sy.contested).length;   // WAR
    gAdd(G,'the Hegemon','at escalation',Math.floor(escalation)+'','war'); gAdd(G,'the Hegemon','fields',T.n+'-class ships','war');
    gAdd(G,'the front','favors', (warScore>=0?'the Coalition':'the Hegemon')+' by '+Math.abs(warScore).toFixed(1)+' of '+CFG.WIN_THRESHOLD,'war');
    gAdd(G,'the war','has', cc+' of '+systems.length+' systems contested','war'); if(typeof stronghold!=='undefined'&&stronghold) gAdd(G,'the Hegemon','holds a stronghold in',stronghold.system?stronghold.system.name:'the front','war'); }
  if(has('rank','ranks','promotion','promoted','veteran','ace','legend','commander','recruit','ranger','rating')){ const i=rankIdx(focus.score||0), nx=RANKS[i+1];   // RANK
    gAdd(G,me,'holds rank',RANKS[i].n,'identity'); if(nx) gAdd(G,RANKS[i].n,'advances to',nx.n+' at '+nx.pts+' score','meta'); }
  if(has('weapon','weapons','gun','guns','loadout','missile','laser','cannon','armed','arms','firepower')){ const W=WEAPONS[focus.weaponType||'energy'];   // WEAPON
    gAdd(G,me,'armed with',W.n,'status'); gAdd(G,W.n,'deals',W.dmg+' damage'+(W.homing?', homing':'')+(W.splash?', splash':''),'status'); }
  if(has('contract','contracts','job','jobs','mission','missions','bounty','work')){ const act=contracts.filter(c=>c.accepted);   // CONTRACTS
    if(act.length) act.slice(0,2).forEach(c=>gAdd(G,'a contract','wants',c.desc+' for '+c.reward+'c','meta')); else if(contracts.length) gAdd(G,'the job board','offers',contracts.length+' open contracts','meta'); }
  if(has('market','price','prices','trade','trading','buy','sell','selling','profit','cargo','commodity','goods','ore','gas','crystal','alloy')){ const p=nearestPlanet(focus.pos);   // MARKET (no planet named)
    if(p){ let ck=null,cp=1e9; GOODS.forEach(g=>{const pr=priceOf(p,g.k); if(pr<cp){cp=pr;ck=g;}}); gAdd(G,me,'near',p.name,'economy'); if(ck) gAdd(G,p.name,'sells cheap',ck.n+' at '+Math.round(cp)+'c','economy'); } }
}
// BROAD CRUSH: match EVERY content noun in the statement against the graph (name / substring / name-token), then add
// intent seeds for pronoun/topic words that don't literally name a node. This is the "crush everything useful" behaviour.
function tConcepts(text,G,ctx){ const toks=(' '+text.toLowerCase()+' ').replace(/[^a-z0-9· \-]/g,' ').split(/\s+/).filter(Boolean), found=new Set();
  const nodes=[...new Set(Object.keys(G.bySubj).concat(Object.keys(G.byObj)))];
  const STOP=new Set(['you','the','are','and','what','how','why','who','was','has','its','for','can','did','does','your','with','this','that','they','them','out','get','got','any','all','about','think','tell','have','some','near','here','there','nearby','around','close','doing','right','now','anything','something','going','over','into','from','are','were']);
  for(const n of nodes){ const ln=n.toLowerCase(), nt=ln.split(/[ ·\-]+/).filter(Boolean);
    if(toks.some(w=> !STOP.has(w) && (ln===w || nt.includes(w) || (w.length>3&&ln.indexOf(w)>=0) || (w.length>3&&nt.some(x=>x.length>3&&(x.indexOf(w)>=0||w.indexOf(x)>=0)))))) found.add(n); }
  const intent=tIntent(text), me=ctx.me;
  if(intent.includes('decision')){ found.add(me); found.add(ctx.mode); }
  if(intent.includes('identity')||intent.includes('status')) found.add(me);
  if(intent.includes('threat')&&ctx.enemies[0]) found.add(ctx.enemies[0].name);
  if(intent.includes('ally')&&ctx.allies[0]) found.add(ctx.allies[0].name);
  if(intent.includes('resource')){ if(ctx.gm[0]) found.add('a gem'); if(ctx.rk[0]) found.add('an ore rock'); }
  if(intent.includes('economy')&&ctx.pl[0]) found.add(ctx.pl[0].name);
  if(intent.some(p=>['threat','ally','resource','economy','war','faction','meta'].includes(p))) found.add(me);   // seed ME so "sees/near" edges chain
  for(const p of intent){ if(['identity','status','decision'].includes(p)) continue; for(const t of G.T) if(t.pillar===p) found.add(t.s); }   // topic intent (war/faction/…) -> crush its whole subgraph
  return [...found]; }
function tVerbalize(chain){ if(!chain.length) return null; let s=chain[0].s; for(const st of chain) s+=` —${st.r}→ ${st.o}`; return s; }

// ---- STRUCTURAL RENDERER (AGI-honest, de-muppeted). Print the VERIFIED / GIVEN triples VERBATIM — no hand-authored
// per-relation prose, no word-swaps. The old fluent templates (MODE_VERB/headClause/tailFrag/fluentFacts) were a
// MUPPET (I hand-wrote the language, the agent learned nothing) — removed per AGI_CHAT_AUDIT.md. Fluent English, if ever
// wanted, must be a LEARNED renderer (bench + model behind a round-trip guard), never authored. Commas are generic glue.
function renderChain(chain){ if(!chain||!chain.length) return null; let s=String(chain[0].s); for(const st of chain) s+=` ${st.r} ${st.o}`; return s+'.'; }
function renderFacts(subj, facts){ if(!facts||!facts.length) return null; return `${subj}: `+facts.map(t=>`${t.r} ${t.o}`).join(', ')+'.'; }

function talkToShip(s, question){ if(!s||!s.alive){ term('no such pilot — try: scan, or click one in the roster','err'); return; }
  const {G,ctx}=shipKnowledge(s); lazyWorld(question, s, G);                              // CRUSH: lazy-load every mentioned noun's grounded knowledge
  const cs=tConcepts(question,G,ctx), intent=tIntent(question), q=(question||'').toLowerCase();
  term(`<b style="color:#8fd0ff">&gt; @${s.name}:</b> ${(question||'').replace(/</g,'&lt;')}`,'');
  const emit=(sentences, prov, tag)=>{ const line=sentences.join(' '); say(s, line); term(`<b>${s.name}</b> <span style="opacity:.55">(${tag})</span>: ${line}`,'sys');
    if(prov) term(`<span style="opacity:.45">&nbsp;&nbsp;↳ grounded in: ${prov.replace(/</g,'&lt;')}</span>`,''); };
  const named=c=>{ const cl=String(c).toLowerCase(); return q.indexOf(cl)>=0 || cl.split(/[ ·\-]+/).some(t=>t.length>3&&q.indexOf(t)>=0); };
  const base=ch=>ch.length + new Set(ch.map(x=>x.pillar)).size*0.3;
  const score=ch=>{ const pil=ch.map(x=>x.pillar); let r=0; intent.forEach((p,i)=>{ const w=(intent.length-i)*10; for(const pp of pil) if(pp===p) r+=w; }); return r + base(ch); };
  const guard=ch=>({ say: renderChain(ch), raw: tVerbalize(ch) });   // generic structure — no hand-authored words
  const answers=[], provs=[], used=new Set();
  // 0) LORE (GIVEN game flavor, labeled) — the ship's faction + original backstory. Not learned, not an AGI claim.
  if(intent.includes('lore') && s.backstory){ const fac = s.team==='pirate' ? 'the Iron Synod' : 'the Coalition Wardens';
    answers.push(`${s.name} of ${fac} — ${s.backstory}.`); provs.push('backstory (GIVEN game lore)'); }
  // 1) identity/status -> the ship's own GIVEN facts, rendered as structure
  if(intent.includes('identity')||intent.includes('status')){ const kind=intent.includes('identity')?'identity':'status', f=tCrush(s.name,G).filter(t=>t.s===s.name&&t.pillar===kind);
    if(f.length){ answers.push(renderFacts(s.name,f)); provs.push(f.map(t=>`${t.s} ${t.r} ${t.o}`).join('; ')); used.add(s.name); } }
  // 2) CRUSH candidates: a chain FROM ME per topic (decision/threat/economy…) + NAMED/TOPIC noun fact-lists, ranked together
  let all=[]; for(const c of cs) all=all.concat(tChains(c,5,G));
  const NAMES=[...ships.map(o=>o.name), ...planets.map(p=>p.name)].filter(n=>n!==s.name);
  const entKey=ch=>{ const f=new Set(); for(const st of ch) for(const x of [String(st.s),String(st.o)]) for(const nm of NAMES) if(x===nm||x.indexOf(nm)>=0) f.add(nm);   // a chain is ABOUT any ship/planet it names — even inside a reason string
    return f.size?[...f].sort().join('+'):ch[0].o; };   // (dedup tracking / hunting / reasoning-about the same foe into one answer)
  const anchorC=cs.filter(c=> c!==s.name && (G.bySubj[c]||[]).length && (named(c)|| /^the /.test(c))), anchorSet=new Set(anchorC), cand=[];
  const meBy=new Map();
  for(const ch of all){ if(ch[0].s!==s.name || ch.length<2 || ch.every(st=>st.pillar==='identity'||st.pillar==='status')) continue;
    if(ch.some(st=>anchorSet.has(st.o)||anchorSet.has(st.s))) continue;     // a named noun is spoken in full below, not as a thin me-chain
    if(intent.length && score(ch)<=base(ch)+0.001) continue;                // off-intent self-chain -> drop when a topic was asked
    const topic=entKey(ch), cur=meBy.get(topic); if(!cur||score(ch)>score(cur)) meBy.set(topic,ch); }
  for(const ch of meBy.values()){ const g=guard(ch); cand.push({say:g.say, prov:g.raw, sc:score(ch)}); }
  for(const c of anchorC){ if(used.has(c)) continue; used.add(c); const facts=(G.bySubj[c]||[]).slice(0,5);
    cand.push({say:renderFacts(c,facts), prov:facts.map(t=>`${t.s} ${t.r} ${t.o}`).join('; '), sc:(named(c)?100:0)+Math.max((G.bySubj[c]||[]).length, ...tChains(c,5,G).map(score))}); }   // an explicitly-named noun leads
  cand.sort((a,b)=>b.sc-a.sc);
  for(const k of cand){ if(answers.length>=3) break; if(k.say&&!answers.includes(k.say)){ answers.push(k.say); provs.push(k.prov); } }
  if(answers.length){ emit(answers, null, `grounded structure · ${answers.length} topic${answers.length>1?'s':''} (GIVEN game-state)`); return; }
  // 4) nothing crushed -> grounded sensor-negative for an empty perception query, else abstain
  const NEG={ threat:'No hostiles in sensor range right now.', ally:'No friendlies in sensor range.', resource:'No gems or ore in sensor range.', economy:'No port in range.' };
  const listOf={ threat:ctx.enemies, ally:ctx.allies, resource:ctx.gm.concat(ctx.rk), economy:ctx.pl };
  if(intent[0]&&NEG[intent[0]]&&!(listOf[intent[0]]&&listOf[intent[0]].length)){ emit([NEG[intent[0]]], null, 'grounded — sensor check'); return; }
  emit([`I only speak to what I actually know — my status, what I see, and what I'm doing. I've got nothing grounded on that.`], null, 'abstained — no fabrication'); }
function updateBrain(){ const s=ships[focus], b=s&&s.brain; if(activeTab==='thoughts') renderLog();   // A0: keep the live chain fresh
  if(!b) return; const mc=MODE_COL[b.mode]||'#7fb0d0';
  const fwd=FWD.clone().applyQuaternion(s.quat), right=RGT.clone().applyQuaternion(s.quat); let bi=0, selPos=null;
  const ents=[];   // the perceived knowledge graph: each entity a node, colored by relation
  const place=(p,col,sel,label)=>{ if(bi>=brainBlips.length) return; const blip=brainBlips[bi++]; const rel=p.clone().sub(s.pos);
    const fx=rel.dot(right), fz=rel.dot(fwd), dd=Math.hypot(fx,fz)||1, r=RR*clamp(rel.length()/CFG.SENSE_R,0.12,1);
    const px=RC.x+(fx/dd)*r, py=RC.y+(fz/dd)*r; blip.position.set(px,py,1); blip.material.color.set(col); blip.scale.setScalar(sel?13:8); blip.visible=true;
    if(sel) selPos={x:px,y:py}; ents.push({px,py,label,col,sel,d:rel.length()}); };
  for(const a of asteroids){ if(s.pos.distanceTo(a.pos)<CFG.SENSE_R) place(a.pos,'#8aa0b8',a===b.target,'rock'); }
  for(const g of gems){ if(s.pos.distanceTo(g.pos)<CFG.SENSE_R) place(g.pos,'#ffd24a',g===b.target,g.credits+'c'); }
  for(const o of ships){ if(o!==s && o.alive && s.pos.distanceTo(o.pos)<CFG.SENSE_R) place(o.pos, o.team!==s.team?'#ff5a5a':o.color.getStyle(), o===b.target, o.name); }
  for(const pl of planets){ if(s.pos.distanceTo(pl.pos)<CFG.SENSE_R*1.4) place(pl.pos, '#'+new T.Color(pl.type.col).getHexString(), false, pl.name); }
  for(let i=bi;i<brainBlips.length;i++) brainBlips[i].visible=false;
  ents.sort((x,y)=>(y.sel-x.sel)||(x.d-y.d));   // label the target + nearest few (readable when you zoom in)
  let li=0; for(const e of ents){ if(li>=brainEnts.length) break; if(!e.sel && li>=7) break; const L=brainEnts[li++]; L.set(e.label,e.sel?mc:e.col); L.sp.position.set(e.px,e.py+9,2); L.sp.visible=true; }
  for(let i=li;i<brainEnts.length;i++) brainEnts[i].sp.visible=false;
  if(selPos){ selRing.visible=true; selRing.position.set(selPos.x,selPos.y,1.1); selRing.material.color.set(mc);
    targetLine.line.visible=true; targetLine.set(RC.x,RC.y,selPos.x,selPos.y); targetLine.line.material.color.set(mc);
    seekEdge.line.visible=true; seekEdge.set(RC.x+RR*0.86,RC.y,330,322); seekEdge.line.material.color.set(mc); seekLabel.sp.visible=true; }
  else { selRing.visible=false; targetLine.line.visible=false; seekEdge.line.visible=false; seekLabel.sp.visible=false; }
  selfCard.set(s.name,s.color.getStyle()); intentCard.set(b.mode,mc); intentEdge.line.material.color.set(mc);
  tgtLabel.set(b.target?('target · '+(b.target.name?('rival '+b.target.name):(b.target.credits!=null?b.target.credits+'c gem':'rock'))):'no target');
  setGauge(gauges[0],b.ctrl.thr); setGauge(gauges[1],b.ctrl.pitch); setGauge(gauges[2],b.ctrl.yaw);
  engLabel.set('“'+s.lastLine+'”',mc);
}

function updateMarket(){ if(!marketOn||!planets.length) return;
  for(const g of GOODS) for(let pi=0;pi<planets.length;pi++){ const pr=priceOf(planets[pi],g.k), c=document.getElementById(`mk_${g.k}_${pi}`);
    if(c){ c.textContent=Math.round(pr); const rel=pr/g.base; c.style.color= rel<0.82?'#7dffa6':rel>1.25?'#ff8a8a':'#cfe2f5'; } }
  const wr=document.getElementById('mkt-war'); if(wr){ const nHeg=ships.filter(s=>s.alive&&s.team==='pirate').length, T=HEG_TIERS[hegTier()], cc=systems.filter(sy=>sy.contested).length;
    wr.innerHTML=`<b style="color:#ff6a6a">⚔ HEGEMON</b> esc ${Math.floor(escalation)} · <b>${T.n}</b>-class · ${nHeg}/${enemyCap()} hostile · `+systems.map(sy=>`${sy.name} <b style="color:${sy.contested?'#ff6a6a':'#7fdc8a'}">${sy.contested?'✖':'●'}</b>`).join(' ')+` · front <b style="color:${warScore<0?'#ff6a6a':'#7fdc8a'}">${warScore>=0?'+':''}${warScore.toFixed(1)}</b>/±${CFG.WIN_THRESHOLD} · camp ${campaign}`+(stronghold?` · <b style="color:#ff6a6a">☠STRONGHOLD ${Math.round(100*stronghold.hull/stronghold.maxHull)}%</b>`:''); }
  const pl=document.getElementById('mkt-planets'); if(pl) pl.innerHTML='PLANETS · '+planets.map(p=>`<b style="color:#${new T.Color(p.type.col).getHexString()}">${p.name}</b> Lv${p.dev} ${Math.round(p.wealth)}c${p.underThreat?' <span style="color:#ff5a6e">⚠</span>':''}`).join('  ·  ');
  const s=ships[focus], el=document.getElementById('mkt-ship'); if(s&&el){ const cg=Object.keys(s.cargo).map(k=>`${GKEY[k].n} ${s.cargo[k]}`).join(' · ')||'empty';
    el.innerHTML=`<b style="color:hsl(${s.hue*360},80%,68%)">${s.name}</b> · ${s.role} · <span style="color:#ffcf52">${s.credits}c</span> · fuel ${Math.round(s.fuel)}/${s.fuelCap||CFG.FUEL_CAP} · hold: ${cg}`; } }

// -------- NO-CHEAT economy self-check: prove prices are organic (buy raises, sell lowers, isolated drifts) --------
function economyIsOrganic(){ if(planets.length<1) return true; const p=planets[0], g='ore';
  const p0=priceOf(p,g); const probe={credits:1e6,cargo:{},fuel:0}; buy(probe,p,g,30); const pBuy=priceOf(p,g);   // buying drains stock -> price up
  probe.cargo[g]=(probe.cargo[g]||0)+60; sell(probe,p,g,60); const pSell=priceOf(p,g);                          // selling adds stock -> price down
  const ok = pBuy>p0+1e-6 && pSell<pBuy-1e-6;
  console.log(`[economy no-cheat] ore@${p.name}: base ${p0.toFixed(1)} -> +buy ${pBuy.toFixed(1)} -> +sell ${pSell.toFixed(1)}  organic=${ok}`);
  return ok; }

// =================================================================================================
//  VIEWPORTS + MAIN LOOP (one renderer, three scissored WebGL views)
// =================================================================================================
const VIEW={ main:{x:0,y:0,w:1,h:1}, top:{x:0,y:0,w:1,h:1}, brain:{x:0,y:0,w:1,h:1} };
let topZoom=1, topCenter=null;   // topCenter null = follow focused ship; else free-look
function sizeTopCam(){ updateTopCam(); }
function updateTopCam(){ const c=topCenter||(ships[focus]&&ships[focus].pos)||new T.Vector3();
  const aspect=(VIEW.top.w/VIEW.top.h)||1, hh=CFG.SYSTEM_R*1.35*topZoom, hw=hh*aspect;
  topCam.left=-hw; topCam.right=hw; topCam.top=hh; topCam.bottom=-hh; topCam.updateProjectionMatrix();
  topCam.position.set(c.x, CFG.ARENA_R, c.z); topCam.up.set(0,0,-1); topCam.lookAt(c.x,0,c.z); }
let brainZoom=1, brainCenter={x:300,y:235};
function sizeBrainCam(vw,vh){ vw=vw||VIEW.brain.w||1; vh=vh||VIEW.brain.h||1; const va=vw/vh, ca=600/470; let hw,hh;
  if(va>ca){ hh=235*brainZoom; hw=hh*va; } else { hw=300*brainZoom; hh=hw/va; }
  brainCam.left=-hw; brainCam.right=hw; brainCam.top=hh; brainCam.bottom=-hh; brainCam.position.set(brainCenter.x,brainCenter.y,50); brainCam.lookAt(brainCenter.x,brainCenter.y,0); brainCam.updateProjectionMatrix(); }
const IS_TOUCH = matchMedia('(pointer:coarse)').matches || ('ontouchstart' in window);
let soloView = IS_TOUCH ? 'main' : null;   // MOBILE: one full-screen view at a time (toggled by the VIEW button)
if(IS_TOUCH && document.body) document.body.classList.add('touch');
function resize(){ const W=innerW(), H=innerH(); renderer.setSize(W,H);
  const rw=Math.round(clamp(W*CFG.RIGHT_FRAC,CFG.RIGHT_MIN,CFG.RIGHT_MAX)), mw=W-rw, hh=Math.round(H/2);
  VIEW.main={x:0,y:0,w:mw,h:H}; VIEW.top={x:mw,y:hh,w:rw,h:H-hh}; VIEW.brain={x:mw,y:0,w:rw,h:hh};
  chaseCam.aspect=mw/H; chaseCam.updateProjectionMatrix(); sizeTopCam(rw,H-hh); sizeBrainCam(rw,hh);
  const lt=document.getElementById('lblTop'), lb=document.getElementById('lblBrain'), vd=document.getElementById('vdiv'), hd=document.getElementById('hdiv');
  lt.style.left=(mw+12)+'px'; lt.style.top='10px'; lb.style.left=(mw+12)+'px'; lb.style.top=(hh+10)+'px';
  vd.style.left=mw+'px'; vd.style.top='0'; vd.style.width='1px'; vd.style.height=H+'px';
  hd.style.left=mw+'px'; hd.style.top=hh+'px'; hd.style.width=rw+'px'; hd.style.height='1px';
  document.getElementById('chat').style.width=Math.max(240,mw-28)+'px';
  document.getElementById('market').style.left=(mw*0.5)+'px';
  if(soloView){ const full={x:0,y:0,w:W,h:H}, z={x:0,y:0,w:0,h:0};   // MOBILE: render only the active view, full-screen
    VIEW.main = soloView==='main'?full:z; VIEW.top = soloView==='top'?full:z; VIEW.brain = soloView==='brain'?full:z;
    if(soloView==='main'){ chaseCam.aspect=W/H; chaseCam.updateProjectionMatrix(); } else if(soloView==='top'){ sizeTopCam(W,H); } else { sizeBrainCam(W,H); }
    document.getElementById('chat').style.width=(W-16)+'px';
    const lt=document.getElementById('lblTop'), lb=document.getElementById('lblBrain');
    lt.style.display=soloView==='top'?'block':'none'; lb.style.display=soloView==='brain'?'block':'none';
    lt.style.left='10px'; lt.style.top='34px'; lb.style.left='10px'; lb.style.top='34px';
    document.getElementById('vdiv').style.display='none'; document.getElementById('hdiv').style.display='none'; } }
function renderView(r,sc,cam){ if(r.w<=0||r.h<=0) return; renderer.setViewport(r.x,r.y,r.w,r.h); renderer.setScissor(r.x,r.y,r.w,r.h); renderer.render(sc,cam); }
function renderAll(){ renderer.setScissorTest(true); renderView(VIEW.main,scene,chaseCam); renderView(VIEW.top,scene,topCam); renderView(VIEW.brain,brainScene,brainCam); renderer.setScissorTest(false); }

makePlanets();
makeBase();   // M8: the Ranger Command hub
for(let i=0;i<CFG.NSHIPS;i++) makeShip(i);
(function(){ const P=ships[0]; P.role='player'; P.name='YOU'; P.obj=null; P.docked=null; P.credits=320; P.fuel=CFG.FUEL_CAP; P.contraband={}; P.backstory='the newest Warden on the roster, still earning your wings against the Iron Synod'; applyHull(P,'fighter'); })();   // M9: player starts in a Fighter hull
for(let i=0;i<CFG.AST_KEEP;i++) spawnAtShell();
buildSpeech(); buildBlips(); buildBrain(); buildRoster(); buildMarket(); buildTabs(); economyIsOrganic();
term("<b style='color:#8fd0ff'>STARFIGHTER terminal online.</b> Fly <b>YOU</b>: <b>W</b> thrust · <b>A/D</b> turn · <b>↑/↓</b> pitch · <b>Space</b> fire (on a phone use the on-screen <b>stick</b> + <b>THR</b>/<b>FIRE</b>). Type <b>help</b>; order the AI squadron in plain English. <b>Dock/trade:</b> tap a planet or ⌂ base in the TOP-DOWN view (or the <b>DOCK</b> button) to fly there &amp; auto-dock, then <b>market</b> / <b>buy ore 10</b> / <b>sell</b>.","sys");
term("Factions: <b style='color:#46d6ff'>◈ Coalition Wardens</b> (you) vs <b style='color:#ff5a6e'>✖ the Iron Synod</b> (Hegemon). Tap a roster pilot for its backstory. <span style='opacity:.6'>(lore = GIVEN flavor)</span>","sys");
document.getElementById('lblBrain').textContent='REASONING · '+ships[0].name;
resize(); addEventListener('resize',resize);
// ---- MANUAL FLIGHT: you pilot YOU (ships[0]); keyboard + on-screen touch controls OVERRIDE the AI. It latches on
//      first input and releases when you issue an autopilot order (go/dock/mine/attack/…). See step() manualControl. ----
const MAN={ thr:0, pitch:0, yaw:0, fire:false, active:false };
function manOn(){ MAN.active=true; if(focus!==0){ focus=0; buildRoster(); document.getElementById('lblBrain').textContent='REASONING · '+ships[0].name; } }
function manualControl(s,dt){ s.obj=null; s.cmd=null; s.mode='MANUAL'; s.target=null;
  s.ctrl={ thr:clamp(MAN.thr,0,1), pitch:clamp(MAN.pitch,-1,1), yaw:clamp(MAN.yaw,-1,1) };
  s.fire-=dt;
  if(MAN.fire && s.fire<=0){ const W=WEAPONS[s.weaponType||'energy']||WEAPONS.energy;
    s.fire=W.cd/((1+CFG.WEAPON_FIRE*(s.lvl.weapon-1))*(1+(s.artFire||0)));
    const base=W.dmg*(1+CFG.WEAPON_DMG*(s.lvl.weapon-1)), spec={ dmg:base, col:W.col, speed:W.speed, life:W.life, r:W.r, homing:W.homing, splash:W.splash, target:null };
    const fwd=FWD.clone().applyQuaternion(s.quat), side=RGT.clone().applyQuaternion(s.quat).multiplyScalar(CFG.MUZZLE_OFF);
    if(W.twin){ spawnBullet(_v2.copy(s.pos).add(side).addScaledVector(fwd,2),fwd,s.id,spec); spawnBullet(_v2.copy(s.pos).sub(side).addScaledVector(fwd,2),fwd,s.id,spec); }
    else spawnBullet(_v2.copy(s.pos).addScaledVector(fwd,2.2),fwd,s.id,spec); }
  s.brain={ mode:'MANUAL', target:null, dot:0, ctrl:s.ctrl, threat:false }; }
const keysDown=new Set();
function applyKeys(){ MAN.thr=keysDown.has('KeyW')?1:0;
  MAN.yaw=(keysDown.has('KeyD')||keysDown.has('ArrowRight')?1:0)-(keysDown.has('KeyA')||keysDown.has('ArrowLeft')?1:0);
  MAN.pitch=(keysDown.has('ArrowDown')||keysDown.has('KeyS')?1:0)-(keysDown.has('ArrowUp')?1:0);
  MAN.fire=keysDown.has('Space');
  if(MAN.thr||MAN.yaw||MAN.pitch||MAN.fire) manOn(); }
addEventListener('keydown',e=>{ if(document.activeElement&&document.activeElement.id==='chat') return;
  if(e.code==='Tab'){ e.preventDefault(); focus=(focus+1)%CFG.NSHIPS; buildRoster(); document.getElementById('lblBrain').textContent='REASONING · '+ships[focus].name; return; }
  if(e.code==='KeyM'){ marketOn=!marketOn; document.getElementById('market').style.display=marketOn?'block':'none'; if(marketOn) updateMarket(); return; }
  if(e.code==='Backquote'){ document.getElementById('ticker').classList.toggle('big'); return; }
  if(['KeyW','KeyA','KeyS','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)){ e.preventDefault(); keysDown.add(e.code); applyKeys(); } });
addEventListener('keyup',e=>{ if(keysDown.delete(e.code)) applyKeys(); });
// on-screen touch flight controls (multi-touch: steer + thrust + fire at once)
(function(){ const stick=document.getElementById('stick'), knob=document.getElementById('knob'), thb=document.getElementById('btnThr'), fb=document.getElementById('btnFire'); if(!stick) return; const R=46; let sid=null;
  const set=t=>{ const r=stick.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2; let dx=t.clientX-cx, dy=t.clientY-cy; const d=Math.hypot(dx,dy)||1; if(d>R){ dx*=R/d; dy*=R/d; } knob.style.transform=`translate(${dx}px,${dy}px)`; MAN.yaw=clamp(dx/R,-1,1); MAN.pitch=clamp(dy/R,-1,1); manOn(); };
  stick.addEventListener('touchstart',e=>{ e.preventDefault(); sid=e.changedTouches[0].identifier; set(e.changedTouches[0]); },{passive:false});
  stick.addEventListener('touchmove',e=>{ e.preventDefault(); for(const t of e.changedTouches) if(t.identifier===sid) set(t); },{passive:false});
  const send=e=>{ for(const t of e.changedTouches) if(t.identifier===sid){ sid=null; MAN.yaw=0; MAN.pitch=0; knob.style.transform='translate(0,0)'; } };
  stick.addEventListener('touchend',send); stick.addEventListener('touchcancel',send);
  const hold=(el,on)=>{ if(!el) return; el.addEventListener('touchstart',e=>{ e.preventDefault(); on(true); manOn(); },{passive:false}); const o=e=>{ e.preventDefault(); on(false); }; el.addEventListener('touchend',o); el.addEventListener('touchcancel',o); };
  hold(thb,v=>MAN.thr=v?1:0); hold(fb,v=>MAN.fire=v); })();
const chatEl=document.getElementById('chat'); const cmdHist=[]; let histIdx=-1;
chatEl.addEventListener('keydown',e=>{ e.stopPropagation();
  if(e.key==='Enter'){ const v=chatEl.value.trim(); chatEl.value=''; if(v){ cmdHist.push(v); if(cmdHist.length>60) cmdHist.shift(); } histIdx=-1; if(activeTab!=='terminal'){ activeTab='terminal'; buildTabs(); } runCmd(v); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); if(cmdHist.length){ histIdx=Math.min(histIdx+1,cmdHist.length-1); chatEl.value=cmdHist[cmdHist.length-1-histIdx]; } }
  else if(e.key==='ArrowDown'){ e.preventDefault(); if(histIdx>0){ histIdx--; chatEl.value=cmdHist[cmdHist.length-1-histIdx]; } else { histIdx=-1; chatEl.value=''; } }
  else if(e.key==='Escape'){ chatEl.blur(); } });

// ---- interactive TOP-DOWN + REASONING views: wheel=zoom, drag=pan, click=inspect (top-down), dbl-click=reset ----
const canvas=renderer.domElement;
function viewAt(mx,my){ if(soloView) return soloView; const H=innerH(); const inR=v=> mx>=v.x && mx<v.x+v.w && my>=(H-(v.y+v.h)) && my<(H-v.y);
  if(inR(VIEW.top)) return 'top'; if(inR(VIEW.brain)) return 'brain'; return 'main'; }
function topWorldAt(mx,my){ const H=innerH(), v=VIEW.top; const lx=(mx-v.x)/v.w*2-1, ly=-(((my-(H-(v.y+v.h)))/v.h)*2-1); return new T.Vector3(lx,ly,-1).unproject(topCam); }
let drag=null;
canvas.addEventListener('wheel',e=>{ const vp=viewAt(e.clientX,e.clientY);
  if(vp==='top'){ e.preventDefault(); topZoom=clamp(topZoom*(e.deltaY>0?1.12:0.89),0.22,7); }
  else if(vp==='brain'){ e.preventDefault(); brainZoom=clamp(brainZoom*(e.deltaY>0?1.12:0.89),0.4,4.5); sizeBrainCam(); } },{passive:false});
canvas.addEventListener('mousedown',e=>{ const vp=viewAt(e.clientX,e.clientY); if(vp==='top'||vp==='brain') drag={vp,x0:e.clientX,y0:e.clientY,mx:e.clientX,my:e.clientY,moved:0}; });
window.addEventListener('mousemove',e=>{ if(!drag) return; const dx=e.clientX-drag.mx, dy=e.clientY-drag.my; drag.mx=e.clientX; drag.my=e.clientY; drag.moved+=Math.abs(dx)+Math.abs(dy);
  if(drag.vp==='top'){ topCenter=topCenter||(ships[focus]?ships[focus].pos.clone():new T.Vector3()); const wpp=(topCam.right-topCam.left)/VIEW.top.w; topCenter.x-=dx*wpp; topCenter.z-=dy*wpp; }
  else if(drag.vp==='brain'){ const wpp=(brainCam.right-brainCam.left)/VIEW.brain.w; brainCenter.x-=dx*wpp; brainCenter.y+=dy*wpp; sizeBrainCam(); } });
window.addEventListener('mouseup',()=>{ if(drag){ if(drag.moved<5 && drag.vp==='top') topClick(drag.x0,drag.y0); drag=null; } });
canvas.addEventListener('dblclick',e=>{ const vp=viewAt(e.clientX,e.clientY);
  if(vp==='top'){ topCenter=null; topZoom=1; } else if(vp==='brain'){ brainZoom=1; brainCenter={x:300,y:235}; sizeBrainCam(); } });
// ---- ANDROID / TOUCH: view toggle + pilot cycle + market + log buttons; tap-select, one-finger pan, two-finger pinch ----
(function(){ const $=id=>document.getElementById(id);
  const vb=$('tbView'); if(vb) vb.onclick=()=>{ const seq=['main','top','brain']; soloView=seq[(seq.indexOf(soloView)+1)%3]; resize(); term('view: '+({main:'CHASE CAM',top:'TOP-DOWN (tap a ship to focus)',brain:'REASONING'}[soloView]),'sys'); };
  const db=$('tbDock'); if(db) db.onclick=()=>{ const P=ships[0]; MAN.active=false; const np=nearestPlanet(P.pos); const dB=base?P.pos.distanceTo(base.pos):1e9, dP=np?P.pos.distanceTo(np.pos):1e9;   // travel to & auto-dock the nearest port/base
    if(base && dB<=dP){ P.obj={type:'goto',planet:{pos:base.pos.clone(),name:'Ranger Command',_base:true}}; term('⌂ course set for Ranger Command.','sys'); }
    else if(np){ P.obj={type:'goto',planet:np}; term('Course set for '+np.name+' — auto-docking.','sys'); } };
  const pb=$('tbPilot'); if(pb) pb.onclick=()=>{ focus=(focus+1)%CFG.NSHIPS; buildRoster(); $('lblBrain').textContent='REASONING · '+ships[focus].name; };
  const mb=$('tbMkt'); if(mb) mb.onclick=()=>{ marketOn=!marketOn; $('market').style.display=marketOn?'block':'none'; if(marketOn) updateMarket(); };
  const lb=$('tbLog'); if(lb) lb.onclick=()=>{ $('ticker').classList.toggle('big'); };
  let td=null, pinchD=0;
  canvas.addEventListener('touchstart',e=>{ if(e.touches.length===1){ const t=e.touches[0], vp=viewAt(t.clientX,t.clientY);
      if(vp==='top'||vp==='brain'){ e.preventDefault(); td={vp,x0:t.clientX,y0:t.clientY,mx:t.clientX,my:t.clientY,moved:0}; } }
    else if(e.touches.length===2){ e.preventDefault(); const a=e.touches[0],b=e.touches[1]; pinchD=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY); td=null; } },{passive:false});
  canvas.addEventListener('touchmove',e=>{ if(e.touches.length===2){ e.preventDefault(); const a=e.touches[0],b=e.touches[1], d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
      if(pinchD>0){ const r=d/pinchD, vp=viewAt((a.clientX+b.clientX)/2,(a.clientY+b.clientY)/2);
        if(vp==='top') topZoom=clamp(topZoom/r,0.22,7); else if(vp==='brain'){ brainZoom=clamp(brainZoom/r,0.4,4.5); sizeBrainCam(); } } pinchD=d; }
    else if(td&&e.touches.length===1){ e.preventDefault(); const t=e.touches[0], dx=t.clientX-td.mx, dy=t.clientY-td.my; td.mx=t.clientX; td.my=t.clientY; td.moved+=Math.abs(dx)+Math.abs(dy);
      if(td.vp==='top'){ topCenter=topCenter||(ships[focus]?ships[focus].pos.clone():new T.Vector3()); const wpp=(topCam.right-topCam.left)/VIEW.top.w; topCenter.x-=dx*wpp; topCenter.z-=dy*wpp; }
      else { const wpp=(brainCam.right-brainCam.left)/VIEW.brain.w; brainCenter.x-=dx*wpp; brainCenter.y+=dy*wpp; sizeBrainCam(); } } },{passive:false});
  canvas.addEventListener('touchend',e=>{ if(td){ if(td.moved<9 && td.vp==='top') topClick(td.x0,td.y0); td=null; } if(e.touches.length<2) pinchD=0; },{passive:false});
})();
function topClick(mx,my){ const w=topWorldAt(mx,my), wpp=(topCam.right-topCam.left)/VIEW.top.w, thr=16*wpp; let best=null,bd=1e9,kind=null;
  for(const p of planets){ const d=Math.hypot(w.x-p.pos.x,w.z-p.pos.z); if(d<p.radius*(p.mesh.scale.x||1)+thr && d<bd){ bd=d; best=p; kind='planet'; } }
  if(base){ const d=Math.hypot(w.x-base.pos.x,w.z-base.pos.z); if(d<CFG.BASE_R+thr && d<bd){ bd=d; best=base; kind='base'; } }
  for(const s of ships){ if(!s.alive) continue; const d=Math.hypot(w.x-s.pos.x,w.z-s.pos.z); if(d<thr+6 && d<bd){ bd=d; best=s; kind='ship'; } }
  if(!best){ return; }
  const P=ships[0];
  if(kind==='planet'){ if(typeof MAN!=='undefined') MAN.active=false; P.obj={type:'goto',planet:best};   // TAP TO TRAVEL + auto-dock
    term(`<b>${best.name}</b> · ${best.type.t} Lv${best.dev} · ${Math.round(best.wealth)}c · rep ${best.rep>0?'+':''}${Math.round(best.rep)} — course set, auto-docking (then: market · buy · sell).`,'sys'); }
  else if(kind==='base'){ if(typeof MAN!=='undefined') MAN.active=false; P.obj={type:'goto',planet:{pos:base.pos.clone(),name:'Ranger Command',_base:true}};
    term('⌂ <b>Ranger Command</b> — course set; on arrival: base · hull &lt;class&gt; · blackmarket · repair.','sys'); }
  else { const idx=ships.indexOf(best); if(idx>=0 && idx<CFG.NSHIPS){ focus=idx; buildRoster(); document.getElementById('lblBrain').textContent='REASONING · '+best.name; }
    term(`<b>${best.name}</b> · ${best.role} · ${best.mode} · hull ${Math.round(best.hp)} · ${best.credits}c${idx<CFG.NSHIPS?' · now focused':''}`,'sys'); } }

let last=performance.now(), mktAcc=0;
function frame(now){ let dt=(now-last)/1000; last=now; if(!(dt>=0)||dt>0.05) dt=0.05; T0+=dt;
  step(dt); updateCamera(dt); updateTopCam(); updateSpeech(dt); updateBlips(); updateBrain();
  renderAll(); updateRoster();
  mktAcc+=dt; if(mktAcc>0.25){ mktAcc=0; updateMarket(); }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
