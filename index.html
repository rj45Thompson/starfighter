"use strict";
// =================================================================================================
//  STARFIGHTER · AI SQUADRON - three views, ALL in WebGL (one renderer, three scissored viewports):
//    LEFT  : 3D chase camera following the focused pilot.
//    R-TOP : orthographic TOP-DOWN tactical view of the whole arena (see who contests what).
//    R-BTM : the focused pilot's live REASONING GRAPH (a three.js scene - no laggy 2D canvas).
//  Pilots are AI agents: fly via (throttle,pitch,yaw) in full 3D, SPEAK ENGLISH (3D bubbles over each
//  ship + a ticker), and CHOOSE their own upgrades. Ported Unity Starfighter2 rules + reused art.
//  No magic numbers (CFG). r128 THREE, vendored. Pillars: EMBODIMENT/NAVIGATION/COMMUNICATION/ECONOMY.
// =================================================================================================
const T = THREE;
// CRASH TRAP (2026-07-10, user "game crashed when I killed an enemy" - unreproducible headless): any uncaught
// error or promise rejection paints a visible red banner naming file:line AND persists to localStorage
// SF_LAST_ERROR_v1, so the next crash hands us an exact stack instead of a silent frozen canvas. Diagnostic
// only - never swallows the error (the console still gets it), never alters game state.
(function(){ function report(kind,msg,src,line,col,stack){
    try{ localStorage.setItem('SF_LAST_ERROR_v1', JSON.stringify({kind,msg:String(msg),src:String(src||''),line:line||0,col:col||0,stack:String(stack||'').slice(0,2000),at:new Date().toISOString(),build:'20260710q'})); }catch(e){}
    try{ let el=document.getElementById('sfCrashBanner');

// ---------------------------------------------------------------- PERIPHERAL LENS (wide-fov render -> edge-warp)
// Render the chase view at CFG.PERIPH_WIDE x the base fov into an offscreen buffer, then draw that buffer through a
// warp: the center CFG.PERIPH_CENTER stays perfectly rectilinear (1:1), and each outer strip smoothly compresses
// the extra world-angle so the SIDES come into view when you turn hard. The remap is C1-continuous at the seam
// (matched slope), so there is no visible break between the clear centre and the curved edges.
const PERIPH = (function(){
  let rt=null, rtW=0, rtH=0;
  const quadScene=new T.Scene();
  const mat=new T.ShaderMaterial({
    uniforms:{ tDiffuse:{value:null}, uCenter:{value:0.58}, uZoom:{value:0.48}, uSlope:{value:0.6}, uEdgeTint:{value:0.22}, uVig:{value:0.5} },
    depthTest:false, depthWrite:false,
    vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position.xy,0.0,1.0); }`,
    fragmentShader:`precision highp float; varying vec2 vUv; uniform sampler2D tDiffuse;
      uniform float uCenter, uZoom, uSlope, uEdgeTint, uVig;
      // abs-coord a in 0..1 -> source-sample coord 0..1. Center is linear (a/uCenter*uZoom); the outer strip uses a
      // quadratic f(p)=uSlope*p+(1-uSlope)*p^2 with f(0)=0, f'(0)=uSlope (matched to the centre slope for C1), f(1)=1.
      float remap(float a){ if(a<=uCenter) return (a/uCenter)*uZoom;
        float p=(a-uCenter)/(1.0-uCenter); float f=uSlope*p+(1.0-uSlope)*p*p; return uZoom+f*(1.0-uZoom); }
      void main(){ vec2 c=vUv*2.0-1.0; float su=sign(c.x)*remap(abs(c.x)), sv=sign(c.y)*remap(abs(c.y));
        vec2 uv=vec2(su,sv)*0.5+0.5; vec4 col=texture2D(tDiffuse,uv);
        // how deep into the warped peripheral strip this pixel is (0 in the sharp centre -> 1 at the extreme edge)
        float e=max(smoothstep(uCenter,1.0,abs(c.x)), smoothstep(uCenter,1.0,abs(c.y)));
        col.rgb=mix(col.rgb, col.rgb*vec3(0.80,0.90,1.10), e*uEdgeTint);   // cool "wide-angle glass" tint
        col.rgb*=(1.0 - uVig*e*e);                                          // edge vignette so the lens zone READS even over empty starfield
        gl_FragColor=col; } `
  });
  const quad=new T.Mesh(new T.PlaneGeometry(2,2), mat); quad.frustumCulled=false; quadScene.add(quad);
  const quadCam=new T.Camera();
  function recompute(){ const wide=Math.max(1.01, CFG.PERIPH_WIDE); const zoom=1/wide;
    const ctr=Math.min(0.95, Math.max(0.2, CFG.PERIPH_CENTER));
    mat.uniforms.uCenter.value=ctr; mat.uniforms.uZoom.value=zoom;
    if(CFG.PERIPH_VIGNETTE!=null) mat.uniforms.uVig.value=CFG.PERIPH_VIGNETTE;
    // matched-slope for C1 continuity at the seam: center slope = zoom/ctr; edge slope f'(0) makes them equal
    mat.uniforms.uSlope.value=(zoom*(1.0-ctr))/(ctr*(1.0-zoom)); }
  recompute();
  function ensureRT(w,h){ const dpr=Math.min(devicePixelRatio||1, CFG.PERIPH_DPR);
    const pw=Math.max(2,Math.round(w*dpr)), ph=Math.max(2,Math.round(h*dpr));
    if(!rt){ rt=new T.WebGLRenderTarget(pw,ph,{minFilter:T.LinearFilter,magFilter:T.LinearFilter,format:T.RGBAFormat}); rtW=pw; rtH=ph; }
    else if(pw!==rtW||ph!==rtH){ rt.setSize(pw,ph); rtW=pw; rtH=ph; } }
  // render the main chase view WARPED into rect r (viewport coords). Temporarily widens chaseCam's fov for the
  // offscreen pass, then restores it (nothing else in the frame reads fov between here and the restore).
  function renderInto(r){ if(!CFG.PERIPH_ON||r.w<=0||r.h<=0) return false;
    ensureRT(r.w,r.h);
    const wide=Math.max(1.01, CFG.PERIPH_WIDE);
    const wideFov=2*Math.atan(wide*Math.tan(CHASE_FOV_BASE*Math.PI/360))*180/Math.PI;
    chaseCam.aspect=r.w/r.h; chaseCam.fov=wideFov; chaseCam.updateProjectionMatrix();
    const prevRT=renderer.getRenderTarget();
    renderer.setViewport(0,0,rtW,rtH); renderer.setScissor(0,0,rtW,rtH);
    renderer.setRenderTarget(rt); renderer.render(scene,chaseCam); renderer.setRenderTarget(prevRT);
    chaseCam.fov=CHASE_FOV_BASE; chaseCam.updateProjectionMatrix();          // restore rectilinear fov
    mat.uniforms.tDiffuse.value=rt.texture;
    renderer.setViewport(r.x,r.y,r.w,r.h); renderer.setScissor(r.x,r.y,r.w,r.h); renderer.render(quadScene,quadCam);
    return true; }
  return { renderInto, recompute, mat,
    set(k,v){ if(k==='wide') CFG.PERIPH_WIDE=Math.max(1.0,v); else if(k==='center') CFG.PERIPH_CENTER=v; else if(k==='tint') mat.uniforms.uEdgeTint.value=v; else if(k==='vignette') CFG.PERIPH_VIGNETTE=Math.max(0,v); else if(k==='on') CFG.PERIPH_ON=!!v; recompute(); },
    toggle(){ CFG.PERIPH_ON=!CFG.PERIPH_ON; return CFG.PERIPH_ON; } };
})();

function fighterMesh(hue){
  const S=1.55;
  const v=[ 0,0,-2.6, 0,0.55,0, 0,-0.5,0.2, -2,0,1, 2,0,1, 0,0,1.5, 0,1.05,1.2 ].map(x=>x*S);

  const g=new T.BufferGeometry(); g.setAttribute('position',new T.Float32BufferAttribute(v,3)); g.setIndex(f); g.computeVertexNormals();
  const uv=[]; for(let k=0;k<v.length;k+=3){ uv.push(0.5+v[k]/(4*S*1.25), 0.5+v[k+2]/(4*S*1.25)); }   // planar UVs so the hull texture maps
  g.setAttribute('uv', new T.Float32BufferAttribute(uv,2));
  const col=new T.Color().setHSL(hue,0.75,0.56);
  const body=new T.Mesh(g,new T.MeshStandardMaterial({color:col,map:HULL,emissive:col.clone().multiplyScalar(0.14),roughness:0.5,metalness:0.6,flatShading:true,side:T.DoubleSide}));
  const grp=new T.Group(); grp.add(body);
  const cock=new T.Mesh(new T.SphereGeometry(0.4,10,10),new T.MeshStandardMaterial({color:0xbfefff,emissive:0x66ccff,emissiveIntensity:0.8,roughness:0.2}));
  cock.position.set(0,0.28,-0.9*S); grp.add(cock);

  eng.scale.set(1.7,1.7,1); eng.position.set(0,0,2.0*S); grp.add(eng); grp.userData.eng=eng;
  return grp;
}

// =================================================================================================
//  REAL UNITY ASSETS (user 2026-07-07: "bring in all models and assets from the starfighter game").
//  The original Starfighter2 FBX models load IN THE BROWSER via three's FBXLoader (vendored, r128):
//  vehicle_playerShip (the orange Warden hull) · vehicle_enemyShip (Synod, red/purple) · Spaceship
//  (freighter) · 6 asteroid + 3 gem shapes. A LoadingManager URL-modifier redirects the FBX's baked
//  Unity .tif texture paths onto our PIL-converted PNGs (assets/*.png) - no 404 spam, real skins.
//  EVERYTHING falls back to the procedural meshes if a file is missing: the game never breaks.
// =================================================================================================
const ASSET_CFG={ DIR:'assets/', SHIP_LEN:6.0, SHIP_YAW:Math.PI, ENG_Z:0.46,   // nose→-Z (Unity fwd is +Z), length-normalized; engine glow at the tail
  GEM_SIZE:3.0, AST_UNIT:1.0, TRADER_LEN:6.6, PIRATE_LEN:6.4,
  VIS_SCALE:{scout:0.8,fighter:1.0,interceptor:1.05,freighter:1.5,cruiser:1.62,dreadnought:1.95,capital:2.6} };  // hull-class silhouette scale (2026-07-07: existing 6 already read scout<fighter/interceptor<freighter/cruiser<dreadnought - kept as-is; capital added noticeably larger than dreadnought)
const ASSETS={ ready:false, ships:{}, astGeos:[], gemGeos:[] };
const TEX_MAP=[ ['playership_orange_dff','playerShip_dff.png'], ['playership_orange_nrm','playerShip_nrm.png'],
  ['enemyship_red_dff','enemyShip_red_dff.png'], ['enemyship_purple_dff','enemyShip_purple_dff.png'],
  ['enemyship_nrm','enemyShip_nrm.png'], ['flyerplayershipalbedo','spaceship_dff.png'], ['emission','spaceship_emm.png'] ];
const PIXEL_URI='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==';
function assetURL(url){ const u=String(url).toLowerCase().replace(/\\/g,'/');
  for(const [pat,file] of TEX_MAP) if(u.includes(pat)) return ASSET_CFG.DIR+file;
  if(/\.(tif|tga|psd|bmp)$/.test(u)) return PIXEL_URI;                          // unmapped Unity refs → 1px, never 404
  if(!u||/(^|\/)(undefined|null)$/.test(u)) return PIXEL_URI;                   // a NAMELESS Unity texture ref serialized as 'undefined' (arrives here already path-prefixed, e.g. 'assets/undefined') → was a 404 every boot
  return url; }
// CRASH FIX (2026-07-10, caught by the SF_LAST_ERROR_v1 trap: "Cannot read properties of undefined (reading
// 'search')" in three.min.js): FBXLoader passes a NAMELESS texture ref to T.TextureLoader.load as LITERAL
// undefined; three r128's success callback then runs t.search(...) on that undefined and throws (async, so the
// game kept running). Coerce nullish URLs to the STRING 'undefined' at the API boundary: (1) t.search now works
// (it's a string) so no crash, and (2) it flows through the SAME path three would build for a real nameless ref -
// this.path + 'undefined' = 'assets/undefined' -> the assetURL modifier above already maps that to PIXEL_URI, the
// ORIGINAL working path. (An earlier version coerced to PIXEL_URI directly, but three prepends this.path AFTER
// this wrapper, producing 'assets/data:...' -> 404 -> stalled the FBX LoadingManager -> ships lost their models.)
(function(){ const _load=T.TextureLoader.prototype.load;
  T.TextureLoader.prototype.load=function(url,onLoad,onProgress,onError){ return _load.call(this, url==null?'undefined':url, onLoad, onProgress, onError); }; })();
// BUG FIX (user report "player ship appears black"): the old Unity FBX files never had their textures actually
// EMBEDDED - Unity assigns materials via separate .mat files outside the mesh, so FBXLoader hands back a
// MeshPhongMaterial whose `map` slot is a Texture object with NO `.image` ever resolved. A material that
// declares a map but never uploads one samples pure black in the shader - hence the silhouette rendering solid
// black regardless of the URL-modifier above (confirmed: zero PNG fetches ever fired for the ship materials).
// Fix: load OUR OWN textures directly and force-assign them after the FBX loads, instead of trusting its baked
// material. flipY=false matches how three.js's own FBXLoader treats FBX-sourced UVs.
const SHIP_TEX_LOADER=new T.TextureLoader();
function shipTex(file){ const t=SHIP_TEX_LOADER.load(ASSET_CFG.DIR+file); t.flipY=false; t.encoding=T.sRGBEncoding; t.wrapS=t.wrapT=T.RepeatWrapping; return t; }
const SHIP_TEX={ player:shipTex('playerShip_dff.png'), playerNrm:shipTex('playerShip_nrm.png'),
  enemyRed:shipTex('enemyShip_red_dff.png'), enemyPurple:shipTex('enemyShip_purple_dff.png'), enemyNrm:shipTex('enemyShip_nrm.png') };
function fixShipMaterial(o, map, nrm, tintHex){
  const ms=Array.isArray(o.material)?o.material:[o.material];
  for(let i=0;i<ms.length;i++){ const m=ms[i]=ms[i].clone();
    m.map=map; if(nrm && 'normalMap' in m) m.normalMap=nrm; m.color.set(0xffffff); if(tintHex!=null) m.color.lerp(new T.Color(tintHex),0.35);
    if('emissive' in m) m.emissive=new T.Color(tintHex!=null?tintHex:0x000000).multiplyScalar(tintHex!=null?0.22:0);
    m.needsUpdate=true; if(Array.isArray(o.material)) o.material[i]=m; else o.material=m; } }
function normalizeModel(grp,targetLen){ const box=new T.Box3().setFromObject(grp), size=box.getSize(new T.Vector3()), c=box.getCenter(new T.Vector3());
  const len=Math.max(size.x,size.y,size.z)||1, k=targetLen/len;
  const inner=new T.Group(); inner.add(grp); grp.position.sub(c);              // recenter…
  inner.scale.setScalar(k); inner.rotation.y=ASSET_CFG.SHIP_YAW;              // …resize, nose to -Z
  const wrap=new T.Group(); wrap.add(inner); return wrap; }
function firstGeo(grp){ let g=null; grp.traverse(o=>{ if(!g&&o.isMesh&&o.geometry) g=o.geometry; }); return g?g.clone():null; }
function normGeo(geo,target){ geo.computeBoundingBox(); const s=geo.boundingBox.getSize(new T.Vector3());
  const k=target/(Math.max(s.x,s.y,s.z)||1); const c=geo.boundingBox.getCenter(new T.Vector3());

function applyShipModel(s){

  // missing the models"): the FBX pack only ever offered ONE generic shape per team (shipModelKey returns just
  // 'enemy'/'trader'/'player'), scaled by VIS_SCALE - so a Scout and a Capital looked IDENTICAL except for size,
  // and buying a new hull class produced no visible change beyond a size bump. hullmodels.js's 7 procedural
  // per-class silhouettes were built with exactly this integration in mind (its own docblock: "INTEGRATION
  // CONTRACT (matches starfighter.html fighterMesh)") but were only ever wired into the scan badge, never the
  // live flight mesh. Now the primary path for non-pirate ships (player + squad, the only ones with a hullClass).
  // PROCEDURAL HULL ROSTER: a generated hull (e.g. 'orrun_lancer') has no dedicated 3D silhouette - it declares
  // which of the 7 hand-authored archetypes to render as via HULLS[key].visualClass. Original 7 hulls have no
  // such field, so `visKey` naturally falls back to the hull's own key - zero behavior change for them.
  const visKey=(HULLS[s.hullClass]&&HULLS[s.hullClass].visualClass)||s.hullClass;

  }

    grp=base.clone(true);                                                  // clone shares geometry; clone materials only where tinted
    if(isPirate){ const HT=HEG_TIERS[Math.min(s.tier||0,HEG_TIERS.length-1)];
      const rMap=(s.id%2===0)?SHIP_TEX.enemyRed:SHIP_TEX.enemyPurple;             // alternate skins for visual variety across the Synod fleet
      grp.traverse(o=>{ if(o.isMesh) fixShipMaterial(o, rMap, SHIP_TEX.enemyNrm, HT.col); });

      if(visKey && ASSET_CFG.VIS_SCALE[visKey]) grp.scale.setScalar(ASSET_CFG.VIS_SCALE[visKey]); }

//  power-plant pool split across WEAPONS/ENGINES/SHIELDS (each 0-100, always summing to CFG.POWER_TOTAL);

function shipPower(s){ if(!s.power) s.power={weapons:CFG.POWER_DEFAULT,engines:CFG.POWER_DEFAULT,shields:CFG.POWER_DEFAULT}; return s.power; }

function setPower(s, sys, target){   // reroute: set ONE system, the other two absorb the difference proportionally (never silently gain/lose total power)
  if(POWER_SYS.indexOf(sys)<0) return shipPower(s);

  if(otherSum<=0.001){ P[others[0]]=remain/2; P[others[1]]=remain/2; }
  else{ P[others[0]]=clamp(remain*(P[others[0]]/otherSum),CFG.POWER_MIN,CFG.POWER_MAX); P[others[1]]=clamp(remain*(P[others[1]]/otherSum),CFG.POWER_MIN,CFG.POWER_MAX); }

  // set s.docked, unlike the planet branch below it. The HANGAR tab still rendered fine (its hull/gear SECTIONS
  // gate on the separate, purely distance-based atBase() check) but EVERY loadout-mutation terminal command -
  // engbay/loadout, hardpoint mount/unmount, gizmo mount/unmount, tank/radar/scanner/shieldgen/droid/hook/series -
  // gates on `dockedP=P.docked`, which stayed null forever while docked at Ranger Command specifically (planets
  // never had this bug - their branch already set it). Silent no-op, not a crash, so it read as "didn't work."
  if(isBase){ s.docked=p; s.obj=null; s.vel.set(0,0,0); if(s.role==='player'&&window.KPLAN) KPLAN.observe('dock:'+p.name); dockMenu(p,true); return {mode:'HOLD',aimDir:FWD.clone().applyQuaternion(s.quat),ease:0.15}; }   // kill residual velocity so a fast approach can't coast back OUT of the (now-tighter) atBase() radius while the loadout screen is open
  if(p.rep<=CFG.REP_HOSTILE && !p.isPirateStation){ s.obj=null; s.docked=null; term(`${p.name} is HOSTILE - docking refused, defenders inbound.`,'err'); return {mode:'FLEE',aimDir:_v.copy(s.pos).sub(p.pos).clone(),ease:1}; }   // a pirate station's whole business model is welcoming ships everyone else refuses - see makePirateStation()
  if(s.role==='player'){ _v.copy(s.pos).sub(p.pos); if(_v.lengthSq()<1e-6) _v.set(1,0,0); _v.normalize();   // direction FIRST (before s.pos is overwritten - eval-order aliasing)
    s.pos.copy(p.pos).addScaledVector(_v, (p.radius||0)+CFG.DOCK_R*0.8); s.vel.set(0,0,0); }   // DOCK ASSIST: snap to just outside the planet body on the ring + kill velocity so a knock under fire can't bounce you back out
  s.docked=p; s.obj=null; contractDeliver(p);
  if(s.role==='player') recordObservedPrices(p);   // SR-M7: the moment of docking is a real observation, whether or not the market panel happens to be open

  if(s.role==='player' && contraCount(s)>0 && !p.isPirateStation && rand(0,1)<CFG.SCAN_CHANCE) scanBust(s,p);   // M10: coalition customs - exempted at the pirate station (2026-07-08 fix), same "everyone else's rules don't apply here" logic as the hostile-docking exemption above - a customs scan at the ONE place that exists to fence contraband was backwards
  // SR-M9 TEXT QUESTS (REQUIREMENTS_SR.md, "SR2's signature feature"): a chance to offer a branching quest on
  // every player dock at a non-base world - only fires if nothing is already active (tryOffer no-ops otherwise).

  // not one render-tick stale.
  let questOffer=null;
  if(s.role==='player'&&window.TEXTQUESTS) questOffer=TEXTQUESTS.tryOffer(p);
  dockMenu(p,false);
  if(s.role==='player'){ if(window.KPLAN) KPLAN.observe('dock:'+p.name); if(window.PANELS) PANELS.open('market'); else { marketOn=true; const mk=document.getElementById('market'); if(mk){ mk.style.display='block'; updateMarket(); } } if(window.PASSENGER){ PASSENGER.onEvent('docked'); if(window.GAMEMOD) GAMEMOD.emit('docked'); } if(window.CHATTER) CHATTER.onEvent('docked',{place:p.name}); }   // auto-open the market on docking (discoverable on phone)
  if(s.role==='player' && !p._base){ const bt=baseTypeOf(p); if(bt!=='general'){ const bs=BASE_SPECIALTY[bt]; term(`${bs.icon} <b>${bs.n}</b> - ${bs.blurb}.`,'sys'); } }   // SR BASE TYPES: announce a specialist port's identity on dock (general ports stay quiet)
  if(questOffer) term(`<b style="color:#c9a0ff">📜 ${questOffer.title}</b> - ${questOffer.text}<br>`+questOffer.choices.map(c=>`  <b>[${c.n}]</b> ${c.label}`).join('<br>')+`<br><span style="opacity:.65">type <b>choose &lt;n&gt;</b>, or open the QUESTS tab</span>`,'sys');
  return {mode:'HOLD',aimDir:FWD.clone().applyQuaternion(s.quat),ease:0.15};
}
function contraCount(s){ let n=0; for(const k in (s.contraband||{})) n+=s.contraband[k]||0; return n; }
function scanBust(s,p){ let val=0; for(const k in s.contraband) val+=CONTRABAND[k].base*s.contraband[k]; const fine=Math.round(val*CFG.SCAN_FINE*(1-CFG.SKILL_CHARISMA_FINE*skillLvl(s,'charisma')));   // M10: caught smuggling; SR-M17: charisma talks the fine down
  s.contraband={}; s.credits=Math.max(0,s.credits-fine); repAdd(p,-CFG.REP_BOMB*2); notify(`⚠ CUSTOMS SCAN at ${p.name} - contraband seized, fined ${fine}c, standing dropped.`,'flag'); }
// M11: RANDOM ENCOUNTERS (derelict/cache/distress) + galaxy NEWS events that shock the (organic) economy
const encounters=[]; let encounterCd=8, newsCd=16;
// derelict = a dead ship hulk, not a rock: a scorched, lopsided wreck welded from a few boxes/wedges so it
// reads as "something blew a chunk out of this" rather than a clean primitive. Dark charcoal hull + the
// game's existing scorch/impact orange (0xff9a52, see burst() calls above) picking out the torn edges.
function derelictHulkMesh(){
  const grp=new T.Group();
  const hullCol=0x2b2e33, hullColB=0x24262a, scorchCol=0xff9a52, rustCol=0x8a5a3a;
  const hullMat=(c)=>new T.MeshStandardMaterial({color:c,emissive:0x0a0806,roughness:0.9,metalness:0.35,flatShading:true});
  // main body: two unequal-length tapered boxes offset from each other so the hull reads bent/asymmetric,
  // not a single clean box - like the midsection buckled.
  const fore=new T.Mesh(new T.BoxGeometry(1.7,1.35,2.6), hullMat(hullCol)); fore.position.set(0.15,0.05,-0.7); fore.rotation.z=0.09; grp.add(fore);
  const aft=new T.Mesh(new T.BoxGeometry(1.3,1.05,2.0), hullMat(hullColB)); aft.position.set(-0.2,-0.1,1.5); aft.rotation.z=-0.14; aft.rotation.y=0.1; grp.add(aft);
  // angled nose wedge, canted off-axis (looks torn/knocked crooked rather than a symmetric prow)
  const nose=new T.Mesh(new T.ConeGeometry(0.95,1.8,4), hullMat(hullCol)); nose.position.set(0.05,0.15,-2.15); nose.rotation.x=-Math.PI/2; nose.rotation.z=0.5; grp.add(nose);
  // a chunk blown out of one flank: an inverted dark wedge biting into the fore hull, rimmed with scorch below
  const wound=new T.Mesh(new T.ConeGeometry(0.7,1.0,3), hullMat(0x17181a)); wound.position.set(0.9,0.35,-0.9); wound.rotation.z=Math.PI*0.6; wound.rotation.x=0.4; grp.add(wound);
  const scorchRing=new T.Mesh(new T.TorusGeometry(0.55,0.11,6,10), new T.MeshStandardMaterial({color:scorchCol,emissive:scorchCol,emissiveIntensity:0.85,roughness:0.6,metalness:0.1}));
  scorchRing.position.copy(wound.position); scorchRing.rotation.set(0.3,0.6,0.2); grp.add(scorchRing);
  // greebles: a couple of small broken antenna/strut stubs and a snapped engine nub, jutting at odd angles
  const strutMat=hullMat(rustCol);
  const strut1=new T.Mesh(new T.BoxGeometry(0.12,0.12,0.9), strutMat); strut1.position.set(-0.75,0.55,-0.2); strut1.rotation.set(0.6,0.3,0.9); grp.add(strut1);
  const strut2=new T.Mesh(new T.BoxGeometry(0.16,0.16,0.6), strutMat); strut2.position.set(0.55,-0.6,0.6); strut2.rotation.set(-0.4,0.8,0.2); grp.add(strut2);
  const engineNub=new T.Mesh(new T.CylinderGeometry(0.4,0.5,0.7,8), hullMat(hullColB)); engineNub.position.set(-0.15,-0.05,2.6); engineNub.rotation.x=Math.PI/2; grp.add(engineNub);
  // dying engine flicker: a dim guttering glow instead of the game's usual bright thruster sprite
  const emberMat=new T.SpriteMaterial({map:GLOW,color:scorchCol,blending:T.AdditiveBlending,transparent:true,opacity:0.5,depthWrite:false});
  const ember=new T.Sprite(emberMat); ember.scale.set(1.1,1.1,1); ember.position.set(-0.15,-0.05,3.05); grp.add(ember);
  grp.userData.ember=ember; grp.userData.emberT=rand(0,6.28);
  grp.scale.setScalar(1.15);
  return grp; }
function spawnEncounter(){ if(encounters.length>=CFG.MAX_ENCOUNTERS||!systems.length) return;
  const r=rand(0,1), kind=r<0.4?'derelict':(r<0.7?'cache':'distress'), sy=systems[randi(0,systems.length-1)];
  const pos=sy.center.clone().add(new T.Vector3(rand(-1,1),rand(-0.4,0.4),rand(-1,1)).setLength(rand(CFG.SYSTEM_R*0.5,CFG.SYSTEM_R*0.95)));
  const col=kind==='distress'?0xff9a52:kind==='cache'?0xffcf52:0x9fb0c0;
  const m=kind==='derelict'?derelictHulkMesh():new T.Mesh(kind==='cache'?new T.BoxGeometry(4,4,4):new T.IcosahedronGeometry(3.6,0), new T.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.55,metalness:0.5,roughness:0.5})); m.position.copy(pos); scene.add(m);
  const lab=spriteText('✦ '+kind,24,'#eaf2ff',{bg:'rgba(9,16,28,0.6)',pad:6,r:6,align:'center',ws:0.07}); lab.sp.position.copy(pos); lab.sp.position.y+=7; lab.sp.renderOrder=9; scene.add(lab.sp);
  const e={ kind, pos, mesh:m, label:lab, blip:topBlip('#'+new T.Color(col).getHexString(),10,1), age:0 }; e.blip.position.copy(pos); encounters.push(e);
  ev(`A <b>${kind}</b> signal appears in ${sy.name}.`); }
function removeEncounter(i){ const e=encounters[i]; scene.remove(e.mesh); if(e.label) scene.remove(e.label.sp); if(e.blip) scene.remove(e.blip); encounters.splice(i,1); }
function resolveEncounter(e){ const P=ships[0];
  if(P) P.discoveries=(P.discoveries||0)+1;   // SR-M20: campaign-end score formula names "discoveries" as a component - a derelict/cache/distress signal resolved IS a discovery
  if(e.kind==='derelict'){ const c=randi(30,90); P.credits+=c; if(rand(0,1)<0.4) spawnArtifactDrop(e.pos,ARTIFACT_KEYS[randi(0,ARTIFACT_KEYS.length-1)]); notify(`Salvaged a derelict: +${c}c.`,'log'); }
  else if(e.kind==='cache'){ const c=randi(60,170); P.credits+=c; notify(`Cracked a treasure cache: +${c}c!`,'log'); }
  else { const c=randi(40,110); P.credits+=c; const np=nearestPlanet(e.pos); if(np) repAdd(np,CFG.REP_TERRA); P.score+=2; checkRankUp(P); notify(`Answered a distress call - rescued the crew: +${c}c, +standing.`,'log'); } }
function encounterTick(dt){ encounterCd-=dt; if(encounterCd<=0){ encounterCd=CFG.ENCOUNTER_CD; spawnEncounter(); }
  const P=ships[0]; for(let i=encounters.length-1;i>=0;i--){ const e=encounters[i]; e.age+=dt; e.mesh.rotation.y+=dt*1.2; e.mesh.rotation.x+=dt*0.6; e.blip.position.copy(e.pos);
    if(e.kind==='derelict' && e.mesh.userData.ember){ e.mesh.userData.emberT+=dt*3; e.mesh.userData.ember.material.opacity=0.3+0.25*Math.sin(e.mesh.userData.emberT)+0.15*Math.sin(e.mesh.userData.emberT*3.7); }   // dying-engine flicker, derelict-only
    if(P&&P.alive&&!P.warping&&P.pos.distanceTo(e.pos)<CFG.ENCOUNTER_R){ resolveEncounter(e); removeEncounter(i); continue; }
    if(e.age>CFG.ENCOUNTER_LIFE) removeEncounter(i); }
  newsCd-=dt; if(newsCd<=0){ newsCd=CFG.NEWS_CD; if(planets.length){ const p=planets[randi(0,planets.length-1)], g=GOODS[randi(0,GOODS.length-1)];   // shock STOCK only - prices stay emergent (organic)
    if(rand(0,1)<0.5){ p.stock[g.k]=Math.max(1,p.stock[g.k]*0.3); ev(`<b>NEWS</b> - ${g.n} shortage at ${p.name}; prices spike.`); } else { p.stock[g.k]=p.stock[g.k]*2.4+25; ev(`<b>NEWS</b> - ${g.n} glut at ${p.name}; prices crash.`); } } } }
function applyHull(s,key){ const H=HULLS[key]; if(!H) return;
  // STARBLAST-STYLE RESET (user 2026-07-08: "in starblast when you switch hulls you get nothing... a race to
  // bigger hull without buying too many [upgrades] and getting killed"): a genuine hull-CLASS swap now wipes the
  // Lv1-10 weapon/engine/hull stat progression back to 1, same as the reference game - only on an ACTUAL class
  // change (s.hullClass already set to something DIFFERENT), never on the initial hull assignment at ship spawn
  // (s.hullClass undefined/same key). Mounted GEAR (hardpoint weapons, gizmos) is a SEPARATE system and explicitly
  // untouched here - resizeGizmoBay/resizeWeaponBay below still only trim/refund what no longer FITS the new
  // hull's slot count, exactly as before; this only resets the numeric upgrade levels.
  const isSwap = s.hullClass && s.hullClass!==key;
  s.hullClass=key;
  if(isSwap && s.lvl){ s.lvl.weapon=1; s.lvl.engine=1; s.lvl.hull=1; }
  // PERMANENT SLOTS (user 2026-07-08 "certain slots or certain items are permanently bound... basically we are
  // copying space rangers 2"): audited every candidate before touching code - MANUFACTURER already can't be
  // re-picked without a fresh hull purchase (no standalone command sets it) and MICROMODULES already have no
  // removal path anywhere, so both were already permanent by construction. HULL SERIES was the one real gap - a
  // standalone `series <name>` command let it be freely re-picked at any dock, any time. seriesLocked re-opens the
  // "one pick per hull" slot on every genuine swap; the `series` command itself sets it true after a successful fit.
  if(isSwap) s.seriesLocked=false;
  s.maxHp=H.hp*(1+CFG.HP_PER_HULL*((s.lvl?s.lvl.hull:1)-1)); s.hp=s.maxHp;
  s.holdCap=H.hold + ((s.equip&&s.equip.cargo)||0)*15; s.hullSpeed=H.speed;
  resizeGizmoBay(s); resizeWeaponBay(s);                                 // STANDARD GEAR SLOTS / WEAPON HARDPOINTS: role changed -> slot counts may have changed too
  if(ASSETS.ready) applyShipModel(s); }                                  // silhouette rescales with the class (scout … dreadnought)
// resize the gizmo bay to match the new hull's role (gizmoSlotsFor) - GROWING pads with empty slots; SHRINKING
// unmounts+refunds (50%, same rate as a manual `gizmo unmount`) whatever no longer fits, refusing to just delete a
// mounted gizmo the player paid for.
function resizeGizmoBay(s){ const want=gizmoSlotsFor(s);
  if(!s.gizmoSlots) s.gizmoSlots=new Array(want).fill(null);
  while(s.gizmoSlots.length<want) s.gizmoSlots.push(null);
  while(s.gizmoSlots.length>want){ const k=s.gizmoSlots.pop(); if(k){ s.credits=(s.credits||0)+Math.round(GIZMOS[k].cost*GIZMO_SELL_FRAC); if(s.role==='player') notify(`${s.hullClass?HULLS[s.hullClass].n:'New hull'}'s electronics bay is smaller - unmounted ${GIZMOS[k].n} (+${Math.round(GIZMOS[k].cost*GIZMO_SELL_FRAC)}c).`,'log'); } } }
function priceOf(p,gk){ const g=GKEY[gk], ratio=(p.eq||CFG.EQ_STOCK)/Math.max(1,p.stock[gk]); return g.base*clamp(Math.pow(ratio,CFG.PRICE_ELAST),CFG.PRICE_MIN,CFG.PRICE_MAX); }
// reputation: helping a planet (trade/terraform) raises rep across its system faction; bombing it lowers it
function repAdd(p,amt){ p.rep=clamp((p.rep||0)+amt,-CFG.REP_MAX,CFG.REP_MAX); if(p.system) for(const q of p.system.planets){ if(q!==p&&planets.indexOf(q)>=0) q.rep=clamp((q.rep||0)+amt*0.5,-CFG.REP_MAX,CFG.REP_MAX); } }
function repBuyFactor(p){ return 1-clamp((p.rep||0)/CFG.REP_MAX,-1,1)*CFG.REP_DISCOUNT; }   // allied cheaper, hostile surcharge
function repSellFactor(p){ return 1+clamp((p.rep||0)/CFG.REP_MAX,-1,1)*CFG.REP_DISCOUNT; }
// ---- M4: CONTRACTS - coalition worlds post jobs vs the Hegemon (bounty / defense / supply). Player-facing goals. ----
let contracts=[], nextContractId=1, contractCd=0;
function makeContract(){ const issuer=planets[randi(0,planets.length-1)]; if(!issuer) return null; const roll=rand(0,1); let ct;
  if(roll<0.45){ const need=randi(2,5); ct={type:'bounty', need, got:0, reward:need*CFG.CONTRACT_BOUNTY_EA+randi(0,40), rep:CFG.CONTRACT_REP, desc:`Destroy ${need} Hegemon ships`}; }
  else if(roll<0.7 && systems.length){ const sy=systems[randi(0,systems.length-1)]; ct={type:'defense', sysId:sy.id, reward:CFG.CONTRACT_DEF_REWARD+randi(0,80), rep:CFG.CONTRACT_REP+2, desc:`Liberate the ${sy.name} system`}; }
  else { const g=GOODS[randi(0,GOODS.length-1)], need=randi(3,8); ct={type:'supply', good:g.k, need, reward:Math.round(need*g.base*1.6)+randi(0,50), rep:CFG.CONTRACT_REP, desc:`Deliver ${need} ${g.n} to ${issuer.name}`}; }
  ct.id=nextContractId++; ct.issuer=issuer; ct.accepted=false; ct.done=false; ct.born=T0; return ct; }
function refillContracts(){ contracts=contracts.filter(c=>!c.done); while(contracts.length<CFG.CONTRACT_MAX){ const c=makeContract(); if(!c) break; contracts.push(c); ev(`Contract posted @ ${c.issuer.name}: ${c.desc} - ${c.reward}c`); } }
function completeContract(ct){ if(ct.done) return; ct.done=true; const P=ships[0]; P.credits+=ct.reward; repAdd(ct.issuer,ct.rep); P.score+=Math.max(3,Math.round(ct.reward/25)); checkRankUp(P);   // M5: contracts advance rank
  notify(`✔ CONTRACT COMPLETE: ${ct.desc} - +${ct.reward}c, +${ct.rep} rep @ ${ct.issuer.name}.`,'flag'); }
function contractKill(){ for(const c of contracts) if(c.accepted&&!c.done&&c.type==='bounty'){ c.got++; if(c.got>=c.need) completeContract(c); } }
function contractLiberate(sy){ for(const c of contracts) if(c.accepted&&!c.done&&c.type==='defense'&&c.sysId===sy.id) completeContract(c); }
function contractDeliver(p){ const P=ships[0]; for(const c of contracts) if(c.accepted&&!c.done&&c.type==='supply'&&c.issuer===p){ const have=P.cargo[c.good]||0; if(have>=c.need){ P.cargo[c.good]-=c.need; if(P.cargo[c.good]<=0) delete P.cargo[c.good]; completeContract(c); } } }
function growPlanet(p){ p.dev++; p.eq=CFG.EQ_STOCK*(1+CFG.DEV_EQ*(p.dev-1));
  p.mesh.scale.setScalar(1+CFG.DEV_RADIUS*(p.dev-1)); if(p.label) p.label.set(p.name+' · '+p.type.t+' · Lv'+p.dev,'#eaf2ff'); ev(`${p.name} grew to Lv${p.dev} · ${p.type.t}`); }
function advanceTerra(p,amt){ p.terra=Math.min(1,(p.terra||0)+amt);                    // barren world greens toward earth
  const col=new T.Color(p.type.col).lerp(new T.Color(0x3a86c0),p.terra*0.85); p.mesh.material.color.copy(col); p.mesh.material.emissive.copy(col).multiplyScalar(0.22);
  if(p.terra>=1 && p.type!==GARDEN){ p.type=GARDEN; p.terraformable=false; p.mesh.material.color.set(GARDEN.col); p.mesh.material.emissive.set(GARDEN.col).multiplyScalar(0.25);
    if(p.label) p.label.set(p.name+' · Garden · Lv'+p.dev,'#bfeaff'); ev(`${p.name} terraformed to EARTH-LIKE - a Garden world.`); } }
function terraformStep(p,payer){ if(!p.terraformable||p.terra>=1||payer.credits<CFG.TERRA_PAY) return 0; payer.credits-=CFG.TERRA_PAY; advanceTerra(p,CFG.TERRA_STEP); if(payer.role==='player') repAdd(p,CFG.REP_TERRA); return CFG.TERRA_PAY; }
function econTick(dt){ for(const p of planets){ const mk=p.type.makes,nd=p.type.needs, devP=1+CFG.DEV_PROD*(p.dev-1);
  const contested=!!(p.system&&p.system.contested);
  const war=contested?CFG.CONTESTED_PROD:1;                                        // blockade: active invasion cuts production hard
  const embargo=(p.rep!=null&&p.rep<=CFG.REP_HOSTILE)?CFG.EMBARGO_PROD:1;           // SR-M13: hostile-REP worlds isolated from trade even without active war
  const boom=(p.boomT>0)?CFG.LIBERATION_BOOM_MULT:1;                               // SR-M13: temporary post-liberation production surge
  if(p.boomT>0) p.boomT=Math.max(0,p.boomT-dt);
  const infra=(window.CONQUEST&&CONQUEST.infraMult)?CONQUEST.infraMult(p):1;   // 4X infrastructure (user): a damaged world produces less until it rebuilds - trade routes dry up
  for(const g of GOODS){ let s=p.stock[g.k]; if(mk[g.k]) s+=mk[g.k]*CFG.PROD_RATE*dt*devP*war*embargo*boom*infra;
    const demand=(contested&&g.k==='food')?CFG.REFUGEE_DEMAND_MULT:1;              // SR-M13: refugee demand spike - contested worlds strain food specifically
    if(nd[g.k]) s-=nd[g.k]*CFG.CONS_RATE*dt*devP*demand; p.stock[g.k]=Math.max(0,s); }
  p.wealth+=CFG.CITIZEN_INCOME*p.dev*dt;                              // citizens (statistical) generate wealth
  const cost=CFG.DEV_COST_BASE*Math.pow(CFG.DEV_COST_GROW,p.dev-1);   // planet reinvests -> endless slow growth
  if(p.wealth>=cost){ p.wealth-=cost; growPlanet(p); }
  if(T0-(p.hullT||0)>3 && p.hull<p.maxHull) p.hull=Math.min(p.maxHull,p.hull+CFG.PLANET_REGEN*dt);                 // heals unless under sustained fire
  if(p.mesh&&p.spin) p.mesh.rotation.y+=p.spin*dt;                                                                  // slow spin sells the textured sphere as a real world
  if(p.terraformable && p.terra<1 && p.wealth>CFG.TERRA_AI_COST){ p.wealth-=CFG.TERRA_AI_COST*dt*0.3; advanceTerra(p,CFG.TERRA_AI_STEP*dt); }   // AI self-terraforms, slowly
  p.defCd=Math.max(0,p.defCd-dt); } }
function nearestPlanet(pos){ let best=null,bd=1e9; for(const p of planets){ const d=pos.distanceTo(p.pos); if(d<bd){bd=d;best=p;} } return best; }
function cargoTotal(s){ let n=0; for(const k in s.cargo) n+=s.cargo[k]; return n; }
// buy/sell MOVE stock -> MOVE price (the organic pressure; no cheating)
function buy(s,p,gk,qty){ let price=priceOf(p,gk); if(s.role==='player') price*=repBuyFactor(p); price*=(1-CFG.SKILL_TRADE_PRICE*skillLvl(s,'trade')); const reserve=s.role==='player'?0:CFG.CREDIT_RESERVE;   // SR-M17: trade skill haggles the price down

// IRON LAW (2026-07-10) - P4's own stated law, now enforced in the LIVE game: a ship knows only the prices it
// has OBSERVED by docking. The old bestArbitrage/planTrade read priceOf() across EVERY planet including ones the
// ship never visited - the exact "omniscient global price table" cheat PILLARS.md P4 forbids (and the player
// never had: recordObservedPrices is dock-gated). Now EVERY ship (AI + player autopilot alike) carries its own
// s.obsPrices memory, written only on dock, read (possibly stale - honest memory) when planning; too little
// knowledge -> EXPLORE the nearest unvisited market and LEARN, the same epistemic limit the player lives under.
function observePlanetPrices(s,p){ if(!p||!p.stock) return; s.obsPrices=s.obsPrices||{}; const rec={_t:T0};

function observedPlanets(s){ const out=[]; if(!s.obsPrices) return out;
  for(const p of planets) if(s.obsPrices[p.name]) out.push(p); return out; }   // resolve names against the LIVE list (planets can die)
function bestArbitrage(s){ const known=observedPlanets(s); if(known.length<2) return null;   // cannot compare prices never seen
  const opts=[]; for(const g of GOODS){ if(g.k==='gas') continue;
  for(const bp of known){ const bpr=s.obsPrices[bp.name][g.k]; for(const sp of known){ if(sp===bp) continue; const pr=s.obsPrices[sp.name][g.k]-bpr;
    if(pr>CFG.PROFIT_MIN) opts.push({good:g.k,buy:bp,sell:sp,profit:pr}); } } }
  if(!opts.length) return null; opts.sort((a,b)=>b.profit-a.profit);

function planTrade(s){ if(s.fuel<CFG.FUEL_LOW){ s.tradePlan={type:'refuel',planet:nearestPlanet(s.pos)}; return; }
  const known=observedPlanets(s);
  if(cargoTotal(s)>0 && known.length){ let bg=null,bp=null,bv=-1; for(const k in s.cargo) for(const p of known){ const v=s.obsPrices[p.name][k]; if(v>bv){bv=v;bg=k;bp=p;} } s.tradePlan={type:'sell',planet:bp,good:bg}; return; }
  if(cargoTotal(s)===0){ const arb=bestArbitrage(s); if(arb){ s.tradePlan={type:'buy',planet:arb.buy,good:arb.good}; return; } }
  // knowledge too thin to plan -> EXPLORE: nearest unvisited market, else refresh the STALEST one (merchants make rounds)
  let bp=null,bd=1e9; for(const p of planets){ if(s.obsPrices&&s.obsPrices[p.name]) continue; const d=s.pos.distanceTo(p.pos); if(d<bd){bd=d;bp=p;} }
  if(!bp){ let ot=Infinity; for(const p of planets){ const t=(s.obsPrices[p.name]&&s.obsPrices[p.name]._t)||0; if(t<ot){ot=t;bp=p;} } }

    else if(o.type==='bombard'){ if(planets.indexOf(o.planet)<0){ s.obj=null; } else { mode='HUNT'; target=o.planet; aimDir=_v.copy(o.planet.pos).sub(s.pos); } }
    else if(o.type==='mine'){ const r=asteroids.filter(a=>s.pos.distanceTo(a.pos)<CFG.SENSE_R); if(r.length){ mode='MINE'; target=pickTarget(s,r); aimDir=_v.copy(target.pos).sub(s.pos); } else { mode='SEEK'; aimDir=FWD.clone().applyQuaternion(s.quat); } }
    else if(o.type==='trade'){ const tr=doTrade(s,dt); if(tr){ mode=tr.mode; target=tr.target; aimDir=tr.aimDir; ease=tr.ease; } else { mode='SEEK'; aimDir=FWD.clone().applyQuaternion(s.quat); } }
    else if(o.type==='flee'){ mode='EVADE'; const th=nearestRival(s,senseRangeOf(s)); aimDir=th?_v.copy(s.pos).sub(th.pos):_v.copy(s.pos).multiplyScalar(-1); }
    else { mode='HOLD'; aimDir=FWD.clone().applyQuaternion(s.quat); ease=0; } }
  else if(cmd){ const r=applyCommand(s,cmd,dt); mode=r.mode; target=r.target; aimDir=r.aimDir; ease=r.ease; }  // player's order
  else if(s.hp<s.maxHp*CFG.EVADE_HP && threat){ mode='EVADE'; target=threat.o; aimDir=_v.copy(s.pos).sub(threat.o.pos); s.huntTarget=null; }
  else if(s.role==='defender'){ const host=nearestHostileNear(s.home,s);                       // hired guns: defend the home planet
    if(host){ mode='HUNT'; target=host; aimDir=_v.copy(host.pos).sub(s.pos); s.lastThreat=T0; }
    else { mode='ESCORT'; aimDir=_v.copy(s.home.pos).sub(s.pos); if(s.pos.distanceTo(s.home.pos)<CFG.DEFEND_R*0.5) ease=0.35;
      if(T0-s.lastThreat>CFG.DEF_DESPAWN) s.despawn=true; } }
  else if(s.role==='pirate'){ let tgt=(s.huntTarget&&s.huntTarget.alive&&s.huntTarget.team!==s.team)?s.huntTarget:(weakestEnemyNear(s,Math.min(CFG.PIRATE_HUNT_R,senseRangeOf(s)))||nearestRival(s,senseRangeOf(s)));   // dumb marauder: charge the weakest prey
    if(s.hp<s.maxHp*CFG.EVADE_HP && tgt){   // SR "train them up" pass 3: a marauder that's LOSING now flees instead of fighting to the death, and calls the pack in behind it
      mode='EVADE'; target=tgt; aimDir=_v.copy(s.pos).sub(tgt.pos); s.huntTarget=null; broadcast(s,'help',tgt); }   // reuses the SAME "converge on my attacker" rally coalition ships already use - nearby pirates come help fight the thing that hurt me
    else{ if(tgt && tgt!==s._packTgt){ s._packTgt=tgt; broadcast(s,'tally',tgt); }   // SR pass 2: call nearby pack-mates onto the SAME prey instead of each pirate hunting independently
      s.huntTarget=tgt; if(tgt){ mode='HUNT'; target=tgt; aimDir=_v.copy(tgt.pos).sub(s.pos); } else { mode='SEEK'; aimDir=FWD.clone().applyQuaternion(s.quat); } } }
  else if(s.huntTarget && s.huntTarget.alive && T0<s.huntUntil && s.pos.distanceTo(s.huntTarget.pos)<senseRangeOf(s) && s.hp>s.maxHp*0.4){
    mode='HUNT'; target=s.huntTarget; aimDir=_v.copy(target.pos).sub(s.pos); }          // stay on an ongoing dogfight
  else {
    s.huntTarget=null;
    if(s.role==='trader'){ const tr=doTrade(s,dt); if(tr){ mode=tr.mode; target=tr.target; aimDir=tr.aimDir; ease=tr.ease; } }  // traders run the economy
    if(!mode){
      // A11: DISCOVERED goal - pilot picks its OWN target from learned value over raw feature-buckets (supersedes the authored ray menu)
      if(CFG.DISCOVER){ const d=discoverTarget(s); if(d){ s._discoBucket=d.bucket;
          if(d.engage){ mode='HUNT'; target=d.target; aimDir=_v.copy(target.pos).sub(s.pos); }
          else { mode='EVADE'; target=d.target; aimDir=_v.copy(s.pos).sub(d.target.pos); } } }
      // A7 fallback: value-scored rays + verify-veto (used when DISCOVER is off)
      else if(CFG.CHAIN_DRIVE){ const pool=rayScore(s).filter(r=>r.v>0&&r.target&&r.target.alive!==false).sort((a,b)=>b.v-a.v), top=pool[0];
        if(top && top.mode==='HUNT' && s.hp>s.maxHp*CFG.EVADE_HP && rand(0,1)<s.aggr*CFG.HUNT_RATE*1.7*dt){
          s.huntTarget=top.target; s.huntUntil=T0+rand(4,7); mode='HUNT'; target=top.target; aimDir=_v.copy(target.pos).sub(s.pos); broadcast(s,'tally',target); }
        else { const nh=pool.find(r=>r.mode!=='HUNT'); if(nh){ mode=nh.mode; target=nh.target; aimDir=_v.copy(target.pos).sub(s.pos); if(nh.mode==='COLLECT'){ const gd=s.pos.distanceTo(target.pos); if(gd<CFG.GEM_EASE_R) ease=clamp(gd/CFG.GEM_EASE_R,0.25,1); } } } }
      if(!mode && s.role!=='trader' && s.credits>=cheapestUp(s) && cargoTotal(s)===0) mode='UPGRADE';
      if(!mode){ s.lock=null; mode='SEEK'; }
      if(!aimDir) aimDir=_v.copy(s.vel).lengthSq()>1?s.vel.clone():FWD.clone().applyQuaternion(s.quat);   // A7: never leave aimDir null (fixes UPGRADE null-aim crash)
    }
  }
  if(CFG.GROUNDED && target && target.id!=null && (mode==='HUNT'||mode==='EVADE')){ const bp=senseTarget(s,target); aimDir = (mode==='EVADE') ? _v.copy(s.pos).sub(bp) : _v.copy(bp).sub(s.pos); }   // A4: aim at the BELIEF, not ground truth
  const aim=aimAt(s,aimDir);
  // CH7 fix: throttle is now situation-aware - thrust to reach a target's standoff range, then COAST/STOP (was: always ≥0.55, "full throttle never stop")
  let thr;
  if(mode==='HOLD') thr=0;
  else if(mode==='EVADE'||mode==='BOUND') thr=0.95;
  else if(target){ const td=s.pos.distanceTo(target.pos); thr=clamp(aim.dot,0,1)*clamp((td-CFG.STANDOFF_R)/CFG.BRAKE_R,0,1); }
  else thr=clamp(aim.dot,0,1)*CFG.CRUISE_THR;
  thr*=ease;
  if(s.navGain==null){ s.navGain=s.role==='player'?1:CFG.NAV_GAIN0; s.navAdapt=(s.role!=='player'&&s.team==='squad'&&(s.id%2===0)); s.navDir=1; s.navScorePrev=0; s.navAccum=0; s.navCount=0; }   // A3: learned steering gain (adapters = even-id squad)
  if(s.wRay==null){ s.wRay={HUNT:CFG.RAY_W0,COLLECT:CFG.RAY_W0,MINE:CFG.RAY_W0}; s.rayAdapt=(s.role!=='player'&&s.team==='squad'&&(s.id%2===0)); s.rAcc={HUNT:0,COLLECT:0,MINE:0}; s.rT={HUNT:0.01,COLLECT:0.01,MINE:0.01}; s._prevVal=(s.credits||0)+(s.score||0)*CFG.SCORE_W; s._prevMode=null; }   // A9: learned ray-weights (start uniform; adapters climb reward-rate, frozen stay uniform)
  const ng=s.navGain||1;
  s.ctrl={ thr:clamp(thr,0,1), pitch:clamp(aim.pitch*ng,-1,1), yaw:clamp(aim.yaw*ng,-1,1) }; s.mode=mode; s.target=target; s._prevMode=mode;   // A9: remember mode for reward attribution
  if(target&&mode==='HUNT'){ s.navAccum+=Math.max(0,aim.dot); s.navCount++; }   // A3: measure alignment vs MOVING targets (gain matters here; mining slow rocks is flat/noisy)
  s.fire-=dt;
  if((mode==='MINE'||mode==='HUNT') && target && s.fire<=0 && (s.capLaser==null||s.capLaser>0)
      && !((s.weaponType||'energy')==='missile' && (s.missileAmmo||0)<=0)){   // IRON LAW: missile ammo gates EVERYONE now (AI + player) - out of ammo silently skips firing the missile weapon this tick; both regenerate ammo in think() so no one is stuck
    const W=WEAPONS[s.weaponType||'energy']||WEAPONS.energy;
    if(aim.dot>(mode==='HUNT'?CFG.HUNT_FIRE:CFG.ALIGN_FIRE) && s.pos.distanceTo(target.pos)<CFG.SENSE_R*W.range){
      s.fire=W.cd/((1+CFG.WEAPON_FIRE*(s.lvl.weapon-1))*(1+(s.artFire||0))*powerMult(shipPower(s).weapons));   // M6: Hegemon Core artifact boosts fire rate; X-WING POWER: weapons power shortens cooldown
      s.capLaser=Math.max(0,(s.capLaser==null?CFG.LASER_CAP_MAX:s.capLaser)-CFG.LASER_CAP_PER_SHOT);
      if(W.dmgType==='missile') s.missileAmmo=Math.max(0,(s.missileAmmo||0)-1);   // IRON LAW: consume the magazine for EVERYONE (AI + player), symmetric
      const base=((s.team==='pirate')?(s.tierDmg||CFG.PIRATE_DMG):W.dmg*(1+CFG.WEAPON_DMG*(s.lvl.weapon-1))*(1+CFG.SKILL_GUNNERY_DMG*skillLvl(s,'gunnery'))*(1+(s.dmgMult||0))*(s.weaponInst&&s.weaponInst.powerMul||1))*seriesOf(s).dmgMult*(W.dmgType==='missile'?seriesOf(s).missileDmgMult:1);   // SR-M17; STANDARD GEAR SLOTS: Integrator micro-module; HULL SERIES: Ironclad/Pygamore live multipliers; SR VARIANCE: the player's rolled weapon-instance power
      const spec={ dmg:base, col:W.col, speed:W.speed, life:W.life, r:W.r, homing:W.homing, splash:W.splash, target:(W.homing>0?target:null),
        shape:W.shape, boltLen:W.boltLen, trail:W.trail, trailCd:W.trailCd, flash:W.flash, dmgType:W.dmgType||'energy', slow:W.slow };   // per-weapon visual signature; SR Treton slow-on-hit
      const fwd=FWD.clone().applyQuaternion(s.quat), side=RGT.clone().applyQuaternion(s.quat).multiplyScalar(CFG.MUZZLE_OFF);
      if(W.twin){ spawnBullet(_v2.copy(s.pos).add(side).addScaledVector(fwd,2),fwd,s.id,spec); spawnBullet(_v2.copy(s.pos).sub(side).addScaledVector(fwd,2),fwd,s.id,spec); }
      else spawnBullet(_v2.copy(s.pos).addScaledVector(fwd,2.2),fwd,s.id,spec);
    }
  }
  // WEAPON HARDPOINTS (player-only, see the HARDPOINT_SELL_FRAC comment block above): slot 1 (s.weaponType)
  // just fired through the untouched path above; extra hardpoints (s.weaponSlots) fire independently here, reusing
  // the SAME mode/target/aim this tick already computed for the player - one full pass over ships doesn't grow.
  if(s.role==='player' && Array.isArray(s.weaponSlots) && s.weaponSlots.length && (mode==='MINE'||mode==='HUNT') && target){
    if(!s.slotFire) s.slotFire=new Array(s.weaponSlots.length).fill(0);
    if(s.slotFire.length!==s.weaponSlots.length) s.slotFire=new Array(s.weaponSlots.length).fill(0);   // bay resized since last tick
    const mountPts=hullMounts(s).weaponPoints;   // SHIP LAYOUT: per-mount facingDeg - a hardpoint fires along WHERE IT'S POINTED, not blindly along the ship's own nose
    _vmount.copy(target.pos).sub(s.pos).normalize();   // direction to target, computed once per tick (dedicated scratch, never aliased by anything else this loop)
    for(let wi=0; wi<s.weaponSlots.length; wi++){ const wt=s.weaponSlots[wi]; if(!wt) continue;
      s.slotFire[wi]-=dt; if(s.slotFire[wi]>0) continue;
      const W2=WEAPONS[wt]||WEAPONS.energy;
      const facingDeg=(mountPts[wi]&&mountPts[wi].facingDeg)||0;
      const fwd2=FWD.clone().applyAxisAngle(UPL,facingDeg*Math.PI/180).applyQuaternion(s.quat);   // local facing rotation FIRST, then the ship's own heading - "30 right of wherever my nose points", not a world-space rotation
      const mountDot=fwd2.dot(_vmount);
      if(!(mountDot>(mode==='HUNT'?CFG.HUNT_FIRE:CFG.ALIGN_FIRE) && s.pos.distanceTo(target.pos)<CFG.SENSE_R*W2.range)) continue;
      if(W2.dmgType==='missile' && (s.missileAmmo||0)<=0) continue;   // shares the single missileAmmo magazine with the primary slot
      s.slotFire[wi]=W2.cd/((1+CFG.WEAPON_FIRE*(s.lvl.weapon-1))*(1+(s.artFire||0))*powerMult(shipPower(s).weapons));
      if(W2.dmgType==='missile') s.missileAmmo=Math.max(0,(s.missileAmmo||0)-1);
      const base2=W2.dmg*(1+CFG.WEAPON_DMG*(s.lvl.weapon-1))*(1+CFG.SKILL_GUNNERY_DMG*skillLvl(s,'gunnery'))*(1+(s.dmgMult||0))*seriesOf(s).dmgMult*(W2.dmgType==='missile'?seriesOf(s).missileDmgMult:1);
      const spec2={ dmg:base2, col:W2.col, speed:W2.speed, life:W2.life, r:W2.r, homing:W2.homing, splash:W2.splash, target:(W2.homing>0?target:null),
        shape:W2.shape, boltLen:W2.boltLen, trail:W2.trail, trailCd:W2.trailCd, flash:W2.flash, dmgType:W2.dmgType||'energy' };
      const side2=RGT.clone().applyQuaternion(s.quat).multiplyScalar(CFG.MUZZLE_OFF*(1.8+wi*0.9));   // muzzle-position stagger stays ship-relative sideways (visual spacing only) - firing DIRECTION is fwd2 above
      if(W2.twin){ spawnBullet(_v2.copy(s.pos).add(side2).addScaledVector(fwd2,2),fwd2,s.id,spec2); spawnBullet(_v2.copy(s.pos).sub(side2).addScaledVector(fwd2,2),fwd2,s.id,spec2); }
      else spawnBullet(_v2.copy(s.pos).addScaledVector(fwd2,2.2),fwd2,s.id,spec2);
    }
  }
  let bought=null;
  if(mode==='UPGRADE'){ const k=chooseUpgrade(s),c=upCost(s,k); if(canUpgradeLvl(s,k) && s.credits>=c){ s.credits-=c; s.lvl[k]+=1; bought=k;
    if(k==='hull'){ s.maxHp=CFG.HP_BASE*(1+CFG.HP_PER_HULL*(s.lvl.hull-1)); s.hp=s.maxHp; }
    if(k==='weapon'){ const nt=WEAPON_ORDER[Math.min(WEAPON_ORDER.length-1, Math.floor((s.lvl.weapon-1)/2))]; if(nt!==(s.weaponType||'energy')){ s.weaponType=nt; if((WEAPONS[nt].dmgType)==='missile') s.missileAmmo=CFG.MISSILE_AMMO_MAX; rollAIGear(s); say(s,`Refit → ${WEAPONS[nt].n}.`); } }   // M3: arms race; IRON LAW: a weapon REFIT tops up the magazine (the AI's resupply analog of the player buying ammo at dock)
    burst(s.pos,0x86ff9d,12,12,3.2); }
    const gotHull=tryHullClassUpgrade(s);                                       // rare: swap to the NEXT HULL_ORDER class (scout…capital), same applyHull() the player's `hull` command uses
    if(gotHull){ say(s,`${(s.credits)|0}c left → HULL REFIT: ${HULLS[gotHull].n}`); burst(s.pos,0x86ff9d,20,16,4.2); } }
  s.brain={ mode, target, dot:aim.dot, ctrl:s.ctrl, threat:!!threat, bought };
  s.utter-=dt;
  if(bought){ sgSay(s,'upgrade',{what:bought==='weapon'?'LASERS':bought==='engine'?'THRUSTERS':'HULL',lvl:s.lvl[bought],credits:(s.credits)|0},`${(s.credits)|0}c left → upgrade Lv${s.lvl[bought]}`); s.utter=CFG.UTTER_CD; }
  else if(s.utter<=0){ const p=Math.round(s.ctrl.pitch*90),y=Math.round(s.ctrl.yaw*90),thrp=Math.round(s.ctrl.thr*100);
    if(mode==='HUNT'&&target) say(s,`Engaging ${target.name} · ${s.pos.distanceTo(target.pos)|0}u · guns hot, pitch ${p>=0?'+':''}${p}° yaw ${y>=0?'+':''}${y}°`);
    else if(mode==='ESCORT'&&target) say(s,`On ${target.name}'s wing · thr ${thrp}%`);
    else if(mode==='HOLD') say(s,`Holding position · throttle down`);
    else if(mode==='RALLY') say(s,`Regrouping · pitch ${p>=0?'+':''}${p}° yaw ${y>=0?'+':''}${y}°`);
    else if(mode==='MINE'&&target) say(s,`Locking rock · ${s.pos.distanceTo(target.pos)|0}u · pitch ${p>=0?'+':''}${p}° yaw ${y>=0?'+':''}${y}° thr ${thrp}%`);
    else if(mode==='COLLECT'&&target) say(s,`Gem ${target.credits}c ahead - banking ${y>0?'right':'left'} to scoop`);
    else if(mode==='EVADE') sgSay(s,'evade',{hp:Math.round(100*s.hp/s.maxHp)},`Hull ${Math.round(100*s.hp/s.maxHp)}% - breaking off, rolling clear`);
    else if(mode==='BOUND') say(s,`Boundary - coming about, pitch ${p>=0?'+':''}${p}°`);
    else say(s,`Scanning · holding ${thrp}% throttle`);
    s.utter=CFG.UTTER_CD*rand(0.8,1.4); }
}

// ---------------------------------------------------------------- physics
function flyStep(s,dt){
  _q.setFromAxisAngle(RGT,s.ctrl.pitch*CFG.PITCH_RATE*dt); s.quat.multiply(_q);
  _q.setFromAxisAngle(UPL,-s.ctrl.yaw*CFG.YAW_RATE*dt);    s.quat.multiply(_q); s.quat.normalize();
  s.bank=lerp(s.bank,-s.ctrl.yaw*CFG.BANK_MAX,1-Math.exp(-CFG.BANK_LERP*dt));
  const fwd=FWD.clone().applyQuaternion(s.quat);
  const engMult=powerMult(shipPower(s).engines);                                                     // X-WING POWER: reroute into engines for a real speed boost
  const nitroActive=!!s._nitroActive;
  const nitroMult=nitroActive?CFG.NITRO_BOOST_MULT:1;                                                // NITRO BURST: instant thrust/vmax layer - doesn't wait on the power-stat ramp above to feel like a boost
  if(nitroActive&&!s._nitroWasActive) s.vel.addScaledVector(fwd,CFG.NITRO_KICK);                      // rising-edge snap the instant Shift is pressed, even without W held
  s._nitroWasActive=nitroActive;
  s.vel.addScaledVector(fwd,CFG.THRUST*(1+CFG.ENGINE_GAIN*(s.lvl.engine-1))*(1+CFG.SKILL_HANDLING_THRUST*skillLvl(s,'handling'))*(s.hullSpeed||1)*engineOf(s).speedMult*(s.engineInst&&s.engineInst.powerMul||1)*seriesOf(s).speedMult*manuOf(s).speedMult*engMult*nitroMult*(s.slowT>T0?(s.slowMul||1):1)*s.ctrl.thr*dt);   // M9: hull class speed; SR-M17: handling; ENGINEERING BAY: engine type; SR VARIANCE: rolled engine-instance power; HULL SERIES/MANUFACTURER; SR TRETON slow
  // user 2026-07-08 ("when I hold shift I want to have burst mode"): the line above only fires while W is ALSO
  // held (multiplies s.ctrl.thr, which is 0 otherwise) - so Shift alone gave one kick then coasted to a stop under
  // drag, never reading as a sustained "burst". A real afterburner propels you on its own, no second key needed -
  // this term is independent of s.ctrl.thr, active for exactly as long as Shift is held.
  if(nitroActive) s.vel.addScaledVector(fwd,CFG.NITRO_AUTOTHRUST*engMult*dt);
  s.vel.multiplyScalar(Math.exp(-CFG.DRAG*dt));
  const vmax=CFG.VMAX*(1+CFG.ENGINE_GAIN*(s.lvl.engine-1))*engineOf(s).speedMult*(s.engineInst&&s.engineInst.powerMul||1)*seriesOf(s).speedMult*manuOf(s).speedMult*engMult*nitroMult*(s.slowT>T0?(s.slowMul||1):1); if(s.vel.length()>vmax) s.vel.setLength(vmax);
  s.pos.addScaledVector(s.vel,dt);
  if(s.pos.length()>CFG.ARENA_R-CFG.SHIP_R){ s.pos.setLength(CFG.ARENA_R-CFG.SHIP_R); const n=s.pos.clone().normalize(); s.vel.addScaledVector(n,-1.5*s.vel.dot(n)); }
  for(let pi=0;pi<planets.length;pi++){ const p=planets[pi], effR=p.radius*(p.mesh.scale.x||1)+CFG.SHIP_R, dd=s.pos.distanceTo(p.pos);   // don't fly through planets
    if(dd<effR){ const n=_v2.copy(s.pos).sub(p.pos); if(n.lengthSq()<1e-4) n.set(1,0,0); n.setLength(1);
      s.pos.copy(p.pos).addScaledVector(n,effR);                                    // place on the surface (no penetration)
      const vn=s.vel.dot(n);
      if(vn<0){ s.vel.addScaledVector(n,-vn);                                       // CANCEL the inward component (was *1.25 = an energy-ADDING fling; that was the janky "bounce off planets" physics)
        const tang=_v.copy(s.vel).addScaledVector(n,-s.vel.dot(n)); s.vel.copy(n).multiplyScalar(vn*-0.12).add(tang.multiplyScalar(0.92)); } } }   // soft 12% bounce + light surface friction on the tangent → you SLIDE along a planet, not pinball
  if(base){ const effR=CFG.BASE_R*0.55+CFG.SHIP_R, dd=s.pos.distanceTo(base.pos);    // BUG FIX (user report "I can fly right through Ranger Command"): base was never in the planet collision loop above
    if(dd<effR){ const n=_v2.copy(s.pos).sub(base.pos); if(n.lengthSq()<1e-4) n.set(1,0,0); n.setLength(1);
      s.pos.copy(base.pos).addScaledVector(n,effR); const vn=s.vel.dot(n);
      if(vn<0){ s.vel.addScaledVector(n,-vn); const tang=_v.copy(s.vel).addScaledVector(n,-s.vel.dot(n)); s.vel.copy(n).multiplyScalar(vn*-0.12).add(tang.multiplyScalar(0.92)); } } }
  s.hp=Math.min(s.maxHp,s.hp+(CFG.REGEN+(s.regenBonus||0)*seriesOf(s).droidMult*((s.droidInst&&s.droidInst.powerMul)||1))*dt); s.iframe=Math.max(0,s.iframe-dt);   // M3: repair droid adds regen; HULL SERIES: Repair boosts droid effectiveness; SR ITEM VARIANCE: droid instance powerMul scales its regen (ship-agnostic)
  shieldTick(s,dt);                                                                                  // X-WING POWER: shields regen when power is routed there and you haven't been hit recently
  capacitorTick(s,dt);                                                                              // SR X-WING CAPACITORS: laser energy regens off weapons power, engine capacitor regens off engines power (when not boosting)
  _q.setFromAxisAngle(FWD,s.bank); s.mesh.position.copy(s.pos); s.mesh.quaternion.copy(s.quat).multiply(_q);
  const engVisT=nitroActive?1:s.ctrl.thr;                                                            // burst mode flares the engine glow to full even with W not held - the visible half of "it's really doing something"
  s.mesh.userData.eng.material.opacity=0.3+0.5*engVisT; s.mesh.userData.eng.scale.setScalar(1.3+1.5*engVisT);
}
// ---- friendly-fire exception + consequence (see bullets-vs-ships loop below) ----
function ffCanHit(owner,victim){
  if(owner.role==='player') return true;                                                          // player bullets ignore the team filter
  if(victim.role==='player'&&owner.huntTarget===victim&&T0<(owner.huntUntil||0)) return true;     // a retaliating teammate's return fire lands on the player
  return false; }
function ffRetaliate(victim,owner){ if(!owner||owner.role!=='player'||!victim||!victim.alive||victim===owner||victim.team!==owner.team) return;
  if(victim.huntTarget!==owner){ ev(`You're shooting at YOUR OWN coalition - <b>${victim.name}</b> returns fire!`); say(victim,`You TRAITOR - returning fire!`); }

  const sp=scannerPowerOf(viewer), dist=viewer.pos.distanceTo(o.pos), tier=o.tier||0;   // SR ITEM VARIANCE: scanner instance powerMul scales read strength
  const screen=tier*CFG.SCAN_SCREEN_PER_TIER, range=CFG.SCAN_HEALTH_R_BASE+sp*CFG.SCAN_HEALTH_R_PER_POWER;
  const hull=o.maxHp>0?clamp(Math.round(o.hp/o.maxHp*100),0,100):0;
  if(sp>0 && sp>=screen && dist<=range){
    const smax=shieldMaxFor(o), spct=smax>0?Math.round(((o.shield==null?smax:o.shield)/smax)*100):null;
    return {mode:'precise', hull:hull, shield:spct}; }
  const small=['scout','fighter','interceptor','shuttle'].indexOf(o.hullClass)>=0;
  if(dist<=CFG.SCAN_ROUGH_R && tier<=0 && small){ const f=o.hp/o.maxHp;
    return {mode:'rough', band: f>0.66?'strong':(f>0.33?'damaged':'critical'), hull:hull}; }
  return {mode:'none'};
}

// =================================================================================================
// WEAPON HARDPOINTS (user 2026-07-08, SR slot-topology notes: "up to 5 weapon slots... Fighter hulls maximize
// weapon slots, Merchant hulls sacrifice them"). PLAYER-ONLY, deliberately: the shared AI fire/decision tick
// below runs for every squad/pirate ship every frame, and giving every simulated ship independent multi-weapon
// fire loops would multiply bullet counts and AI complexity across dozens of ships for no real benefit - AI
// keeps its existing single-weaponType behavior completely unchanged (same convention already set for
// player-only missile ammo). The existing WEAPONS/weaponType/`weapon` command stay exactly as-is (slot 1,
// "primary") - HARDPOINTS is purely the EXTRA slots 2..N, mounted/unmounted/sold exactly like GIZMOS (real
// slot cap, not a swap-one-for-another fit), because unlike engines/hull you plausibly want several DIFFERENT
// weapon types (or two of the same) firing independently, not one replaceable "type".
// =================================================================================================
const HARDPOINT_SELL_FRAC=0.5;
function weaponSlotsFor(s){ return hardpointCountFor(s)+1; }   // total incl. the always-present primary
function hardpointCountFor(s){ return Math.max(0, hullMounts(s).weaponPoints.length + seriesOf(s).hardpointDelta); }   // SHIP LAYOUT: per-hull HULL_MOUNTS.weaponPoints, not a role-bucket lookup; HULL SERIES delta still applies (Fast/Repair trade a hardpoint)
function hasHardpoint(s,key){ return !!(s.weaponSlots&&s.weaponSlots.includes(key)); }
function mountHardpoint(s,key){ if(!WEAPONS[key]||key==='flame') return {ok:false,why:'no such weapon'};   // flame is Hegemon-only, never player-purchasable, same gate as the `weapon` command
  if(!s.weaponSlots) s.weaponSlots=new Array(hardpointCountFor(s)).fill(null);
  const free=s.weaponSlots.indexOf(null); if(free<0) return {ok:false,why:'no free hardpoint - unmount one first'};
  s.weaponSlots[free]=key; return {ok:true,slot:free}; }
function unmountHardpoint(s,idx){ if(!s.weaponSlots||idx<0||idx>=s.weaponSlots.length||!s.weaponSlots[idx]) return {ok:false,why:'that hardpoint is empty'};
  const key=s.weaponSlots[idx]; s.weaponSlots[idx]=null; return {ok:true,key}; }
function resizeWeaponBay(s){ const want=hardpointCountFor(s);
  if(!s.weaponSlots) s.weaponSlots=new Array(want).fill(null);
  while(s.weaponSlots.length<want) s.weaponSlots.push(null);
  while(s.weaponSlots.length>want){ const k=s.weaponSlots.pop(); if(k){ s.credits=(s.credits||0)+Math.round(WEAPONS[k].cost*HARDPOINT_SELL_FRAC); if(s.role==='player') notify(`${HULLS[s.hullClass]?HULLS[s.hullClass].n:'New hull'}'s weapon bay is smaller - unmounted ${WEAPONS[k].n} (+${Math.round(WEAPONS[k].cost*HARDPOINT_SELL_FRAC)}c).`,'log'); } } }

  else if(mode==='MINE') reason='ore pays and the sector is calm enough to work';
  else if(mode==='COLLECT') reason='a gem is worth grabbing before a rival gets it';

  const declLine=fu?`That's all of that story.${offer}`:`I can't speak to that.${offer}`;

    else declComposer(); });
}

  if(m.type==='ESCORT'||m.type==='BOUNTY'){ const t=m.tgt&&m.tgt.shipRef; return (t&&t.alive)?t.pos:null; }
  if(m.type==='PATROL'||m.type==='LIBERATE'||m.type==='SUPPLY'){ const p=m.tgt&&m.tgt.planetName&&findPlanet(m.tgt.planetName); return p?p.pos:null; }
  if(m.type==='ASSAULT'){ return stronghold?stronghold.pos:null; }
  return null;
}
const missionArrowEl=document.getElementById('missionArrow'), missionArrowGlyphEl=document.getElementById('missionArrowGlyph'), missionArrowLabelEl=document.getElementById('missionArrowLabel');
// bearing math mirrors triggerHitFx/updateHitFx's own established pattern (dot the to-target vector against the
// ship's own RGT/FWD basis) - reused here for a compass-style arrow instead of a damage-direction glow.
function updateMissionArrow(dt){
  if(!missionArrowEl) return;
  const P=ships[0]; const m=window.MISSIONS&&MISSIONS.active&&MISSIONS.active();
  const tp = (P&&P.alive) ? missionTargetPos(m) : null;
  if(!tp){ missionArrowEl.style.opacity='0'; return; }
  _v.copy(tp).sub(P.pos); const dist=_v.length();
  if(dist<1e-3){ missionArrowEl.style.opacity='0'; return; }
  _v.normalize();
  const rx=_v.dot(RGT.clone().applyQuaternion(P.quat)), fz=_v.dot(FWD.clone().applyQuaternion(P.quat));
  const angDeg=Math.atan2(rx,fz)*180/Math.PI;   // 0 = straight ahead (glyph's own resting orientation), +90 = due right, matches triggerHitFx's RGT/FWD sign convention
  missionArrowGlyphEl.style.transform='rotate('+angDeg.toFixed(1)+'deg)';
  missionArrowLabelEl.textContent=(m.title||'MISSION')+' - '+Math.round(dist)+'u';
  missionArrowEl.style.opacity='1';
}

function economyIsOrganic(){ if(planets.length<1) return true; const p=planets[0], g='ore';
  const p0=priceOf(p,g); const probe={credits:1e6,cargo:{},fuel:0}; buy(probe,p,g,30); const pBuy=priceOf(p,g);   // buying drains stock -> price up
  probe.cargo[g]=(probe.cargo[g]||0)+60; sell(probe,p,g,60); const pSell=priceOf(p,g);                          // selling adds stock -> price down
  const ok = pBuy>p0+1e-6 && pSell<pBuy-1e-6;
  console.log(`[economy no-cheat] ore@${p.name}: base ${p0.toFixed(1)} -> +buy ${pBuy.toFixed(1)} -> +sell ${pSell.toFixed(1)}  organic=${ok}`);
  return ok; }

// Recorded once per generation, at the moment it ends (the roster is about to be wiped/reset, so this

// =================================================================================================
const LEADERBOARD_KEY='SF_LEADERBOARD_v1', LEADERBOARD_CAP=100;
function loadLeaderboard(){ try{ const raw=localStorage.getItem(LEADERBOARD_KEY); return raw?JSON.parse(raw):[]; }catch(e){ return []; } }

function recordGenerationResults(gen){

  // (the N5 ledger in thoughts.js) as a ranking axis. THOUGHTS.fitness() is a one-shot snapshot of the WHOLE
  // ledger; call it once here rather than per-ship (this only runs at a generation reset, but no reason to rebuild it in a loop).
  const tf=(window.THOUGHTS&&THOUGHTS.fitness)?THOUGHTS.fitness().pilots:null;
  for(const s of ships){ if(!s.alive && s.role!=='player') continue;   // dead squad AI already had their run scored when they died is out of scope - only living pilots at reset time are "this generation's finishers"
    if(s.team!=='squad') continue;
    rows.push({ name:s.name, isPlayer:s.role==='player', generation:gen, score:Math.round(s.score||0), credits:Math.round(s.credits||0), rank:rankOf(s.score||0).n,
      thoughtFitness:(tf&&tf[s.name])?Math.round(tf[s.name].fitness*100)/100:null }); }
  rows.sort((a,b)=>b.score-a.score);
  saveLeaderboard(rows.slice(0,LEADERBOARD_CAP));   // keep only the all-time top N - unbounded growth across many generations would just bloat localStorage forever
}

      <div style="color:#8fd0ff;font-weight:bold;margin-bottom:4px">TURN-BASED BATTLE <span style="opacity:.5;font-weight:normal"> - a Tami-style away-team fight</span></div>${rows}${ctrl}</div>

  function drawBattleUI(){
    // TAMI-STYLED BATTLE HUD (user 2026-07-07: "the surface fighting still is not using the tami sprites and tami
    // system... copy the tami menus closer"): real type/category icons (assets/tami_icons/, the actual Tami art)
    // + gradient HP bars + affliction chips, via tami_battle_ui.js - a pure renderer, same data this file always had.
    const html = (window.TAMIBATTLEUI ? TAMIBATTLEUI.render(units, cur, bstate, selTech, TECHS, blog, retreatArmed, {tamiData:TAMIDATA, moved}) : legacyBattleHtml());
    if(!setUI(html)) return;   // USER-REPORTED BUG FIX: rewriting innerHTML EVERY frame (60fps) destroyed the buttons
                               // between a real mousedown and mouseup, so no click event ever fired ("couldn't click
                               // anything to attack"). Synthetic .click() in headless tests fires atomically on a live
                               // node - which is exactly why verification missed it. Only re-render on real UI change.
    ui.querySelectorAll('button[data-tech]').forEach(b=>b.onclick=()=>{ const tk=b.getAttribute('data-tech'); selTech=(selTech===tk?null:tk); });
    ui.querySelectorAll('button[data-act]').forEach(b=>b.onclick=()=>{ const a=b.getAttribute('data-act');
      if(a==='retreat'){ if(!retreatArmed){ retreatArmed=true; log('Retreat? Click again to confirm - the party flees with NO rewards.'); } else retreatBattle(); return; }
      retreatArmed=false;
      if(a==='end'){ selTech=null; endTurn(); } else if(a==='return'){ finishBattle(bstate==='win'); } }); }
  function onBattleClick(mx,my){ if(bstate!=='player'||!cur) return; pointer.x=mx/innerWidth*2-1; pointer.y=-(my/innerHeight*2-1); ray.setFromCamera(pointer,bCam);
    // technique targeting?
    if(selTech){ const info=TECHS[selTech]; const hits=ray.intersectObjects(units.filter(u=>u.alive).map(u=>u.mesh),true); if(hits.length){ let m=hits[0].object; while(m.parent&&!units.find(u=>u.mesh===m)) m=m.parent; const tgt=units.find(u=>u.mesh===m);
        if(tgt){ const wantAlly=info.kind==='heal'; if((wantAlly&&tgt.side!=='ally')||(!wantAlly&&tgt.side!=='foe')){ log(`Invalid target for ${info.name}.`); return; }
          if(!inRange(cur,tgt,info.range)){ log(`${tgt.name} is out of range.`); return; } useTech(cur,selTech,tgt); selTech=null; endTurn(); return; } } return; }
    // else move
    const th=ray.intersectObjects(tiles); if(th.length){ const td=th[0].object.userData; const k=td.gx+','+td.gy; if(!moved && reach.has(k)){ cur.gx=td.gx; cur.gy=td.gy; const w=w3(cur.gx,cur.gy); cur.mesh.position.set(w.x,0,w.z); moved=true; reach=new Set(); } } }
  function retreatBattle(){ // RETREAT (shared by legacy + core battles): client-side abandon - NO rewards, foe stays alive.
    // The server session (in-memory) is simply orphaned; nothing to tell it. Works even if the sidecar just died.
    retreatArmed=false; autoStop(); core=null; bScene=null; bstate=''; clearUI();
    term('The party retreats!','sys');
    if(debugBattle){ debugBattle=false; exit(); term('Back aboard your ship - no spoils.','sys'); return; }   // hook/demo-started from orbit: no ground scene to return to
    phase='ground'; term('You fall back to the surface - no spoils, and the hostiles remain.','sys'); }
  function finishBattle(won){ // clear the engaged foe on victory; return to ground (shared by legacy + core battles)
    if(won && pendingFoe){ pendingFoe.alive=false; pendingFoe.mesh.visible=false; }
    retreatArmed=false; autoStop(); core=null; bstate=''; clearUI();
    if(debugBattle){ debugBattle=false; exit(); term(won?'[debugStartBattle] battle complete - victory.':'[debugStartBattle] battle complete - defeat.','sys'); return; }   // hook-started from orbit: no ground scene to return to
    phase='ground'; term(won?'Away team victorious - hostiles cleared.':'Away team routed - you fall back to the surface.', won?'sys':'err');
    if(won && foes.every(f=>!f.alive)) say('Surface clear. Reach the launch pad and press F to return to orbit.'); }

  // ================================ CORE BATTLE: rendered ENTIRELY from the C# sidecar STATE ================================
  // Contract (localhost:7877): GET /battle/new?seed=N -> {id,state}; /battle/state?id= and /battle/act?id=&unit=&do=... -> STATE.
  // ALL battle math (hit/damage/type/STAB/crit) runs in the shipping Tami C# core on the sidecar - this client only renders
  // STATE and posts intents (move/strike/tech/pass). Enemy turns arrive already resolved. If the sidecar dies between the
  // health-check and battle start, we fall back to the legacy local battle gracefully.
  function coreW3(x,y){ const g=core.state.grid; return new T.Vector3((x-(g.w-1)/2)*G.TILE, 0, (y-(g.h-1)/2)*G.TILE); }
  async function startCoreBattle(foe){ pendingFoe=foe; phase='battle'; bstate=''; retreatArmed=false;
    core={ id:null, state:null, scene:null, cam:null, tiles:[], mesh:{}, arm:null, busy:true, note:'contacting battle core…', logSeen:0, logLines:[], rewarded:false, pollT:0 };
    try{ const j=await TAMI_CS.battleNew((Date.now()%1000000)|0);                                   // seed drives ALL server-side rolls (reproducible)
      if(!j||!j.state||!j.state.units) throw new Error((j&&j.error)||'bad /battle/new response');
      core.id=j.id; coreScene(j.state); coreSync(j.state); core.busy=false; core.note=''; }
    catch(e){ console.warn('core battle unavailable - legacy fallback:',e); core=null; buildBattleLegacy(foe); } }
  function coreScene(st){ core.state=st; const gw=st.grid.w, gh=st.grid.h;
    const sc=new T.Scene(); const sk=0x0c1220; sc.background=new T.Color(sk); sc.fog=new T.Fog(sk,50,130);
    sc.add(new T.HemisphereLight(0xcfe0ff,0x10131c,1.0)); const sun=new T.DirectionalLight(0xffffff,0.9); sun.position.set(20,40,15); sc.add(sun);
    core.tiles=[]; for(let y=0;y<gh;y++) for(let x=0;x<gw;x++){ const dark=(x+y)%2; const m=new T.Mesh(new T.BoxGeometry(G.TILE*0.96,0.4,G.TILE*0.96), new T.MeshStandardMaterial({color:dark?0x1b2740:0x223150,roughness:0.9}));
      const w=coreW3(x,y); m.position.set(w.x,-0.2,w.z); m.userData={gx:x,gy:y,base:dark?0x1b2740:0x223150}; sc.add(m); core.tiles.push(m); }
    core.scene=sc; core.cam=new T.PerspectiveCamera(52,innerWidth/innerHeight,0.1,600); core.cam.position.set(0,34,30); core.cam.lookAt(0,0,2); bCam=core.cam; }
  function coreUnitMesh(u){ const g=new T.Group(); const col=u.side==='party'?0x46d6ff:0xff5a6e;
    const b=new T.Mesh(new T.CylinderGeometry(0.9,1.1,2.2,12), new T.MeshStandardMaterial({color:col,emissive:new T.Color(col).multiplyScalar(0.18),roughness:0.5})); b.position.y=1.3; g.add(b);
    const h=new T.Mesh(new T.SphereGeometry(0.7,14,10), new T.MeshStandardMaterial({color:0xeaf4ff,roughness:0.4})); h.position.y=2.7; g.add(h);
    const lb=spriteText(u.name,22,'#eaf2ff',{bg:'rgba(9,16,28,0.7)',pad:5,r:6,align:'center',ws:0.07}); g.add(lb.sp); return g; }
  function coreSync(st){ core.state=st;
    for(const u of st.units){ let g=core.mesh[u.id]; if(!g){ g=coreUnitMesh(u); core.scene.add(g); core.mesh[u.id]=g; }
      const w=coreW3(u.x,u.y); g.position.set(w.x,0,w.z); g.visible=!!u.alive; }
    if(Array.isArray(st.log)){ if(st.log.length<core.logSeen) core.logSeen=0;                       // tolerate a server-side log reset/window
      for(let i=core.logSeen;i<st.log.length;i++) core.logLines.push(st.log[i]); core.logSeen=st.log.length;
      if(core.logLines.length>80) core.logLines=core.logLines.slice(-80); }
    core.arm=null;
    if(st.result && !core.rewarded){ core.rewarded=true;                                            // apply rewards ONCE, when the result first arrives
      if(st.result==='victory' && st.rewards && st.rewards.credits && typeof ships!=='undefined' && ships[0]){ ships[0].credits+=st.rewards.credits; term(`Battle spoils: <span style="color:#ffcf52">+${st.rewards.credits}c</span>.`,'sys'); }
      if(st.result==='victory') awayVictoryHooks(); } }
  function coreCanMove(cu,x,y){ const st=core.state; if(x<0||y<0||x>=st.grid.w||y>=st.grid.h) return false;
    if(x===cu.x&&y===cu.y) return false; if(Math.abs(cu.x-x)+Math.abs(cu.y-y)>(cu.moveH||1)) return false;
    return !st.units.some(u=>u.alive&&u.x===x&&u.y===y); }                                          // Manhattan <= moveH, cell free, in bounds (mirrors server rule for the highlight)
  function corePaintTiles(cu){ const st=core.state;
    for(const m of core.tiles){ let c=m.userData.base; const x=m.userData.gx,y=m.userData.gy;
      if(cu&&cu.side==='party'&&!st.result&&!core.busy){
        if(core.arm){ const r=Math.max(1,core.arm.range||1); if(Math.abs(cu.x-x)+Math.abs(cu.y-y)<=r&&!(x===cu.x&&y===cu.y)) c=0x5c2a2a; }   // attack range preview
        else if(coreCanMove(cu,x,y)) c=0x2f6a4a; }                                                                                            // movable cells
      m.material.color.setHex(c); }
    if(cu){ const t=core.tiles.find(m=>m.userData.gx===cu.x&&m.userData.gy===cu.y); if(t) t.material.color.setHex(cu.side==='party'?0x2a5b8c:0x7a2436); } }
  function coreLogLine(l){ const esc=String(l).replace(/&/g,'&amp;').replace(/</g,'&lt;');
    if(/super effective/i.test(l)) return `<b style="color:#7fdc8a">${esc}</b>`;
    if(/resisted/i.test(l)) return `<span style="color:#c9a26a">${esc}</span>`;
    if(/crit/i.test(l)) return `<span style="color:#ffcf52">${esc}</span>`;
    if(/miss/i.test(l)) return `<span style="opacity:.65">${esc}</span>`;
    return esc; }
  function frameCore(dt){ bt+=dt;
    if(!core.state||!core.scene){ setUI(`<div style="position:absolute;top:12px;left:12px;background:rgba(6,11,20,.82);border:1px solid #22344c;border-radius:10px;padding:10px 12px;color:#cfe2f5">⚔ ${core.note||'contacting battle core…'}</div>`); return; }
    const st=core.state, cu=st.units.find(u=>u.id===st.current);
    for(const u of st.units){ const g=core.mesh[u.id]; if(g&&g.visible) g.position.y=(cu&&u.id===cu.id&&!st.result)?Math.abs(Math.sin(bt*4))*0.5:0; }
    if(!st.result&&!core.busy&&cu&&cu.side==='enemy'){ core.pollT+=dt; if(core.pollT>0.9){ core.pollT=0; coreRefresh(); } }   // defensive: act/new should already leave a party unit current
    corePaintTiles(cu); drawCoreUI(cu); rend.render(core.scene,core.cam); }
  function drawCoreUI(cu){ const st=core.state;
    const rows=st.units.map(u=>{ const dead=!u.alive; const bar=Math.max(0,Math.min(20,Math.round(20*u.hp/Math.max(1,u.maxHp))));

    const mkBtn=(key,body,on,dis)=>`<button data-core="${key}" ${dis?'disabled':''} style="pointer-events:auto;margin:3px;padding:6px 9px;border-radius:7px;border:1px solid ${on?'#9fe6ff':'#2a3f5c'};background:${on?'#173049':'#0e1a2a'};color:${dis?'#5a6a80':'#cfe2f5'};font:inherit;cursor:${dis?'default':'pointer'}">${body}</button>`;

    else if(st.result==='defeat'){ ctrl=`<div style="margin-top:8px;color:#ff6a6a;font-size:16px">✖ DEFEAT - you retreat to your ship.</div>${mkBtn('return','Retreat')}`; }
    else if(core.busy){ ctrl=`<div style="margin-top:6px;opacity:.7">resolving…</div>`; }
    else if(cu&&cu.side==='party'){

      let btns=sk?mkBtn('strike',`${pretty(sk.id)} <span style="opacity:.6">⚔ ${sk.element} r${Math.max(1,sk.range||1)}${sk.ap?` +${sk.ap}AP`:''}</span>`,sOn,false):'';
      btns+=(cu.techs||[]).map(t=>{ const on=core.arm&&core.arm.kind==='tech'&&core.arm.id===t.id;
        return mkBtn(`tech:${t.id}`,`${pretty(t.id)} <span style="opacity:.6">✦ ${t.element} ${t.ap}AP r${Math.max(1,t.range||1)}</span>`,on,cu.ap<t.ap); }).join('');
      btns+=mkBtn('pass','Pass',false,false);
      btns+=mkBtn('retreat',retreatArmed?'<span style="color:#ff9a9a">Confirm retreat?</span>':'Retreat',retreatArmed,false);
      ctrl=`<div style="margin-top:6px"><span style="opacity:.7">click a green tile to MOVE, or</span> pick an action:</div>${btns}`;
      if(core.arm) ctrl+=`<div style="margin-top:4px;color:#9fe6ff">${core.arm.kind==='strike'?pretty(sk&&sk.id):pretty(core.arm.id)} armed - click a red foe in range (${Math.max(1,core.arm.range||1)}).</div>`; }
    else ctrl=`<div style="margin-top:6px;opacity:.7">${cu?cu.name+' (enemy) is acting…':'…'}</div>`;
    if(core.note) ctrl+=`<div style="margin-top:4px;color:#ff9a9a">${core.note}</div>`;
    const html=`<div style="position:absolute;top:12px;left:12px;right:12px;max-width:470px;background:rgba(6,11,20,.82);border:1px solid #22344c;border-radius:10px;padding:10px 12px">
      <div style="color:#8fd0ff;font-weight:bold;margin-bottom:4px">TURN-BASED BATTLE <span style="opacity:.5;font-weight:normal"> - live Tami C# core${core.id?` · ${core.id}`:''}</span></div>${rows}${ctrl}</div>
      <div style="position:absolute;bottom:12px;left:12px;right:12px;color:#9fb3cc">${core.logLines.slice(-6).map(l=>'· '+coreLogLine(l)).join('<br>')}</div>`;
    if(!setUI(html)) return;   // same click-eating fix as drawBattleUI: never rewrite the DOM mid-click when nothing changed

      else if(k==='strike'){ const s=cu&&cu.strike; core.arm=(core.arm&&core.arm.kind==='strike')?null:{kind:'strike',range:(s&&s.range)||1}; }
      else if(k.indexOf('tech:')===0){ const id=k.slice(5); const t=(cu.techs||[]).find(t=>t.id===id);
