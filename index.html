<style>

  #roster{ left:14px; top:44px; display:flex; flex-direction:column; gap:4px; pointer-events:auto; }

  .rs .fac{ font-size:10px; flex:0 0 auto; }   /* faction emblem (GIVEN flavor): ◈ Coalition · ✖ Iron Synod */
  .rs.war{ border-left:3px solid var(--cyan); } .rs.war .fac{ color:var(--cyan); }
  .rs.syn{ border-left:3px solid var(--red); } .rs.syn .fac{ color:var(--red); }
  .rs .nm{ flex:1 1 auto; } .rs .cr{ color:var(--gold); font-size:10px; }

  #ticker{ left:14px; bottom:54px; width:46%; max-width:600px; max-height:40vh; overflow-y:auto;
    font:600 11.5px/1.55 ui-monospace,monospace; background:#08101ae8; border:1px solid #1b2a3c; border-radius:8px; pointer-events:auto; }

  #market{ position:fixed; top:10px; transform:translateX(-50%); z-index:6; pointer-events:none;

  #market .mkt-k{ color:#5f7a98; font-weight:500; }
  #market table{ border-collapse:collapse; font:600 11px/1 ui-monospace,monospace; }
  #market th{ color:#8ea4be; font-weight:700; padding:2px 7px; text-align:center; font-size:10px; }
  #market .mkt-t{ color:#5f7a98; font-weight:500; font-size:8.5px; }

  #market .mkt-g{ text-align:left; color:#9fb6cc; }
  #market .mkt-s{ margin-top:6px; font:600 10.5px/1.4 ui-monospace,monospace; color:#b8c6d8; border-top:1px solid #1a2636; padding-top:5px; }

  #touchbar button:active{ background:#16324a; }
  body.touch #touchbar{ display:flex; }

  #stick{ position:fixed; z-index:9; left:16px; bottom:80px; width:110px; height:110px; border-radius:50%; display:none; background:#0c182688; border:1px solid #3a6a8a; touch-action:none; pointer-events:auto; }

  #btnThr:active,#btnFire:active{ filter:brightness(1.5); }
  body.touch #stick, body.touch #btnThr, body.touch #btnFire{ display:block; }

    #pillars{ display:none; }
    #roster{ top:8px; left:8px; flex-direction:row; flex-wrap:nowrap; gap:5px; overflow-x:auto; max-width:calc(100% - 66px); -webkit-overflow-scrolling:touch; }
    .rs{ width:auto; flex:0 0 auto; padding:5px 8px; }
    #ticker{ left:8px; width:calc(100% - 16px); max-width:none; top:48px; bottom:auto; max-height:22vh; font-size:12px; }
    #ticker.big{ width:calc(100% - 16px); max-width:none; max-height:52vh; }
    .vlabel{ font-size:9px; } .vlabel span{ display:none; }
    #chat{ left:8px !important; width:calc(100% - 16px) !important; height:42px; font-size:16px; line-height:42px; bottom:12px; }
    #market{ font-size:11px; max-width:94vw; left:50% !important; }
  }

// =================================================================================================
//  REAL UNITY ASSETS (user 2026-07-07: "bring in all models and assets from the starfighter game").
//  The original Starfighter2 FBX models load IN THE BROWSER via three's FBXLoader (vendored, r128):
//  vehicle_playerShip (the orange Warden hull) · vehicle_enemyShip (Synod, red/purple) · Spaceship
//  (freighter) · 6 asteroid + 3 gem shapes. A LoadingManager URL-modifier redirects the FBX's baked
//  Unity .tif texture paths onto our PIL-converted PNGs (assets/*.png) — no 404 spam, real skins.
//  EVERYTHING falls back to the procedural meshes if a file is missing: the game never breaks.
// =================================================================================================
const ASSET_CFG={ DIR:'assets/', SHIP_LEN:6.0, SHIP_YAW:Math.PI, ENG_Z:0.46,   // nose→-Z (Unity fwd is +Z), length-normalized; engine glow at the tail
  GEM_SIZE:3.0, AST_UNIT:1.0, TRADER_LEN:6.6, PIRATE_LEN:6.4,
  VIS_SCALE:{scout:0.8,fighter:1.0,interceptor:1.05,freighter:1.5,cruiser:1.62,dreadnought:1.95} };  // hull-class silhouette scale
const ASSETS={ ready:false, ships:{}, astGeos:[], gemGeos:[] };
const TEX_MAP=[ ['playership_orange_dff','playerShip_dff.png'], ['playership_orange_nrm','playerShip_nrm.png'],
  ['enemyship_red_dff','enemyShip_red_dff.png'], ['enemyship_purple_dff','enemyShip_purple_dff.png'],
  ['enemyship_nrm','enemyShip_nrm.png'], ['flyerplayershipalbedo','spaceship_dff.png'], ['emission','spaceship_emm.png'] ];
const PIXEL_URI='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==';
function assetURL(url){ const u=String(url).toLowerCase().replace(/\\/g,'/');
  for(const [pat,file] of TEX_MAP) if(u.includes(pat)) return ASSET_CFG.DIR+file;
  if(/\.(tif|tga|psd|bmp)$/.test(u)) return PIXEL_URI;                          // unmapped Unity refs → 1px, never 404
  return url; }
// BUG FIX (user report "player ship appears black"): the old Unity FBX files never had their textures actually
// EMBEDDED — Unity assigns materials via separate .mat files outside the mesh, so FBXLoader hands back a
// MeshPhongMaterial whose `map` slot is a Texture object with NO `.image` ever resolved. A material that
// declares a map but never uploads one samples pure black in the shader — hence the silhouette rendering solid
// black regardless of the URL-modifier above (confirmed: zero PNG fetches ever fired for the ship materials).
// Fix: load OUR OWN textures directly and force-assign them after the FBX loads, instead of trusting its baked
// material. flipY=false matches how three.js's own FBXLoader treats FBX-sourced UVs.
const SHIP_TEX_LOADER=new T.TextureLoader();
function shipTex(file){ const t=SHIP_TEX_LOADER.load(ASSET_CFG.DIR+file); t.flipY=false; t.encoding=T.sRGBEncoding; t.wrapS=t.wrapT=T.RepeatWrapping; return t; }
const SHIP_TEX={ player:shipTex('playerShip_dff.png'), playerNrm:shipTex('playerShip_nrm.png'),
  enemyRed:shipTex('enemyShip_red_dff.png'), enemyPurple:shipTex('enemyShip_purple_dff.png'), enemyNrm:shipTex('enemyShip_nrm.png') };
function fixShipMaterial(o, map, nrm, tintHex){
  const ms=Array.isArray(o.material)?o.material:[o.material];
  for(let i=0;i<ms.length;i++){ const m=ms[i]=ms[i].clone();
    m.map=map; if(nrm && 'normalMap' in m) m.normalMap=nrm; m.color.set(0xffffff); if(tintHex!=null) m.color.lerp(new T.Color(tintHex),0.35);
    if('emissive' in m) m.emissive=new T.Color(tintHex!=null?tintHex:0x000000).multiplyScalar(tintHex!=null?0.22:0);
    m.needsUpdate=true; if(Array.isArray(o.material)) o.material[i]=m; else o.material=m; } }
function normalizeModel(grp,targetLen){ const box=new T.Box3().setFromObject(grp), size=box.getSize(new T.Vector3()), c=box.getCenter(new T.Vector3());
  const len=Math.max(size.x,size.y,size.z)||1, k=targetLen/len;
  const inner=new T.Group(); inner.add(grp); grp.position.sub(c);              // recenter…
  inner.scale.setScalar(k); inner.rotation.y=ASSET_CFG.SHIP_YAW;              // …resize, nose to -Z
  const wrap=new T.Group(); wrap.add(inner); return wrap; }
function firstGeo(grp){ let g=null; grp.traverse(o=>{ if(!g&&o.isMesh&&o.geometry) g=o.geometry; }); return g?g.clone():null; }
function normGeo(geo,target){ geo.computeBoundingBox(); const s=geo.boundingBox.getSize(new T.Vector3());
  const k=target/(Math.max(s.x,s.y,s.z)||1); const c=geo.boundingBox.getCenter(new T.Vector3());
  geo.translate(-c.x,-c.y,-c.z); geo.scale(k,k,k); return geo; }
function loadGameAssets(){ if(typeof T.FBXLoader==='undefined') return;        // loader not vendored → stay procedural
  const mgr=new T.LoadingManager(); mgr.setURLModifier(assetURL);
  const L=new T.FBXLoader(mgr); const dir=ASSET_CFG.DIR; let shipsLeft=3;
  const shipDone=()=>{ if(--shipsLeft>0) return; ASSETS.ready=true;
    let n=0; for(const s of ships){ if(applyShipModel(s)) n++; }               // retrofit everything already flying
    notify(`Original Starfighter2 hulls online — ${n} ships re-skinned (player/Synod/freighter FBX + real textures).`,'log'); };
  const grab=(file,cb,fin)=>L.load(dir+file, g=>{ try{ cb(g); }catch(e){ console.warn('asset',file,e); } if(fin)fin(); }, undefined, ()=>{ if(fin)fin(); });
  grab('vehicle_playerShip.FBX', g=>{ ASSETS.ships.player=normalizeModel(g,ASSET_CFG.SHIP_LEN); }, shipDone);
  grab('vehicle_enemyShip.FBX',  g=>{ ASSETS.ships.enemy =normalizeModel(g,ASSET_CFG.PIRATE_LEN); }, shipDone);
  grab('Spaceship.fbx',          g=>{ ASSETS.ships.trader=normalizeModel(g,ASSET_CFG.TRADER_LEN); }, shipDone);
  for(const f of ['prop_asteroid_01.FBX','prop_asteroid_02.FBX','prop_asteroid_03.FBX','astre_0.FBX','astre_5.FBX','astre_10.FBX'])
    grab(f, g=>{ const geo=firstGeo(g); if(geo) ASSETS.astGeos.push(normGeo(geo,ASSET_CFG.AST_UNIT*2)); });
  for(const f of ['Diamondo.fbx','HardStar.fbx','SphereGemSmall.fbx'])
    grab(f, g=>{ const geo=firstGeo(g); if(geo) ASSETS.gemGeos.push(normGeo(geo,ASSET_CFG.GEM_SIZE)); });
}
function shipModelKey(s){ if(s.team==='pirate') return 'enemy'; if(s.role==='trader') return 'trader'; return 'player'; }
function applyShipModel(s){ const key=shipModelKey(s), base=ASSETS.ships[key]; if(!base||!s.mesh) return false;
  const grp=base.clone(true);                                                  // clone shares geometry; clone materials only where tinted
  if(s.team==='pirate'){ const HT=HEG_TIERS[Math.min(s.tier||0,HEG_TIERS.length-1)];
    const rMap=(s.id%2===0)?SHIP_TEX.enemyRed:SHIP_TEX.enemyPurple;             // alternate skins for visual variety across the Synod fleet
    grp.traverse(o=>{ if(o.isMesh) fixShipMaterial(o, rMap, SHIP_TEX.enemyNrm, HT.col); });
    grp.scale.setScalar(HT.scale); }
  else{ grp.traverse(o=>{ if(o.isMesh) fixShipMaterial(o, SHIP_TEX.player, SHIP_TEX.playerNrm, s.role==='trader'?0x9fb0c0:null); });   // traders: a cool grey wash on the same good texture (their own bundled skin was a broken 32x32)
    if(s.hullClass && ASSET_CFG.VIS_SCALE[s.hullClass]) grp.scale.setScalar(ASSET_CFG.VIS_SCALE[s.hullClass]); }
  const eng=new T.Sprite(new T.SpriteMaterial({map:GLOW,color:new T.Color().setHSL(s.hue,0.9,0.62),blending:T.AdditiveBlending,transparent:true,depthWrite:false}));
  eng.scale.set(1.7,1.7,1); eng.position.set(0,0,ASSET_CFG.SHIP_LEN*ASSET_CFG.ENG_Z); grp.add(eng); grp.userData.eng=eng;   // step() dereferences userData.eng UNGUARDED — always present
  grp.position.copy(s.pos); grp.quaternion.copy(s.quat); grp.visible=s.mesh.visible;
  scene.remove(s.mesh); s.mesh=grp; scene.add(grp); return true; }

function rockMesh(scale,light){ let g;

// swept bullet collision: distance² from point p to the segment a→b (this frame's travel). A point-only test tunnels

// "bullets don't collide". Testing the whole travel segment makes hits frame-rate independent.
function segDistSq(a,b,p){ const abx=b.x-a.x, aby=b.y-a.y, abz=b.z-a.z; const L=abx*abx+aby*aby+abz*abz||1e-9;

  else { const g=GOODS[randi(0,GOODS.length-1)], need=randi(3,8); ct={type:'supply', good:g.k, need, reward:Math.round(need*g.base*1.6)+randi(0,50), rep:CFG.CONTRACT_REP, desc:`Deliver ${need} ${g.n} to ${issuer.name}`}; }
  ct.id=nextContractId++; ct.issuer=issuer; ct.accepted=false; ct.done=false; ct.born=T0; return ct; }

function contractKill(){ for(const c of contracts) if(c.accepted&&!c.done&&c.type==='bounty'){ c.got++; if(c.got>=c.need) completeContract(c); } }

function econTick(dt){ for(const p of planets){ const mk=p.type.makes,nd=p.type.needs, devP=1+CFG.DEV_PROD*(p.dev-1), war=(p.system&&p.system.contested)?CFG.CONTESTED_PROD:1;
  const infra=(window.CONQUEST&&CONQUEST.infraMult)?CONQUEST.infraMult(p):1;   // 4X infrastructure (user): a damaged world produces less until it rebuilds — trade routes dry up

// ---------------------------------------------------------------- physics
function flyStep(s,dt){
  _q.setFromAxisAngle(RGT,s.ctrl.pitch*CFG.PITCH_RATE*dt); s.quat.multiply(_q);
  _q.setFromAxisAngle(UPL,-s.ctrl.yaw*CFG.YAW_RATE*dt);    s.quat.multiply(_q); s.quat.normalize();
  s.bank=lerp(s.bank,-s.ctrl.yaw*CFG.BANK_MAX,1-Math.exp(-CFG.BANK_LERP*dt));
  const fwd=FWD.clone().applyQuaternion(s.quat);
  s.vel.addScaledVector(fwd,CFG.THRUST*(1+CFG.ENGINE_GAIN*(s.lvl.engine-1))*(s.hullSpeed||1)*s.ctrl.thr*dt);   // M9: hull class speed multiplier
  s.vel.multiplyScalar(Math.exp(-CFG.DRAG*dt));
  const vmax=CFG.VMAX*(1+CFG.ENGINE_GAIN*(s.lvl.engine-1)); if(s.vel.length()>vmax) s.vel.setLength(vmax);
  s.pos.addScaledVector(s.vel,dt);
  if(s.pos.length()>CFG.ARENA_R-CFG.SHIP_R){ s.pos.setLength(CFG.ARENA_R-CFG.SHIP_R); const n=s.pos.clone().normalize(); s.vel.addScaledVector(n,-1.5*s.vel.dot(n)); }
  for(let pi=0;pi<planets.length;pi++){ const p=planets[pi], effR=p.radius*(p.mesh.scale.x||1)+CFG.SHIP_R, dd=s.pos.distanceTo(p.pos);   // don't fly through planets
    if(dd<effR){ const n=_v2.copy(s.pos).sub(p.pos); if(n.lengthSq()<1e-4) n.set(1,0,0); n.setLength(1);
      s.pos.copy(p.pos).addScaledVector(n,effR);                                    // place on the surface (no penetration)
      const vn=s.vel.dot(n);
      if(vn<0){ s.vel.addScaledVector(n,-vn);                                       // CANCEL the inward component (was *1.25 = an energy-ADDING fling; that was the janky "bounce off planets" physics)
        const tang=_v.copy(s.vel).addScaledVector(n,-s.vel.dot(n)); s.vel.copy(n).multiplyScalar(vn*-0.12).add(tang.multiplyScalar(0.92)); } } }   // soft 12% bounce + light surface friction on the tangent → you SLIDE along a planet, not pinball
  s.hp=Math.min(s.maxHp,s.hp+(CFG.REGEN+(s.regenBonus||0))*dt); s.iframe=Math.max(0,s.iframe-dt);   // M3: repair droid adds regen
  _q.setFromAxisAngle(FWD,s.bank); s.mesh.position.copy(s.pos); s.mesh.quaternion.copy(s.quat).multiply(_q);
  s.mesh.userData.eng.material.opacity=0.3+0.5*s.ctrl.thr; s.mesh.userData.eng.scale.setScalar(1.3+1.5*s.ctrl.thr);
}

function ffCanHit(owner,victim){

  if(victim.role==='player'&&owner.huntTarget===victim&&T0<(owner.huntUntil||0)) return true;     // a retaliating teammate's return fire lands on the player
  return false; }
function ffRetaliate(victim,owner){ if(!owner||owner.role!=='player'||!victim||!victim.alive||victim===owner||victim.team!==owner.team) return;
  if(victim.huntTarget!==owner){ ev(`You're shooting at YOUR OWN coalition — <b>${victim.name}</b> returns fire!`); say(victim,`You TRAITOR — returning fire!`); }
  victim.huntTarget=owner; victim.huntUntil=T0+CFG.FF_RETALIATE_SEC; }
// ---- ship-vs-ship body collision (user report "ships fly through each other") ----
const _cn=new T.Vector3(),_cv=new T.Vector3();   // dedicated scratch (killShip clobbers _v2 mid-loop)
function shipCollisions(){
  const minD=2*CFG.SHIP_R, minDSq=minD*minD, skipD=CFG.SHIP_COLLIDE_SKIP_MULT*CFG.SHIP_R;
  for(let i=0;i<ships.length;i++){ const a=ships[i]; if(!a.alive||a.warping||a.docked) continue;
    for(let j=i+1;j<ships.length;j++){ const c=ships[j]; if(!c.alive||c.warping||c.docked) continue;
      if(Math.abs(a.pos.x-c.pos.x)>skipD||Math.abs(a.pos.z-c.pos.z)>skipD||Math.abs(a.pos.y-c.pos.y)>skipD) continue;   // cheap broadphase early reject
      const dSq=a.pos.distanceToSquared(c.pos); if(dSq>=minDSq) continue;
      _cn.copy(c.pos).sub(a.pos); if(_cn.lengthSq()<1e-6) _cn.set(1,0,0); _cn.normalize();
      const overlap=minD-Math.sqrt(dSq);
      a.pos.addScaledVector(_cn,-overlap*0.5); c.pos.addScaledVector(_cn,overlap*0.5);            // position correction, half each
      const closing=_cv.copy(a.vel).sub(c.vel).dot(_cn);                                          // approach speed along the separation axis
      if(closing>0){ const imp=(1+CFG.SHIP_BOUNCE)*0.5*closing;                                   // elastic-ish impulse (equal masses)
        a.vel.addScaledVector(_cn,-imp); c.vel.addScaledVector(_cn,imp);
        if(closing>CFG.SHIP_RAM_MIN_SPEED){ const dmg=closing*CFG.RAM_DMG_SCALE;                  // hull scrape on a hard ram (iframe respected)

          if(a.iframe<=0){ if(a.inhabitant) INH.onDamaged(c.name,dmg); a.hp-=dmg; a.iframe=CFG.IFRAME; if(a.hp<=0) killByShip(a,c); }
          if(c.iframe<=0){ if(c.inhabitant) INH.onDamaged(a.name,dmg); c.hp-=dmg; c.iframe=CFG.IFRAME; if(c.hp<=0) killByShip(c,a); } } }
      a.mesh.position.copy(a.pos); c.mesh.position.copy(c.pos); } } }

  for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i], owner=shipById[b.owner];

// adds it). Ablation toggle = no delete-on-success (the bench's reinforce=false arm): visibly NEVER converges.
function watchConvention(ablation){ const POP=30, STEPS_PER_FRAME=4, CAP=9000;   // POP == convention_vec.js CFG.POP
  const seed=5+(WATCH_SEED_BUMP++);
  const rng=WATCH.mulberry32(seed);
  const inv=Array.from({length:POP},()=>new Set()); let nextName=0, steps=0, lastPair=null, done=false;
  WATCH.show('WATCH: emergent convention — the naming game (LIVE run of convention_vec.js mechanics)',
    (ablation?'<b style="color:#ff9a9a">ABLATION: no delete-on-success</b> — inventories only grow; no shared name can win.':'success → BOTH agents keep only the agreed name; failure → listener learns it.')+' seed '+seed);
  WATCH.setToggle(ablation?'run NORMAL dynamics':'run ABLATION (no reinforcement)', ()=>watchConvention(!ablation));
  const hue=n=>(n*137.508)%360;                                                   // golden-angle name->colour
  function interact(){ let s=(rng()*POP)|0, l=(rng()*POP)|0; while(l===s) l=(rng()*POP)|0;
    const arr=[...inv[s]]; const name=arr.length?arr[(rng()*arr.length)|0]:(inv[s].add(nextName), nextName++);
    let ok=false; if(inv[l].has(name)){ ok=true; if(!ablation){ inv[s].clear(); inv[s].add(name); inv[l].clear(); inv[l].add(name); } }
    else inv[l].add(name);
    lastPair=[s,l,ok]; steps++; }
  function consensus(){ const tally=new Map(); let committed=0; for(const s of inv){ if(s.size===1){ committed++; const n=[...s][0]; tally.set(n,(tally.get(n)||0)+1); } }
    let best=0; for(const [,c] of tally) if(c>best) best=c; return { frac:best/POP, committed }; }
  const ctx=WATCH.ctx, W=WATCH.cv.width, H=WATCH.cv.height, cx=W/2, cy=H/2-14, R=110;
  const pos=i=>[cx+R*Math.cos(2*Math.PI*i/POP-Math.PI/2), cy+R*Math.sin(2*Math.PI*i/POP-Math.PI/2)];
  WATCH.loop(()=>{ if(!done) for(let k=0;k<STEPS_PER_FRAME;k++) interact();
    const c=consensus();
    ctx.clearRect(0,0,W,H);
    if(lastPair){ const [s,l,ok]=lastPair; const [x1,y1]=pos(s),[x2,y2]=pos(l); ctx.strokeStyle=ok?'#42d97c':'#d94a4a'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
    for(let i=0;i<POP;i++){ const [x,y]=pos(i); const s=inv[i];
      ctx.fillStyle = s.size===1 ? `hsl(${hue([...s][0])},85%,60%)` : '#5a6a78';
      ctx.beginPath(); ctx.arc(x,y,s.size===1?7:5,0,7); ctx.fill();
      if(s.size>1){ ctx.fillStyle='#9fb0bf'; ctx.font='8px monospace'; ctx.fillText(String(s.size), x-2, y+3); } }
    ctx.fillStyle='#cfe6f5'; ctx.font='11px monospace'; ctx.fillText(`step ${steps}   committed ${c.committed}/${POP}`, 10, H-26);
    ctx.fillStyle='#14283c'; ctx.fillRect(10,H-18,W-20,10); ctx.fillStyle=c.frac>=1?'#42d97c':'#7fb2d8'; ctx.fillRect(10,H-18,(W-20)*c.frac,10);
    ctx.fillStyle='#cfe6f5'; ctx.fillText(`consensus ${(c.frac).toFixed(2)}`, W-110, H-26);
    if(!done && !ablation && c.frac>=1){ done=true; WATCH.setSub(`<b style="color:#42d97c">CONVERGED at step ${steps}</b> — the population symmetry-broke onto ONE arbitrary name (seed ${seed}; rerun → a different winner). Bench: convention_vec.js${benchBadge('convention_vec')}`); }
    if(!done && ablation && steps>=CAP){ done=true; WATCH.setSub(`<b style="color:#ff9a9a">NO CONVERGENCE after ${steps} steps</b> — committed ${c.committed}/${POP}: without delete-on-success, inventories only grow. The alignment dynamic is load-bearing. Bench: convention_vec.js${benchBadge('convention_vec')}`); }
    return true; });
}

// ===== A0: GROUNDED REASONING CHAIN — a 10-link TDRE-style chain-of-thought tracing the pilot's REAL decision =====
// Honest: every line reads real perceptions + the pilot's actual brain.mode/target (no fabrication; hold/abstain when uncertain).
// Structure mirrors the TDRE reasoning engine: parallel hypotheses (rays) → evidence → defeasible prune → verify → commit → predict/learn.
function reasonChain(s){ if(!s) return []; const b=s.brain||{}, sr=s.senseR||CFG.SENSE_R, dsort=(a,c)=>s.pos.distanceTo(a.pos)-s.pos.distanceTo(c.pos);
  const enemies=ships.filter(o=>o.alive&&o.team!==s.team&&s.pos.distanceTo(o.pos)<sr).sort(dsort);
  const allies=ships.filter(o=>o!==s&&o.alive&&o.team===s.team&&s.pos.distanceTo(o.pos)<sr);
  const rocks=asteroids.filter(a=>s.pos.distanceTo(a.pos)<sr).sort(dsort);
  const gm=gems.filter(g=>!g.artifact&&s.pos.distanceTo(g.pos)<sr).sort(dsort);
  const hpPct=Math.round(100*s.hp/Math.max(1,s.maxHp)), near=enemies[0], nd=near?Math.round(s.pos.distanceTo(near.pos)):null;
  const tgt=b.target, mode=b.mode||s.mode||'HOLD', c=b.ctrl||s.ctrl||{}, dot=b.dot||0;
  const ch=[];
  ch.push(`① perceive — sensor r${sr|0}: ${enemies.length} hostile · ${allies.length} ally · ${rocks.length} rock · ${gm.length} gem.`);
  ch.push(`② self — hull ${hpPct}% · ${s.credits|0}c · fuel ${(s.fuel||0)|0} · ${WEAPONS[s.weaponType||'energy'].n} W${s.lvl.weapon}.`);
  ch.push(`③ recall — ${s.foeNote?('logged: '+s.foeNote):(s.deaths?('lost hull '+s.deaths+'× here — stay wary.'):'no prior contacts on file.')}`);
  const H=[]; if(near) H.push('ENGAGE '+near.name); if(gm.length) H.push('COLLECT gem'); if(rocks.length) H.push('MINE rock'); if(hpPct<45) H.push('FLEE+regen'); if(s.role==='trader') H.push('TRADE'); if(!H.length) H.push('PATROL');
  ch.push(`④ hypotheses — ${H.length} rays: ${H.join(' · ')}.`);
  const evd=[]; if(near) evd.push(`${near.name}@${nd}u hull${Math.round(100*near.hp/Math.max(1,near.maxHp))}%`); if(gm.length) evd.push(`gem@${Math.round(s.pos.distanceTo(gm[0].pos))}u`); if(rocks.length) evd.push(`rock@${Math.round(s.pos.distanceTo(rocks[0].pos))}u`);
  ch.push(`⑤ evidence — ${evd.join(' · ')||'sector quiet'}.`);
  let prune='no contradiction — rays hold.';
  if(hpPct<45&&near) prune=`hull ${hpPct}%<45% ⟹ defeat ENGAGE (survive first).`;
  else if(near&&near.hp>s.hp*1.5) prune=`${near.name} out-hulls me ~${(near.hp/Math.max(1,s.hp)).toFixed(1)}× ⟹ defeat ENGAGE.`;
  else if(b.threat) prune='under fire ⟹ defeat MINE/COLLECT (cannot sit still).';
  else if(!enemies.length&&!gm.length&&!rocks.length) prune='nothing in range ⟹ defeat all but PATROL.';

const SAMPLE_STORY="In the ruins of Halcyon Station, the Coalition Warden Vale found a child hiding in a cargo bay. The Iron Synod had tithed the colony and burned what it could not take. Warlord Kaine of the Iron Synod ordered the lane put to the torch. A Free Trader convoy under Mercer slipped past the blockade with medicine, asking no side for permission. Vale swore to hold the lane open. Kaine called that mercy a weakness. The Iron Synod raided the outer relays and tithed three more colonies. Vale rallied the Coalition and freed the miners Kaine had taken. Mercer sold fuel to both sides and slipped the blockade again. The Coalition sheltered the refugees Kaine had starved. Kaine swore to break Vale at Halcyon. The Coalition and the Free Traders held the lane together while the Iron Synod burned what it could not hold. Vale spared a Synod pilot who surrendered. Kaine executed his own captain for retreating. Mercer warned Vale of the coming fleet, though the Traders cared only that someone paid.";

// ---- LLM SPEECH TIER (TAMI_SPEAK): lorePersona / speakGroundOk / loreSpeak are defined in speech_tier.js (loaded
//   before this script). They voice the retrieval-selected facts and NEVER source facts; the grounding post-check

function loreAnswer(s,question){

  const st=loreState(s), qn=loreNorm(question), fu=loreIsFollowUp(question)&&!!st.lastQuery;

  const emit=(sents,prov,tag)=>{ const line=sents.join(' '); say(s,line);

    if(prov) term(`<span style="opacity:.45">&nbsp;&nbsp;↳ grounded in: ${String(prov).replace(/</g,'&lt;')}</span>`,''); };

    let sc=loreCos(qv,d,idx);

    if(entHit) sc+=LORE_CFG.ENTITY_BOOST;
    if(fu&&((st.lastTopic&&d.topics.includes(st.lastTopic))||(st.lastEnts||[]).some(e=>d.tf.has(e)))) sc+=LORE_CFG.CONV_BOOST;
    if(d.src.startsWith('world:')) sc-=LORE_CFG.WORLD_PEN;   // shared world blurbs rank below the pilot's own lines — voice stays personal

    const domTopic=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a])[0]||topics[0]||null;
    const liveN=picks.filter(p=>p.d.src==='live').length, prov=picks.map(p=>p.d.id).join(' · ');

    const composer=()=>{ const body=((!fu&&domTopic&&LORE_ACK[domTopic])?[LORE_ACK[domTopic]]:[]).concat(sents);
      emit(body, prov, liveN===picks.length?'🛰️ GIVEN · game-state (live graph)':'📖 GIVEN · lore (retrieved — follow-ups work)'); commit(body.join(' ')); };
    if(!TAMI_SPEAK.alive){ composer(); return; }   // no speech sidecar (public site) — verbatim composer, exactly as before
    // TOP speech tier: the LLM VOICES the retrieved facts (grounding post-check inside loreSpeak; null -> composer turn)
    loreSpeak(s,question,sents,st,idx).then(reply=>{
      if(reply){ emit([reply], prov+' · voiced by LLM (facts retrieval-selected, grounding-checked)',

  const unsaid=idx.docs.filter(d=>!st.said.has(d.id)), tc={};

  const topTopics=Object.keys(tc).sort((a,b)=>tc[b]-tc[a]).slice(0,LORE_CFG.OFFER_N);
  const offers=topTopics.map(t=>LORE_TOPIC_PHRASE[t]||t);

  const declLine=fu?`That's all of that story.${offer}`:`I can't speak to that.${offer}`;
  const declProv=fu?'said-set exhausted for the remembered thread — offering unsaid topics':('no indexed sentence scored ≥ '+LORE_CFG.MIN_SCORE+' — abstain, never invent');
  const declTag=fu?'🚫 honest · out of that thread':'🚫 abstained · no fabrication';

  // CAN speak about, from those facts). Offer sentences are NOT marked said — nothing was actually told.
  const offerFacts=topTopics.map(t=>{ const d=unsaid.find(x=>x.topics.includes(t)); return d&&d.text; }).filter(Boolean);

}

  else if(drag.vp==='brain'){ const wpp=(brainCam.right-brainCam.left)/VIEW.brain.w; brainCenter.x-=dx*wpp; brainCenter.y+=dy*wpp; sizeBrainCam(); } });

canvas.addEventListener('dblclick',e=>{ const vp=viewAt(e.clientX,e.clientY);

// ---- ANDROID / TOUCH: view toggle + pilot cycle + market + log buttons; tap-select, one-finger pan, two-finger pinch ----

    else if(e.touches.length===2){ e.preventDefault(); const a=e.touches[0],b=e.touches[1]; pinchD=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY); td=null; } },{passive:false});
  canvas.addEventListener('touchmove',e=>{ if(e.touches.length===2){ e.preventDefault(); const a=e.touches[0],b=e.touches[1], d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
      if(pinchD>0){ const r=d/pinchD, vp=viewAt((a.clientX+b.clientX)/2,(a.clientY+b.clientY)/2);
        if(vp==='top') topZoom=clamp(topZoom/r,0.22,7); else if(vp==='brain'){ brainZoom=clamp(brainZoom/r,0.4,4.5); sizeBrainCam(); } } pinchD=d; }
    else if(td&&e.touches.length===1){ e.preventDefault(); const t=e.touches[0], dx=t.clientX-td.mx, dy=t.clientY-td.my; td.mx=t.clientX; td.my=t.clientY; td.moved+=Math.abs(dx)+Math.abs(dy);
      if(td.vp==='top'){ topCenter=topCenter||(ships[focus]?ships[focus].pos.clone():new T.Vector3()); const wpp=(topCam.right-topCam.left)/VIEW.top.w; topCenter.x-=dx*wpp; topCenter.z-=dy*wpp; }
      else { const wpp=(brainCam.right-brainCam.left)/VIEW.brain.w; brainCenter.x-=dx*wpp; brainCenter.y+=dy*wpp; sizeBrainCam(); } } },{passive:false});
  canvas.addEventListener('touchend',e=>{ if(td){ if(td.moved<9 && td.vp==='top') topClick(td.x0,td.y0); td=null; } if(e.touches.length<2) pinchD=0; },{passive:false});
})();
function topClick(mx,my){ const w=topWorldAt(mx,my), wpp=(topCam.right-topCam.left)/VIEW.top.w, thr=16*wpp; let best=null,bd=1e9,kind=null;
  for(const p of planets){ const d=Math.hypot(w.x-p.pos.x,w.z-p.pos.z); if(d<p.radius*(p.mesh.scale.x||1)+thr && d<bd){ bd=d; best=p; kind='planet'; } }
  if(base){ const d=Math.hypot(w.x-base.pos.x,w.z-base.pos.z); if(d<CFG.BASE_R+thr && d<bd){ bd=d; best=base; kind='base'; } }
  for(const s of ships){ if(!s.alive) continue; const d=Math.hypot(w.x-s.pos.x,w.z-s.pos.z); if(d<thr+6 && d<bd){ bd=d; best=s; kind='ship'; } }
  if(!best){ return; }
  const P=ships[0];
  if(kind==='planet'){ if(typeof MAN!=='undefined') MAN.active=false; P.obj={type:'goto',planet:best};   // TAP TO TRAVEL + auto-dock
    term(`<b>${best.name}</b> · ${best.type.t} Lv${best.dev} · ${Math.round(best.wealth)}c · rep ${best.rep>0?'+':''}${Math.round(best.rep)} — course set, auto-docking (then: market · buy · sell).`,'sys'); }
  else if(kind==='base'){ if(typeof MAN!=='undefined') MAN.active=false; P.obj={type:'goto',planet:{pos:base.pos.clone(),name:'Ranger Command',_base:true}};
    term('⌂ <b>Ranger Command</b> — course set; on arrival: base · hull &lt;class&gt; · blackmarket · repair.','sys'); }
  else { const idx=ships.indexOf(best); if(idx>=0 && idx<CFG.NSHIPS){ focus=idx; buildRoster(); document.getElementById('lblBrain').textContent='REASONING · '+best.name; }
    term(`<b>${best.name}</b> · ${best.role} · ${best.mode} · hull ${Math.round(best.hp)} · ${best.credits}c${idx<CFG.NSHIPS?' · now focused':''}`,'sys'); } }

// ==================================================================================================================
// AWAY MISSIONS — land on a world, WALK AROUND in 3D (the "boxes" demo), and fight a TURN-BASED (Tami-style) battle.
// Fully self-contained: its own renderer + scene + full-screen overlay. The only hooks into the space game are the
// frame-loop gate, the keydown route, and the `land` command. Lore/visuals are GIVEN flavor (not an AGI claim-path).
// ==================================================================================================================
const AWAY=(function(){
  const G={ GROUND:130, NBOX:20, WALK:16, RUN:26, TURN:2.7, CAM_BACK:15, CAM_UP:9, INTERACT_R:6, AV_R:1.1,
            GRID:8, TILE:4.2, TURN_DELAY:0.45,
            FOE_AGGRO_R:34, FOE_SPEED:7.5, FOE_ENGAGE_R:2.4 };   // USER-REPORTED: hostiles "stood there and did nothing" — they now HUNT: chase inside AGGRO_R at FOE_SPEED and auto-engage at ENGAGE_R (F-prompt still works at INTERACT_R)
  let active=false, phase='';           // '', 'ground', 'battle'
  let awayPlanet=null, victoryHooked=false;   // the world you landed on; CTF capture fires ONCE per landing
  function awayVictoryHooks(){ if(victoryHooked) return; victoryHooked=true;
    // CAPTURE-THE-FLAG (user): winning the ground battle FLIPS the planet to your side (conquest.js owns the
    // rules: Synod counter-landings, defenses, infra damage). Missions also check LIBERATE completion here.
    if(awayPlanet){ if(window.CONQUEST&&CONQUEST.onAwayVictory) try{ CONQUEST.onAwayVictory(awayPlanet); }catch(e){}
      if(window.MISSIONS&&MISSIONS.onAwayVictory) try{ MISSIONS.onAwayVictory(awayPlanet); }catch(e){} } }
  const keys=new Set();
  // ---- overlay DOM + dedicated renderer (isolated from the space canvas/HUD) ----
  const wrap=document.createElement('div'); wrap.id='awayWrap';
  wrap.style.cssText='position:fixed;inset:0;z-index:60;display:none;background:#05070d;overflow:hidden';
  const cv=document.createElement('canvas'); cv.style.cssText='display:block;width:100%;height:100%'; wrap.appendChild(cv);
  const hint=document.createElement('div'); hint.id='awayHint';
  hint.style.cssText='position:absolute;left:0;right:0;bottom:0;padding:12px 16px;font:14px/1.55 ui-monospace,Menlo,monospace;color:#cfe2f5;background:linear-gradient(0deg,rgba(4,7,13,.94),rgba(4,7,13,0));pointer-events:none;text-align:center;white-space:pre-wrap';
  wrap.appendChild(hint);
  const ui=document.createElement('div'); ui.id='awayUI'; ui.style.cssText='position:absolute;inset:0;pointer-events:none;font:13px/1.4 ui-monospace,Menlo,monospace'; wrap.appendChild(ui);
  document.body.appendChild(wrap);
  const rend=new T.WebGLRenderer({canvas:cv,antialias:true}); rend.setPixelRatio(Math.min(2,devicePixelRatio||1));
  function say(html){ hint.innerHTML=html; }
  function size(){ const w=innerWidth,h=innerHeight; rend.setSize(w,h,false); if(gCam){ gCam.aspect=w/h; gCam.updateProjectionMatrix(); } if(bCam){ bCam.aspect=w/h; bCam.updateProjectionMatrix(); } }
  addEventListener('resize',()=>{ if(active) size(); });

  // ================================ GROUND: walk around a settlement of boxes ================================
  let gScene,gCam,avatar,yaw=0, boxes=[], foes=[], pad=null, worldName='', gt=0, prompt='';
  const rr=(a,b)=>a+Math.random()*(b-a);
  function enemyFigure(){ const g=new T.Group();
    const b=new T.Mesh(new T.CylinderGeometry(0.9,0.9,2.4,10), new T.MeshStandardMaterial({color:0xff5a6e,emissive:0x400810,emissiveIntensity:0.7,roughness:0.5})); b.position.y=1.2; g.add(b);
    const h=new T.Mesh(new T.SphereGeometry(0.72,14,10), new T.MeshStandardMaterial({color:0xffd0d6,roughness:0.4})); h.position.y=2.6; g.add(h);
    const ring=new T.Mesh(new T.RingGeometry(2.3,3,26), new T.MeshBasicMaterial({color:0xff5a6e,transparent:true,opacity:0.55,side:T.DoubleSide})); ring.rotation.x=-Math.PI/2; ring.position.y=0.05; g.add(ring); return g; }
  function buildGround(pl){
    gScene=new T.Scene(); const skc=0x0a1018; gScene.background=new T.Color(skc); gScene.fog=new T.Fog(skc,70,160);
    gScene.add(new T.HemisphereLight(0xbfd8ff,0x0a0f16,0.95));
    const sun=new T.DirectionalLight(0xfff0d8,1.05); sun.position.set(40,75,22); gScene.add(sun);
    const col=(pl&&pl.type&&pl.type.col)||0x37506a;
    const ground=new T.Mesh(new T.PlaneGeometry(G.GROUND,G.GROUND), new T.MeshStandardMaterial({color:new T.Color(col).multiplyScalar(0.5),roughness:0.97,metalness:0.04}));
    ground.rotation.x=-Math.PI/2; gScene.add(ground);
    const grid=new T.GridHelper(G.GROUND,G.GROUND/5,0x3a577a,0x1c2c40); grid.position.y=0.02; gScene.add(grid);
    boxes=[]; for(let i=0;i<G.NBOX;i++){ const w=rr(3,9),d=rr(3,9),h=rr(3,15), x=rr(-56,56),z=rr(-56,56); if(Math.hypot(x-8,z-8)<14) continue;
      const c=new T.Color(col).multiplyScalar(rr(0.55,1.05)).offsetHSL(rr(-0.04,0.08),0.08,rr(-0.04,0.16));
      const m=new T.Mesh(new T.BoxGeometry(w,h,d), new T.MeshStandardMaterial({color:c,roughness:0.82,metalness:0.16})); m.position.set(x,h/2,z); gScene.add(m); boxes.push({x,z,hw:w/2+G.AV_R,hd:d/2+G.AV_R}); }
    foes=[]; const nf=2; for(let i=0;i<nf;i++){ let fx,fz,tries=0; do{ fx=rr(-46,46); fz=rr(-46,46); tries++; }while(tries<30 && (Math.hypot(fx-8,fz-8)<16 || Math.hypot(fx,fz)<G.FOE_AGGRO_R*0.9 || blocked(fx,fz)));   // also spawn OUTSIDE aggro of the avatar start (0,0) — hunting foes must not instant-ambush on landing
      const g=enemyFigure(); g.position.set(fx,0,fz); gScene.add(g); foes.push({x:fx,z:fz,mesh:g,alive:true}); }
    pad=new T.Group(); const disc=new T.Mesh(new T.CircleGeometry(4,36), new T.MeshBasicMaterial({color:0x46d6ff,transparent:true,opacity:0.5,side:T.DoubleSide})); disc.rotation.x=-Math.PI/2; disc.position.y=0.03; pad.add(disc);
    const pr=new T.Mesh(new T.RingGeometry(3.6,4.2,32), new T.MeshBasicMaterial({color:0x9fe6ff,transparent:true,opacity:0.8,side:T.DoubleSide})); pr.rotation.x=-Math.PI/2; pr.position.y=0.05; pad.add(pr); pad.position.set(8,0,8); gScene.add(pad);
    avatar=new T.Group(); const bd=new T.Mesh(new T.CylinderGeometry(0.8,0.8,2.4,14), new T.MeshStandardMaterial({color:0x46d6ff,emissive:0x0a2233,emissiveIntensity:0.5,roughness:0.5})); bd.position.y=1.2; avatar.add(bd);
    const hd=new T.Mesh(new T.SphereGeometry(0.72,16,12), new T.MeshStandardMaterial({color:0xe6f4ff,roughness:0.4})); hd.position.y=2.6; avatar.add(hd);
    const nose=new T.Mesh(new T.BoxGeometry(0.3,0.3,0.8), new T.MeshStandardMaterial({color:0x9fe6ff})); nose.position.set(0,2.55,0.7); avatar.add(nose);   // facing marker
    avatar.position.set(0,0,0); yaw=Math.PI*0.25; gScene.add(avatar);
    gCam=new T.PerspectiveCamera(62,innerWidth/innerHeight,0.1,700);
  }
  function blocked(x,z){ for(const b of boxes) if(Math.abs(x-b.x)<b.hw && Math.abs(z-b.z)<b.hd) return true; return false; }
  function moveAvatar(dt){ const run=keys.has('ShiftLeft')||keys.has('ShiftRight'); const spd=(run?G.RUN:G.WALK);
    if(keys.has('KeyA')||keys.has('ArrowLeft')) yaw+=G.TURN*dt;
    if(keys.has('KeyD')||keys.has('ArrowRight')) yaw-=G.TURN*dt;
    let fwd=0; if(keys.has('KeyW')||keys.has('ArrowUp')) fwd+=1; if(keys.has('KeyS')||keys.has('ArrowDown')) fwd-=1;
    if(fwd){ const nx=avatar.position.x+Math.sin(yaw)*spd*fwd*dt, nz=avatar.position.z+Math.cos(yaw)*spd*fwd*dt;
      const cx=Math.max(-62,Math.min(62,nx)), cz=Math.max(-62,Math.min(62,nz));
      if(!blocked(cx,avatar.position.z)) avatar.position.x=cx; if(!blocked(avatar.position.x,cz)) avatar.position.z=cz; }
    avatar.rotation.y=yaw;
    const bx=avatar.position.x-Math.sin(yaw)*G.CAM_BACK, bz=avatar.position.z-Math.cos(yaw)*G.CAM_BACK;
    gCam.position.lerp(new T.Vector3(bx,G.CAM_UP,bz),1-Math.pow(0.001,dt)); gCam.lookAt(avatar.position.x,2.2,avatar.position.z); }
  function nearestFoe(){ let best=null,bd=G.INTERACT_R; for(const f of foes){ if(!f.alive) continue; const d=Math.hypot(avatar.position.x-f.x,avatar.position.z-f.z); if(d<bd){bd=d;best=f;} } return best; }
  function onPad(){ return Math.hypot(avatar.position.x-8,avatar.position.z-8)<4; }
  function frameGround(dt){ gt+=dt; moveAvatar(dt);
    for(const f of foes){ if(!f.alive) continue;
      const dx=avatar.position.x-f.x, dz=avatar.position.z-f.z, d=Math.hypot(dx,dz);
      if(d>G.FOE_ENGAGE_R){                                                // HUNT: hostiles ALWAYS close on the player (user fix: foes no longer stand idle); spawn grace = they start ≥0.9*AGGRO_R away
        const step=Math.min(G.FOE_SPEED*dt, d-G.FOE_ENGAGE_R*0.9);
        const nx=f.x+dx/d*step, nz=f.z+dz/d*step;
        if(!blocked(nx,f.z)) f.x=nx; if(!blocked(f.x,nz)) f.z=nz;
        f.mesh.position.set(f.x,0,f.z); f.mesh.rotation.y=Math.atan2(dx,dz); }
      else f.mesh.rotation.y+=dt*0.8;
      f.mesh.children[2] && (f.mesh.children[2].material.opacity=0.4+0.25*Math.sin(gt*3));
      if(d<=G.FOE_ENGAGE_R){ say('⚔ A hostile lunges at you!'); buildBattle(f); return; } }   // contact -> battle starts itself
    pad.children[1].material.opacity=0.5+0.4*Math.sin(gt*2.5);
    const foe=nearestFoe(); const pad_=onPad();
    if(foe){ prompt='foe'; say(`⚔  A hostile blocks your path — press <b>F</b> to engage (turn-based battle)`); }
    else if(pad_){ prompt='pad'; say(`▲  Launch pad — press <b>F</b> to return to your ship in orbit`); }
    else { prompt=''; const left=foes.filter(f=>f.alive).length; say(`<b>${worldName}</b> — on foot.  <b>W</b> walk · <b>A/D</b> turn · <b>Shift</b> run · <b>F</b> interact${left?`   ·   ${left} hostile${left>1?'s':''} on the surface`:`   ·   surface clear — reach the pad to launch`}`); }
    rend.render(gScene,gCam); }

  // ================================ BATTLE: turn-based grid tactics (Tami-style) ================================
  let bScene,bCam,tiles=[],units=[],order=[],turnIx=0,cur=null,bt=0,bstate='',selTech=null,reach=new Set(),ray=new T.Raycaster(),pointer=new T.Vector2(),pendingFoe=null,acted=false,moved=false,aiTimer=0,blog=[];
  let core=null, debugBattle=false;    // core!=null -> battle rendered from the C# sidecar STATE; debugBattle -> battle was started via the AWAY.debugStartBattle hook from orbit (exit fully when it ends)
  let uiSig='';                        // last-rendered battle-UI html. setUI only touches the DOM when the html actually
                                       // changed — per-frame innerHTML rewrites destroy buttons mid-click (see drawBattleUI).
  function setUI(html){ if(html===uiSig) return false; uiSig=html; ui.innerHTML=html; return true; }
  function clearUI(){ uiSig=''; ui.innerHTML=''; }
  let retreatArmed=false;              // two-click Retreat confirm (works headless — no blocking window.confirm); any other battle button disarms it
  // AC9 tier 2: when window.TAMI_WASM is loaded, legacy damage runs the ACTUAL C# core in-browser with the SAME stat
  // mapping the core battles use (BattleService.ResolveAttack): physical -> Force vs Ten, mental -> Int vs Wis, STAB
  // when the tech's element ∈ the attacker's types, then Damage() applies type-chart/STAB/crit/rng inside the core.
  // Constants (named, no magic numbers in the logic):
  const WASMB={ LEVEL:5,            // stand-in units fight at level 5 (legacy has no roster levels)
    POWER_SCALE:4,                  // legacy tech powers are 9..22; real Tami powers are 40..95 — scale into core range
    CRIT_P:0.04, RNG_MIN:0.90, RNG_SPAN:0.20 };   // crit 4% (x1.5 applied INSIDE the core), damage variance uniform 0.90-1.10
  const TECHS={   // el = real Tami element (tami_data.json type list) so the CORE type chart + STAB apply on the wasm tier
    strike:{name:'Strike',power:16,range:1,kind:'phys',el:'Martial',cd:0,desc:'melee'},
    cleave:{name:'Cleave',power:22,range:1,kind:'phys',el:'Pyro',aff:'Burn',cd:2,desc:'melee, may Burn'},
    bolt:{name:'Ion Bolt',power:15,range:4,kind:'special',el:'Ionic',cd:1,desc:'ranged'},
    venom:{name:'Venom Dart',power:10,range:3,kind:'special',el:'Toxin',aff:'Poison',cd:2,desc:'ranged, Poison'},
    stunrod:{name:'Stun Rod',power:9,range:1,kind:'phys',el:'Sonic',aff:'Stun',cd:3,desc:'melee, may Stun'},
    mend:{name:'Mend',power:20,range:2,kind:'heal',cd:2,desc:'heal an ally'}
  };
  // force/ten/int/wis mirror the core stat slots; the int/wis derivation keeps the legacy phys-vs-special asymmetry
  // (special always used 0.8*atk vs 0.5*def here) — only the FORMULA moves into the C# core, not the balance intent.
  function mkUnit(name,side,hp,atk,def,spd,mv,techs,gx,gy,types){ return {name,side,hp,maxhp:hp,atk,def,spd,mv,techs,gx,gy,types:types||[],
    force:atk,ten:def,int:Math.round(atk*0.8),wis:Math.round(def*0.5),mesh:null,aff:{},cd:{},alive:true}; }
  function party(){ return [
    mkUnit('Warden',    'ally',56,16,9,11,3,['strike','cleave','mend'],1,3,['Martial']),
    mkUnit('Ranger',    'ally',44,14,6,14,4,['bolt','venom'],1,4,['Ionic']),
    mkUnit('Bulwark',   'ally',70,13,13,7,2,['strike','stunrod'],0,3,['Mineral']) ]; }
  function foeParty(n){ const pool=[
    mkUnit('Synod Blade','foe',48,15,8,12,3,['strike','cleave'],6,3,['Martial']),
    mkUnit('Synod Gun',  'foe',40,15,5,13,4,['bolt','venom'],7,4,['Toxin']),
    mkUnit('Synod Brute','foe',66,14,11,7,2,['strike','stunrod'],6,4,['Mineral']) ];
    return pool.slice(0,Math.max(2,Math.min(3,n))); }
  function tileFree(gx,gy,ignore){ if(gx<0||gy<0||gx>=G.GRID||gy>=G.GRID) return false; for(const u of units){ if(u.alive&&u!==ignore&&u.gx===gx&&u.gy===gy) return false; } return true; }
  function unitAt(gx,gy){ return units.find(u=>u.alive&&u.gx===gx&&u.gy===gy); }
  function w3(gx,gy){ return new T.Vector3((gx-(G.GRID-1)/2)*G.TILE, 0, (gy-(G.GRID-1)/2)*G.TILE); }
  function buildBattle(foe){ if(TAMI_CS.alive){ startCoreBattle(foe); } else { buildBattleLegacy(foe); } }   // CORE battle when the C# sidecar is up; legacy stand-ins otherwise (public site)
  function buildBattleLegacy(foe){ pendingFoe=foe; phase='battle'; bstate='intro'; blog=[]; selTech=null; acted=false; moved=false; core=null; retreatArmed=false;
    bScene=new T.Scene(); const sk=0x0c1220; bScene.background=new T.Color(sk); bScene.fog=new T.Fog(sk,50,130);
    bScene.add(new T.HemisphereLight(0xcfe0ff,0x10131c,1.0)); const sun=new T.DirectionalLight(0xffffff,0.9); sun.position.set(20,40,15); bScene.add(sun);
    tiles=[]; for(let y=0;y<G.GRID;y++) for(let x=0;x<G.GRID;x++){ const dark=(x+y)%2; const m=new T.Mesh(new T.BoxGeometry(G.TILE*0.96,0.4,G.TILE*0.96), new T.MeshStandardMaterial({color:dark?0x1b2740:0x223150,roughness:0.9}));

      const col=u.side==='party'?'#46d6ff':'#ff5a6e';
      const affs=(u.afflictions||[]).filter(a=>a.turns>0).map(a=>`${a.name} ${a.turns}`).join(', ');
      return `<div style="opacity:${dead?0.35:1};margin:2px 0"><span style="color:${col}">${u.id===st.current&&!st.result?'▶':'&nbsp;'} ${u.name}</span> <span style="opacity:.55">Lv${u.level} ${(u.types||[]).join('/')}</span> <span style="color:#7fdc8a">${'█'.repeat(bar)}</span><span style="opacity:.3">${'░'.repeat(20-bar)}</span> ${u.hp}/${u.maxHp} <span style="color:#9fd0ff">AP ${u.ap}</span>${affs?` <span style='color:#ffcf52'>[${affs}]</span>`:''}</div>`; }).join('');
    const mkBtn=(key,body,on,dis)=>`<button data-core="${key}" ${dis?'disabled':''} style="pointer-events:auto;margin:3px;padding:6px 9px;border-radius:7px;border:1px solid ${on?'#9fe6ff':'#2a3f5c'};background:${on?'#173049':'#0e1a2a'};color:${dis?'#5a6a80':'#cfe2f5'};font:inherit;cursor:${dis?'default':'pointer'}">${body}</button>`;
    const pretty=s=>String(s||'').replace(/_/g,' ');
    let ctrl='';
    if(st.result==='victory'){ ctrl=`<div style="margin-top:8px;color:#7fdc8a;font-size:16px">✔ VICTORY — the away team prevails.${st.rewards&&st.rewards.credits?` <span style="color:#ffcf52">+${st.rewards.credits}c</span>`:''}</div>${mkBtn('return','Back to the surface')}`; }
    else if(st.result==='defeat'){ ctrl=`<div style="margin-top:8px;color:#ff6a6a;font-size:16px">✖ DEFEAT — you retreat to your ship.</div>${mkBtn('return','Retreat')}`; }
    else if(core.busy){ ctrl=`<div style="margin-top:6px;opacity:.7">resolving…</div>`; }
    else if(cu&&cu.side==='party'){
      const sk=cu.strike, sOn=core.arm&&core.arm.kind==='strike';
      let btns=sk?mkBtn('strike',`${pretty(sk.id)} <span style="opacity:.6">⚔ ${sk.element} r${Math.max(1,sk.range||1)}${sk.ap?` +${sk.ap}AP`:''}</span>`,sOn,false):'';
      btns+=(cu.techs||[]).map(t=>{ const on=core.arm&&core.arm.kind==='tech'&&core.arm.id===t.id;
        return mkBtn(`tech:${t.id}`,`${pretty(t.id)} <span style="opacity:.6">✦ ${t.element} ${t.ap}AP r${Math.max(1,t.range||1)}</span>`,on,cu.ap<t.ap); }).join('');
      btns+=mkBtn('pass','Pass',false,false);
      btns+=mkBtn('retreat',retreatArmed?'<span style="color:#ff9a9a">Confirm retreat?</span>':'Retreat',retreatArmed,false);
      ctrl=`<div style="margin-top:6px"><span style="opacity:.7">click a green tile to MOVE, or</span> pick an action:</div>${btns}`;
      if(core.arm) ctrl+=`<div style="margin-top:4px;color:#9fe6ff">${core.arm.kind==='strike'?pretty(sk&&sk.id):pretty(core.arm.id)} armed — click a red foe in range (${Math.max(1,core.arm.range||1)}).</div>`; }
    else ctrl=`<div style="margin-top:6px;opacity:.7">${cu?cu.name+' (enemy) is acting…':'…'}</div>`;
    if(core.note) ctrl+=`<div style="margin-top:4px;color:#ff9a9a">${core.note}</div>`;
    const html=`<div style="position:absolute;top:12px;left:12px;right:12px;max-width:470px;background:rgba(6,11,20,.82);border:1px solid #22344c;border-radius:10px;padding:10px 12px">
      <div style="color:#8fd0ff;font-weight:bold;margin-bottom:4px">TURN-BASED BATTLE <span style="opacity:.5;font-weight:normal">— live Tami C# core${core.id?` · ${core.id}`:''}</span></div>${rows}${ctrl}</div>
      <div style="position:absolute;bottom:12px;left:12px;right:12px;color:#9fb3cc">${core.logLines.slice(-6).map(l=>'· '+coreLogLine(l)).join('<br>')}</div>`;
    if(!setUI(html)) return;   // same click-eating fix as drawBattleUI: never rewrite the DOM mid-click when nothing changed
    ui.querySelectorAll('button[data-core]').forEach(b=>b.onclick=()=>{ const k=b.getAttribute('data-core');
      if(autoOn) autoStop('[demo] You pressed a battle button — control is yours.');            // ANY battle button hands control back from the demo driver
      if(k==='return'){ finishBattle(st.result==='victory'); return; }
      if(k==='retreat'){ if(!retreatArmed){ retreatArmed=true; core.note='Retreat? Click again to confirm — the party flees with NO rewards.'; } else retreatBattle(); return; }
      retreatArmed=false;
      if(core.busy||st.result) return; core.note='';
      if(k==='pass'){ core.arm=null; coreAct({do:'pass'}); }
      else if(k==='strike'){ const s=cu&&cu.strike; core.arm=(core.arm&&core.arm.kind==='strike')?null:{kind:'strike',range:(s&&s.range)||1}; }
      else if(k.indexOf('tech:')===0){ const id=k.slice(5); const t=(cu.techs||[]).find(t=>t.id===id);
        core.arm=(core.arm&&core.arm.kind==='tech'&&core.arm.id===id)?null:{kind:'tech',id,range:(t&&t.range)||1}; } }); }
  function onCoreClick(mx,my){ const st=core&&core.state; if(!st||core.busy||st.result) return;
    const cu=st.units.find(u=>u.id===st.current); if(!cu||cu.side!=='party') return;
    pointer.x=mx/innerWidth*2-1; pointer.y=-(my/innerHeight*2-1); ray.setFromCamera(pointer,core.cam);
    if(core.arm){ const alive=st.units.filter(u=>u.alive&&core.mesh[u.id]);                          // strike/tech armed: click a foe
      const hits=ray.intersectObjects(alive.map(u=>core.mesh[u.id]),true);
      if(hits.length){ let m=hits[0].object; while(m.parent&&!alive.find(u=>core.mesh[u.id]===m)) m=m.parent; const tgt=alive.find(u=>core.mesh[u.id]===m);
        if(tgt){ if(tgt.side!=='enemy'){ core.note='Invalid target — aim at a red foe.'; return; }
          if(Math.abs(cu.x-tgt.x)+Math.abs(cu.y-tgt.y)>Math.max(1,core.arm.range||1)){ core.note=`${tgt.name} is out of range.`; return; }
          if(core.arm.kind==='strike') coreAct({do:'strike',target:tgt.id}); else coreAct({do:'tech',tech:core.arm.id,target:tgt.id}); } }
      return; }
    const th=ray.intersectObjects(core.tiles); if(th.length){ const td=th[0].object.userData; if(coreCanMove(cu,td.gx,td.gy)) coreAct({do:'move',x:td.gx,y:td.gy}); } }
  async function coreAct(p){ if(!core||core.busy||!core.state) return; const unit=core.state.current; core.busy=true; core.arm=null;
    try{ const j=await TAMI_CS.battleAct(core.id,unit,p);
      if(j&&j.error){ core.note=String(j.error); } else if(j&&j.units){ core.note=''; coreSync(j); } else core.note='bad /battle/act response'; }
    catch(e){ core.note='battle core unreachable — '+e.message; }
    if(core) core.busy=false; }                                                                      // core may have been nulled by finishBattle while awaiting
  async function coreRefresh(){ if(!core||core.busy) return; core.busy=true;
    try{ const j=await TAMI_CS.battleState(core.id); if(j&&j.units) coreSync(j); }catch(e){}
    if(core) core.busy=false; }
  // Test hook for the integrator: start a battle DIRECTLY (no walking needed) — core mode when the sidecar is alive, else
  // the legacy local battle. Optional mode 'core'|'legacy' forces the path (headless tests can stub fetch + force 'core').
  function debugStartBattle(mode){ if(phase==='battle') return 'already-in-battle';
    const foe = phase==='ground' ? nearestFoe() : null;
    if(!active){ active=true; debugBattle=true; wrap.style.display='block'; keys.clear(); }
    const useCore = mode==='core' ? true : mode==='legacy' ? false : TAMI_CS.alive;
    if(useCore) startCoreBattle(foe); else buildBattleLegacy(foe);
    size(); return useCore?'core':'legacy'; }

  // ================================ DEMO AUTOPLAY — watchable driver for the PARTY side of a CORE battle ================================
  // Started by the `demo battle` terminal command (AWAY.autoBattle). Per party turn it picks the best AFFORDABLE technique
  // by TYPE MATCHUP (TAMIDATA.matrix vs the target's types; STAB tiebreak) on the lowest-HP foe in range; basic strike when
  // no affordable tech reaches; otherwise it advances toward the nearest foe. Paced so the user can WATCH; any battle
  // button press hands control back (see drawCoreUI). Stops on battle end (result + spoils rendered by drawCoreUI/coreSync).
  // AWAY.autoStep is a manual pump for headless tests (hidden tabs throttle timers), mirroring the WATCH.step pattern.
  const AUTO_CFG={ STEP_MS:700, MAX_STEPS:400 };   // pacing between driver actions (ms); safety cap so a stalled battle can't spin forever
  let autoOn=false, autoTimer=0, autoSteps=0;
  function autoStop(msg){ if(autoTimer){ clearTimeout(autoTimer); autoTimer=0; } if(!autoOn) return; autoOn=false; if(msg) term(msg,'sys'); }
  function autoQueue(){ if(!autoOn) return; if(autoTimer) clearTimeout(autoTimer); autoTimer=setTimeout(autoStep,AUTO_CFG.STEP_MS); }
  function typeMultOf(el,types){ const M=TAMIDATA&&TAMIDATA.matrix&&TAMIDATA.matrix[el]; if(!M) return 1;   // no baked matrix -> neutral (defensive)
    let m=1; for(const d of (types||[])){ if(typeof M[d]==='number') m*=M[d]; } return m; }
  function autoPick(st,cu){ const dist=(a,b)=>Math.abs(a.x-b.x)+Math.abs(a.y-b.y);
    const foes=st.units.filter(u=>u.alive&&u.side==='enemy');
    if(!foes.length) return {do:'pass'};
    // 1) best AFFORDABLE tech by type-mult (STAB tiebreak), targeting the lowest-HP foe it can reach
    let best=null;
    for(const t of (cu.techs||[])){ if(cu.ap<t.ap) continue; const r=Math.max(1,t.range||1);
      for(const f of foes){ if(dist(cu,f)>r) continue;
        const m=typeMultOf(t.element,f.types), stab=(cu.types||[]).indexOf(t.element)>=0?1:0;
        const better=!best || m>best.m+1e-9 || (Math.abs(m-best.m)<=1e-9 && (stab>best.stab || (stab===best.stab && f.hp<best.hp)));
        if(better) best={p:{do:'tech',tech:t.id,target:f.id},m,stab,hp:f.hp}; } }
    if(best) return best.p;
    // 2) no affordable tech reaches -> basic strike on the lowest-HP foe in strike range (also restores AP server-side)
    if(cu.strike){ const r=Math.max(1,cu.strike.range||1); const inR=foes.filter(f=>dist(cu,f)<=r).sort((a,b)=>a.hp-b.hp);
      if(inR.length) return {do:'strike',target:inR[0].id}; }
    // 3) out of range -> step toward the NEAREST foe (legal cell minimizing Manhattan distance); else pass
    let nf=foes[0]; for(const f of foes) if(dist(cu,f)<dist(cu,nf)) nf=f;
    let bx=cu.x,by=cu.y,bd=dist(cu,nf);
    for(let y=0;y<st.grid.h;y++) for(let x=0;x<st.grid.w;x++){ if(!coreCanMove(cu,x,y)) continue; const d=Math.abs(x-nf.x)+Math.abs(y-nf.y); if(d<bd){ bd=d; bx=x; by=y; } }
    return (bx!==cu.x||by!==cu.y) ? {do:'move',x:bx,y:by} : {do:'pass'}; }
  async function autoStep(){ if(autoTimer){ clearTimeout(autoTimer); autoTimer=0; }
    if(!autoOn) return;
    if(!active||phase!=='battle'||!core){ autoStop(); return; }                                   // battle gone (retreat / exit / legacy fallback)
    const st=core.state;
    if(!st||core.busy){ autoQueue(); return; }                                                    // still contacting the core / a call in flight
    if(st.result){ autoOn=false;
      term(`[demo] battle complete — <b>${st.result==='victory'?'VICTORY':'DEFEAT'}</b>${st.result==='victory'&&st.rewards&&st.rewards.credits?` · spoils <span style="color:#ffcf52">+${st.rewards.credits}c</span>`:' · no spoils'}. Control is yours.`,'sys'); return; }
    const cu=st.units.find(u=>u.id===st.current);
    if(!cu||cu.side!=='party'){ coreRefresh(); autoQueue(); return; }                             // defensive: enemy turns arrive already resolved
    if(++autoSteps>AUTO_CFG.MAX_STEPS){ autoStop('[demo] step cap reached — handing control back.'); return; }
    await coreAct(autoPick(st,cu));
    autoQueue(); }
  function autoBattle(){                                                                          // `demo battle` entry: start (or adopt) a CORE battle + drive the party
    if(autoOn) return 'already-running';
    if(phase==='battle'){ if(!core) return 'legacy-battle (the demo driver needs the C# core)'; }
    else { const m=debugStartBattle('core'); if(m!=='core') return m; }
    autoOn=true; autoSteps=0; retreatArmed=false; autoQueue(); return 'core'; }

  // ================================ enter / exit / input / frame ================================
  function enter(pl){ if(active) return; active=true; phase='ground'; worldName=pl&&pl.name||'the surface'; awayPlanet=pl||null; victoryHooked=false; buildGround(pl); size(); wrap.style.display='block'; keys.clear();
    term(`Landed on <b>${worldName}</b>. You disembark — <b>on foot</b>. (W walk · A/D turn · Shift run · F interact · type <b>launch</b> or step on the pad to leave)`,'sys'); }
  function exit(){ autoStop(); retreatArmed=false; active=false; phase=''; wrap.style.display='none'; clearUI(); keys.clear();
    // dispose scenes lightly
    gScene=null; bScene=null; core=null; }
  function interact(){ if(phase!=='ground') return; const foe=nearestFoe(); if(foe){ buildBattle(foe); return; } if(onPad()){ term('Launching back to orbit.','sys'); exit(); } }
  function key(e,down){ if(down){ if(e.code==='Escape'){ if(phase==='battle'){ /* stay */ } else exit(); return; }
      if(e.code==='KeyF'&&phase==='ground'){ interact(); return; } keys.add(e.code); }
    else keys.delete(e.code); }
  cv.addEventListener('mousedown',e=>{ if(phase==='battle'){ core?onCoreClick(e.clientX,e.clientY):onBattleClick(e.clientX,e.clientY); } });
  cv.addEventListener('touchstart',e=>{ if(phase==='battle'&&e.touches[0]){ const t=e.touches[0]; core?onCoreClick(t.clientX,t.clientY):onBattleClick(t.clientX,t.clientY); } },{passive:true});
  function frame(dt){ if(phase==='ground') frameGround(dt); else if(phase==='battle'){ if(core) frameCore(dt); else frameBattle(dt); } }
  return { active:()=>active, enter, exit, key, frame, debugStartBattle, autoBattle, autoStep, autoOn:()=>autoOn };
})();

let last=performance.now(), mktAcc=0;
function frame(now){ let dt=(now-last)/1000; last=now; if(!(dt>=0)||dt>0.05) dt=0.05;
  if(typeof SF_LOCK!=='undefined'&&SF_LOCK.paused){ requestAnimationFrame(frame); return; }   // singleton: another tab owns the sim
  T0+=dt;
  if(AWAY.active()){ AWAY.frame(dt); requestAnimationFrame(frame); return; }   // AWAY MISSION takes over rendering
  step(dt); updateCamera(dt); updateTopCam(); updateSpeech(dt); updateBlips(); updateBrain();
  for(const M of ['STARMAP','CONQUEST','MISSIONS','PLANETMENU']) if(window[M]&&window[M].tick) try{ window[M].tick(dt); }catch(e){}   // SR modules
  renderAll(); updateRoster();
  mktAcc+=dt; if(mktAcc>0.25){ mktAcc=0; updateMarket(); }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
