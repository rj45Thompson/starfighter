<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>STARFIGHTER · AI squadron — 3D flight · top-down · reasoning (all WebGL)</title>
<style>
  :root{ --cyan:#46d6ff; --gold:#ffcf52; --red:#ff5a6e; --grn:#7dffa6; --ink:#080a10; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; overflow:hidden; background:var(--ink); color:#dfe9f5;
    font-family:"Segoe UI",system-ui,sans-serif; user-select:none; }
  #stage{ position:fixed; inset:0; } canvas{ display:block; }
  .hud{ position:fixed; pointer-events:none; text-shadow:0 1px 3px #000b; z-index:5; }
  #pillars{ left:14px; top:12px; display:flex; gap:7px; flex-wrap:wrap; max-width:52%; }
  .pill{ font:700 9.5px/1 ui-monospace,monospace; letter-spacing:.1em; color:#8fb0cc;
    border:1px solid #29405a; background:#0c1623aa; border-radius:5px; padding:4px 7px; }
  .pill b{ color:var(--cyan); }
  #roster{ left:14px; top:44px; display:flex; flex-direction:column; gap:4px; pointer-events:auto; }
  .rs{ display:flex; align-items:center; gap:7px; font:700 11px/1 ui-monospace,monospace; cursor:pointer;
    background:#0c1623bb; border:1px solid #23344a; border-radius:6px; padding:4px 8px; width:182px; transition:.1s; }
  .rs:hover{ border-color:#3a567a; } .rs.foc{ border-color:var(--cyan); box-shadow:0 0 0 1px #46d6ff44 inset; }
  .rs .dot{ width:9px; height:9px; border-radius:50%; flex:0 0 auto; }
  .rs .fac{ font-size:10px; flex:0 0 auto; }   /* faction emblem (GIVEN flavor): ◈ Coalition · ✖ Iron Synod */
  .rs.war{ border-left:3px solid var(--cyan); } .rs.war .fac{ color:var(--cyan); }
  .rs.syn{ border-left:3px solid var(--red); } .rs.syn .fac{ color:var(--red); }
  .rs .nm{ flex:1 1 auto; } .rs .cr{ color:var(--gold); font-size:10px; }
  .rs .hp{ width:30px; height:5px; border-radius:3px; background:#21304a; overflow:hidden; flex:0 0 auto; }
  .rs .hp i{ display:block; height:100%; background:linear-gradient(90deg,#ff5a6e,#ffd05a); }
  #ticker{ left:14px; bottom:54px; width:46%; max-width:600px; max-height:40vh; overflow-y:auto;
    font:600 11.5px/1.55 ui-monospace,monospace; background:#08101ae8; border:1px solid #1b2a3c; border-radius:8px; pointer-events:auto; }
  #logtabs{ position:sticky; top:0; z-index:2; display:flex; gap:3px; padding:5px 6px 4px; background:#0a1220f5; border-bottom:1px solid #17263a; border-radius:8px 8px 0 0; }
  .logtab{ font:700 9.5px/1 ui-monospace,monospace; letter-spacing:.07em; color:#6f88a4; background:#111c2b; border:1px solid #23344a; border-radius:5px; padding:4px 8px; cursor:pointer; }
  .logtab.on{ color:#cfe6ff; border-color:#3a6a8a; background:#16283c; }
  #logbody{ padding:6px 10px 8px; }
  #logbody .tl{ opacity:.94; margin:1px 0; }
  #logbody .tl b{ font-weight:800; }
  #logbody .sys{ color:#7fd0b0; } #logbody .err{ color:#ff8a8a; } #logbody .ev{ color:#b7a6ff; }
  #ticker.big{ max-height:76vh; width:52%; max-width:720px; }
  #ticker::-webkit-scrollbar{ width:7px; } #ticker::-webkit-scrollbar-thumb{ background:#243c52; border-radius:4px; }
  #chat{ position:fixed; z-index:7; bottom:12px; left:14px; height:34px; padding:0 12px; border-radius:9px;
    background:#0a1420ee; border:1px solid #3a6a8a; color:#eaf2ff; font:600 12.5px/34px ui-monospace,monospace; outline:none; pointer-events:auto; }
  #chat::placeholder{ color:#5f7a98; font-weight:500; }
  #chat:focus{ border-color:var(--cyan); box-shadow:0 0 0 1px #46d6ff44 inset; }
  #market{ position:fixed; top:10px; transform:translateX(-50%); z-index:6; pointer-events:none;
    background:#0a1420dd; border:1px solid #223span; border:1px solid #22344a; border-radius:9px; padding:8px 10px; }
  #market .mkt-h{ font:700 10px/1.3 ui-monospace,monospace; letter-spacing:.06em; color:#8fb0cc; margin-bottom:6px; }
  #market .mkt-k{ color:#5f7a98; font-weight:500; }
  #market table{ border-collapse:collapse; font:600 11px/1 ui-monospace,monospace; }
  #market th{ color:#8ea4be; font-weight:700; padding:2px 7px; text-align:center; font-size:10px; }
  #market .mkt-t{ color:#5f7a98; font-weight:500; font-size:8.5px; }
  #market td{ padding:2px 7px; text-align:center; color:#cfe2f5; }
  #market .mkt-g{ text-align:left; color:#9fb6cc; }
  #market .mkt-s{ margin-top:6px; font:600 10.5px/1.4 ui-monospace,monospace; color:#b8c6d8; border-top:1px solid #1a2636; padding-top:5px; }
  .vlabel{ position:fixed; z-index:6; pointer-events:none; font:800 10px/1 ui-monospace,monospace; letter-spacing:.14em; color:#5f7fa6; }
  .vlabel span{ font-weight:600; letter-spacing:.02em; color:#3f5group; color:#3f5d72; }
  #vdiv,#hdiv{ position:fixed; z-index:6; background:#1b2troops; background:#1b2a3c; }
  #boot{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:50;
    background:var(--ink); font:600 14px/1 ui-monospace,monospace; color:#86a0bd; transition:opacity .5s; }
  /* ---- Android / touch ---- */
  canvas{ touch-action:none; }
  #touchbar{ position:fixed; z-index:9; right:8px; top:8px; display:none; flex-direction:column; gap:6px; pointer-events:auto; }
  #touchbar button{ font:800 10px/1 ui-monospace,monospace; color:#cfe6ff; background:#0c1826ee; border:1px solid #3a6a8a; border-radius:10px; padding:8px 9px; min-width:48px; -webkit-tap-highlight-color:transparent; }
  #touchbar button:active{ background:#16324a; }
  body.touch #touchbar{ display:flex; }
  /* on-screen FLIGHT controls: steering stick (bottom-left) + THR/FIRE (bottom-right) */
  #stick{ position:fixed; z-index:9; left:16px; bottom:80px; width:110px; height:110px; border-radius:50%; display:none; background:#0c182688; border:1px solid #3a6a8a; touch-action:none; pointer-events:auto; }
  #knob{ position:absolute; left:50%; top:50%; width:46px; height:46px; margin:-23px 0 0 -23px; border-radius:50%; background:#2a5a7ecc; border:1px solid #6fb4d8; }
  #btnThr,#btnFire{ position:fixed; z-index:9; right:16px; display:none; align-items:center; justify-content:center; width:66px; height:66px; border-radius:50%; font:800 12px/1 ui-monospace,monospace; color:#eaf6ff; border:1px solid #3a6a8a; -webkit-tap-highlight-color:transparent; pointer-events:auto; touch-action:none; }
  #btnThr{ bottom:156px; background:#12324acc; } #btnFire{ bottom:80px; background:#5a1e2ccc; border-color:#ff6a6e; }
  #btnThr:active,#btnFire:active{ filter:brightness(1.5); }
  body.touch #stick, body.touch #btnThr, body.touch #btnFire{ display:block; }
  @media (max-width:760px){
    #pillars{ display:none; }
    #roster{ top:8px; left:8px; flex-direction:row; flex-wrap:nowrap; gap:5px; overflow-x:auto; max-width:calc(100% - 66px); -webkit-overflow-scrolling:touch; }
    .rs{ width:auto; flex:0 0 auto; padding:5px 8px; }
    #ticker{ left:8px; width:calc(100% - 16px); max-width:none; top:48px; bottom:auto; max-height:22vh; font-size:12px; }
    #ticker.big{ width:calc(100% - 16px); max-width:none; max-height:52vh; }
    .vlabel{ font-size:9px; } .vlabel span{ display:none; }
    #chat{ left:8px !important; width:calc(100% - 16px) !important; height:42px; font-size:16px; line-height:42px; bottom:12px; }
    #market{ font-size:11px; max-width:94vw; left:50% !important; }
  }
</style>
</head>
<body>
<div id="stage"></div>
<div class="hud" id="pillars"></div>
<div class="hud" id="roster"></div>
<div class="hud" id="ticker"><div id="logtabs"></div><div id="logbody"></div></div>
<div id="market"></div>
<div class="vlabel" id="lblTop">TOP-DOWN <span>· scroll zoom · drag pan · click select · dbl-click reset</span></div>
<div class="vlabel" id="lblBrain">REASONING <span>· scroll zoom · drag pan</span></div>
<div id="vdiv"></div><div id="hdiv"></div>
<input id="chat" autocomplete="off" spellcheck="false" placeholder="terminal — type 'help'  ·  ask ORION what are you doing  ·  go &lt;planet&gt; / dock / market / mine / attack ORION  ·  or plain English to order the squadron">
<div id="touchbar">
  <button id="tbView"  title="cycle view">VIEW</button>
  <button id="tbDock"  title="dock nearest / base">DOCK</button>
  <button id="tbPilot" title="next pilot">PILOT ►</button>
  <button id="tbMkt"   title="market">MKT</button>
  <button id="tbLog"   title="expand log">LOG</button>
</div>
<div id="stick"><div id="knob"></div></div>
<button id="btnThr">THR</button>
<button id="btnFire">FIRE</button>
<div id="boot">loading squadron…</div>

<script src="three.min.js"></script>
<script>
"use strict";
// =================================================================================================
//  STARFIGHTER · AI SQUADRON — three views, ALL in WebGL (one renderer, three scissored viewports):
//    LEFT  : 3D chase camera following the focused pilot.
//    R-TOP : orthographic TOP-DOWN tactical view of the whole arena (see who contests what).
//    R-BTM : the focused pilot's live REASONING GRAPH (a three.js scene — no laggy 2D canvas).
//  Pilots are AI agents: fly via (throttle,pitch,yaw) in full 3D, SPEAK ENGLISH (3D bubbles over each
//  ship + a ticker), and CHOOSE their own upgrades. Ported Unity Starfighter2 rules + reused art.
//  No magic numbers (CFG). r128 THREE, vendored. Pillars: EMBODIMENT/NAVIGATION/COMMUNICATION/ECONOMY.
// =================================================================================================
const T = THREE;
const CFG = {
  ARENA_R:840, EDGE_STEER:0.9,            // the whole GALAXY bound; systems are clusters inside it
  N_SYSTEMS:3, SYSTEM_R:210, SUN_R:34,    // a galaxy of star systems; all travel is real-space (hyperspace removed for balance)
  THRUST:44, DRAG:0.7, VMAX:34, PITCH_RATE:1.7, YAW_RATE:1.5, BANK_MAX:0.7, BANK_LERP:3.5, SHIP_R:2.6, IFRAME:1.1,
  KP_YAW:1.5, KP_PITCH:1.5, ALIGN_FIRE:0.9, THR_TURN_EASE:0.55, GEM_EASE_R:16,
  STANDOFF_R:12, BRAKE_R:26, CRUISE_THR:0.5,   // CH7 fix: throttle brakes/coasts to a target's standoff range (was hardcoded always-on -> "full throttle, never stop")
  BULLET_SPEED:118, BULLET_LIFE:1.1, BULLET_R:0.9, FIRE_CD:0.27, BULLET_DMG:12, MUZZLE_OFF:1.8,
  AST_KEEP:40, AST_MAX:58, AST_SCALE_MIN:2.4, AST_SCALE_MAX:7.0, AST_HP_PER_SCALE:6.5,
  AST_SPLIT_MIN:3, AST_SPLIT_MAX:5, AST_CHILD_FRAC:0.52, AST_NOSPLIT:2.0, AST_DRIFT:5, AST_SPLIT_KICK:12, AST_DMG:20,
  GEM_CREDIT_PER_SCALE:2, GEM_FOOD:9, GEM_PICK_R:8.5, GEM_LIFE:26, GEM_MAGNET:26, GEM_GRAB_R:55,
  HP_BASE:100, HP_PER_HULL:0.20, REGEN:2.2, WEAPON_FIRE:0.16, WEAPON_DMG:0.24, ENGINE_GAIN:0.15,
  UP_COST_BASE:24, UP_COST_GROW:1.5, RESPAWN_DELAY:2.0, DEATH_CREDIT_LOSS:0.4,
  EVADE_HP:0.32, THREAT_R:18, SENSE_R:95, UTTER_CD:2.6,
  // ---- ship-to-ship combat ----
  SHIP_BULLET_DMG:18,      // damage a bullet does to a rival ship (lethal when hits connect)
  TRADER_HP_MULT:0.7,      // balance: merchant hulls are cargo-first — hull space is expensive, so less armor
  TRADER_GUN_MULT:0.6,     // balance: merchants mount light guns (traders were too powerful in fights)
  HUNT_R:44,               // a pilot may opportunistically hunt a rival within this range
  HUNT_RATE:0.3,           // base per-second chance to start a hunt (× the pilot's aggression)
  HUNT_FIRE:0.85,          // wider fire cone when dogfighting a maneuvering ship
  AGGR_MIN:0.25, AGGR_MAX:1.0,   // per-pilot aggression trait
  KILL_BOUNTY:3,           // score to the killer; victim's credits drop as gems
  // ---- player commands (chat) ----
  CMD_DURATION:11,         // seconds an order from the player stays in force
  NSHIPS:8,
  // ---- trading economy · planets (organic: prices EMERGE from stock; nothing scripted; hyperspace REMOVED) ----
  N_PLANETS:5, DOCK_R:44, TRADE_COOLDOWN:0.5, HOLD_CAP:40, TRADE_QTY:20, TRADER_FRAC:0.62, CREDIT_RESERVE:12,
  FUEL_CAP:60, FUEL_START:60, FUEL_LOW:18,
  PROD_RATE:0.85, CONS_RATE:0.78, EQ_STOCK:120, PRICE_ELAST:0.9, PRICE_MIN:0.25, PRICE_MAX:3.4, PROFIT_MIN:2.5,
  // ---- ecosystem (phase 2): cargo drops · living/growing planets · hired defenders ----
  POD_LIFE:34, SALVAGE:0.6, POD_CHUNK:8,
  CITIZEN_INCOME:1.7, DEV_COST_BASE:240, DEV_COST_GROW:1.34, DEV_PROD:0.16, DEV_EQ:0.12, DEV_RADIUS:0.05, PLANET_WEALTH0:150,
  DEFEND_R:115, HIRE_COST:110, HIRE_CD:5.5, MAX_DEF_PER:2, DEF_DESPAWN:15, MAX_SHIPS:26, RAID_LOOT:0.15,   // MAX_SHIPS headroom so escalating pirates don't starve coalition defenders
  PLANET_HULL:3500, PLANET_DMG:2, PLANET_REGEN:16, SCRAP_GEM:2,          // planets are VERY tanky -> killing one is slow + strategic, not a farm
  TERRA_PAY:60, TERRA_STEP:0.12, TERRA_AI_COST:130, TERRA_AI_STEP:0.02,  // terraform: earth-like conversion (by human or AI), slow
  // ---- factions / reputation (planets remember who helps vs bombs them) ----
  REP_HOSTILE:-6, REP_ALLIED:6, REP_TRADE:0.12, REP_TERRA:0.6, REP_BOMB:0.5, REP_MAX:12, REP_DISCOUNT:0.15,
  REP_KILL_HEG:0.4, REP_LIBERATE:3,          // M2: coalition standing — fight the Hegemon, planets warm to you
  // ---- weak enemy pirates (farm targets) + inter-agent communication ----
  PIRATE_MAX:5, PIRATE_HP:42, PIRATE_DMG:6, PIRATE_HUNT_R:170, PIRATE_SPAWN_CD:6, PIRATE_LOOT:14,
  COMM_R:190, COMM_CD:3.5,          // radio range for agent-to-agent messages + per-agent cooldown
  COMM_EPS:0.12, COMM_LR:0.5, COMM_LEARN_CD:0.22,   // A1: Lewis-game exploration ε, learning rate, episode cadence
  CHAIN_SPEAK_CD:7.5,                                // A0: how often the focused pilot narrates its full reasoning chain to radio
  TOM_CD:0.15, TOM_R:300,                            // A2: theory-of-mind sampling cadence + candidate radius
  NAV_GAIN0:0.55, NAV_STEP:0.09, NAV_ADAPT_CD:2.0, NAV_MIN:0.2, NAV_MAX:2.2,   // A3: learned steering gain (start low; adapters hill-climb toward the ~1.4 tracking optimum)
  CHAIN_DRIVE:true, RAY_ENGAGE:1.0, RAY_COLLECT:1.35, RAY_MINE:0.7, RAY_Q_CD:0.13,   // A7: the free choice EMERGES from value-scored hypothesis-rays (not a fixed priority cascade)
  RAY_LEARN:true, RAY_ADAPT_CD:2.5, RAY_LR:0.3, SCORE_W:1.5, RAY_W0:1.0,   // A9: ray weights are LEARNED per-pilot from reward-rate (reward = credits + SCORE_W*score; credits-dominant = the real currency)
  DISCOVER:true, DISCO_LR:0.15, DISCO_CURIOSITY:2.2, DISCO_CLIP:10,   // A11: the pilot is NOT handed a goal menu — it sees objects as raw feature buckets (NO type) + DISCOVERS which pay + picks its own target (DISCO_CLIP bounds a single reward event)
  GROUNDED:true, SENSE_NOISE:0.07, BELIEF_ALPHA:0.34,   // A4: combat perception is NOISY (∝distance) + FUSED into a believed position; the pilot aims at its belief, not ground truth
  // A10: de-hardcoded behavioral tunables (were magic numbers baked into decision logic — see AGI_AUDIT F3)
  RAY_SEARCH_MUL:1.3, RAY_FIRE_MUL:1.6, RAY_FLEE_MUL:1.5, HPADV_MAX:3, SIT_SENSE_MUL:0.85, SIT_GEM_MIN:2,
  UPGRADE_HULL_DEATHS:2, WAR_CONTEST_FRAC:0.5, NAV_MIN_SAMPLES:6, TOM_FACE_W:3, CMD_MINE_MUL:1.6,
  // ---- M1: the HEGEMON rises (escalating machine invader + galactic war) ----
  ESC_RATE:0.5, ESC_PER_TIER:40, INVADE_THRESHOLD:3, LIBERATE_GRACE:6, CONTESTED_PROD:0.4,
  WIN_THRESHOLD:6, WAR_DRIFT:0.2, ESC_LIBERATE_CUT:14, WIN_REWARD:400, WIN_ESC_CUT:60,   // M7: war-front tug-of-war + win/lose
  STRONGHOLD_ESC:70, STRONGHOLD_HULL:2600, STRONGHOLD_REGEN:10, STRONGHOLD_SPAWN_CD:9, STRONGHOLD_REWARD:600, STRONGHOLD_ESC_CUT:45, STRONGHOLD_WARSCORE:3,   // M12: the boss node — assault it to break the front
  CONTRACT_MAX:4, CONTRACT_REP:2, CONTRACT_BOUNTY_EA:22, CONTRACT_DEF_REWARD:160, CONTRACT_REFILL_CD:20,   // M4: coalition job board
  ART_DROP_BASE:0.10, ART_DROP_PER_TIER:0.22,          // M6: artifact drop chance = base + tier*per (Drone 10% .. Warlord 54%)
  BASE_R:46, SCAN_CHANCE:0.5, SCAN_FINE:0.6, CONTRA_MARKUP:2.3,   // M8/M10: base dock radius; scan probability + fine; contraband fence markup at hostile worlds
  MAX_ENCOUNTERS:4, ENCOUNTER_CD:13, ENCOUNTER_R:17, ENCOUNTER_LIFE:70, NEWS_CD:22,   // M11: roaming derelicts/caches/distress + galaxy news that shocks prices
  CAM_BACK:18, CAM_UP:7.5, CAM_AHEAD:20, CAM_LAG:3.0, CAM_UP_LERP:2.4,
  SPEAK_SHOW:2.4, SPEECH_WS:0.03,                  // 3D speech bubble: only for meaningful events now, smaller
  RIGHT_FRAC:0.4, RIGHT_MIN:340, RIGHT_MAX:600,    // right column width
  TOP_ZOOM:1.08,                                   // top-down ortho margin past the arena
};
const FWD=new T.Vector3(0,0,-1), UPL=new T.Vector3(0,1,0), RGT=new T.Vector3(1,0,0), WUP=new T.Vector3(0,1,0);
const clamp=T.MathUtils.clamp, lerp=T.MathUtils.lerp, rand=T.MathUtils.randFloat, randi=T.MathUtils.randInt;
const TAU=Math.PI*2;
const PILOTS=['VEGA','ORION','LYRA','CORVUS','DRACO','MIRA','ARA','PYXIS','VELA','CRUX'];
const HUES  =[0.55,0.08,0.33,0.85,0.14,0.62,0.0,0.46,0.74,0.93];
// ORIGINAL faction lore — the empire-vs-guardian-order archetype (a "light order vs authoritarian empire" story), NOT
// copied from any franchise. GIVEN game flavor, labeled as such in chat (not an AGI claim). Coalition = the WARDENS
// (guardian pilots of the free systems); Hegemon = the IRON SYNOD (a conquest-empire of endless escalation).
const LORE={ coalition:'the Wardens, an old order of ace pilots sworn to shield the free systems',
             hegemon:'the Iron Synod, a conquest-empire that answers every free world with escalation' };
const BACKSTORY={ coalition:[
  'last cadet of the Ember Vigil, who flew out of a burning academy and never stopped turning toward the fight',
  'a Coalition ace who defected from a Synod carrier the day it fired on its own colony',
  'grew up on a relay the Synod starved out; now she jams their fleets for a living',
  'a salvage-runner who took the Warden oath after pulling survivors from a wreck no one else would touch',
  'court-martialed for refusing an order to retreat; the settlers he saved renamed a moon for him',
  'a field-medic who learned to fly to reach the wounded faster than the war could kill them',
  "born in the Coalition's last shipyard; she can hear a failing engine three bays away",
  'the navigator who mapped the dead lanes of the Sundering so refugees could slip the blockade',
  'a champion racer who traded her trophies for a gun-turret when the Synod came for her homeworld',
  'eldest of the Wardens; she remembers the Order before the fall and will not let it die' ],
  hegemon:[
  'a conscript of the Iron Synod, taught the frontier is begging to be put in order',
  'a true believer who calls one will mercy and free flight chaos',
  'a warlord-aspirant collecting kills to earn a name from the Synod',
  'a drone-captain who has never once questioned an order',
  'an enforcer sent to make an example of any world that will not kneel',
  'a raider promoted for burning a colony that refused the tithe',
  'a tithe-collector who takes ships, cargo, and pilots alike',
  'a zealot of escalation who believes more war is more order' ] };
const MODE_COL={MINE:'#ffb070',COLLECT:'#ffd24a',EVADE:'#ff5a6e',BOUND:'#9a8cff',UPGRADE:'#86ff9d',SEEK:'#7fb0d0',
  HUNT:'#ff5a6e',ESCORT:'#7fd0ff',HOLD:'#9fb6cc',RALLY:'#c08cff',TRADE:'#6ee0b0',DOCK:'#6ee0b0'};
const innerW=()=>window.innerWidth||1280, innerH=()=>window.innerHeight||760;

// ---------------------------------------------------------------- renderer + cameras + scenes
const stage=document.getElementById('stage');
const renderer=new T.WebGLRenderer({ antialias:true, powerPreference:'high-performance', preserveDrawingBuffer:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.outputEncoding=T.sRGBEncoding;
stage.appendChild(renderer.domElement);

const scene=new T.Scene();
scene.add(new T.HemisphereLight(0x9fc0ff,0x10131c,0.9));
const sun=new T.DirectionalLight(0xfff0d8,1.1); sun.position.set(80,120,40); scene.add(sun);
const rim=new T.DirectionalLight(0x6ea8ff,0.5); rim.position.set(-60,40,-80); scene.add(rim);

const chaseCam=new T.PerspectiveCamera(60,1,0.5,6000); chaseCam.position.set(0,CFG.CAM_UP,CFG.CAM_BACK);
chaseCam.layers.enable(2);                                   // chase view also shows SPEECH (layer 2)
const topCam=new T.OrthographicCamera(-1,1,1,-1,1,5000); topCam.position.set(0,CFG.ARENA_R*2.6,0);
topCam.up.set(0,0,-1); topCam.lookAt(0,0,0); topCam.layers.enable(1);   // top view also shows BLIPS (layer 1)

// ---------------------------------------------------------------- textures
function glowTex(){ const c=document.createElement('canvas'); c.width=c.height=64; const g=c.getContext('2d');
  const gr=g.createRadialGradient(32,32,0,32,32,32); gr.addColorStop(0,'rgba(255,255,255,1)');
  gr.addColorStop(.22,'rgba(255,255,255,.85)'); gr.addColorStop(.55,'rgba(255,255,255,.25)'); gr.addColorStop(1,'rgba(255,255,255,0)');

function fighterMesh(hue){
  const S=1.55;
  const v=[ 0,0,-2.6, 0,0.55,0, 0,-0.5,0.2, -2,0,1, 2,0,1, 0,0,1.5, 0,1.05,1.2 ].map(x=>x*S);

  const g=new T.BufferGeometry(); g.setAttribute('position',new T.Float32BufferAttribute(v,3)); g.setIndex(f); g.computeVertexNormals();
  const uv=[]; for(let k=0;k<v.length;k+=3){ uv.push(0.5+v[k]/(4*S*1.25), 0.5+v[k+2]/(4*S*1.25)); }   // planar UVs so the hull texture maps

// through targets whenever bulletSpeed×dt exceeds the hit radius (e.g. autocannon 150u/s at <43fps) — the reported
// "bullets don't collide". Testing the whole travel segment makes hits frame-rate independent.
function segDistSq(a,b,p){ const abx=b.x-a.x, aby=b.y-a.y, abz=b.z-a.z; const L=abx*abx+aby*aby+abz*abz||1e-9;

  const cx=a.x+abx*t-p.x, cy=a.y+aby*t-p.y, cz=a.z+abz*t-p.z; return cx*cx+cy*cy+cz*cz; }

  else if(e.kind==='cache'){ const c=randi(60,170); P.credits+=c; term(`Cracked a treasure cache: +${c}c!`,'sys'); ev(`YOU cracked a cache (+${c}c).`); }
  else { const c=randi(40,110); P.credits+=c; const np=nearestPlanet(e.pos); if(np) repAdd(np,CFG.REP_TERRA); P.score+=2; checkRankUp(P); term(`Answered a distress call — rescued the crew: +${c}c, +standing.`,'sys'); ev(`YOU answered a distress call (+${c}c, +rep).`); } }
function encounterTick(dt){ encounterCd-=dt; if(encounterCd<=0){ encounterCd=CFG.ENCOUNTER_CD; spawnEncounter(); }
  const P=ships[0]; for(let i=encounters.length-1;i>=0;i--){ const e=encounters[i]; e.age+=dt; e.mesh.rotation.y+=dt*1.2; e.mesh.rotation.x+=dt*0.6; e.blip.position.copy(e.pos);
    if(P&&P.alive&&!P.warping&&P.pos.distanceTo(e.pos)<CFG.ENCOUNTER_R){ resolveEncounter(e); removeEncounter(i); continue; }
    if(e.age>CFG.ENCOUNTER_LIFE) removeEncounter(i); }
  newsCd-=dt; if(newsCd<=0){ newsCd=CFG.NEWS_CD; if(planets.length){ const p=planets[randi(0,planets.length-1)], g=GOODS[randi(0,GOODS.length-1)];   // shock STOCK only — prices stay emergent (organic)
    if(rand(0,1)<0.5){ p.stock[g.k]=Math.max(1,p.stock[g.k]*0.3); ev(`<b>NEWS</b> — ${g.n} shortage at ${p.name}; prices spike.`); } else { p.stock[g.k]=p.stock[g.k]*2.4+25; ev(`<b>NEWS</b> — ${g.n} glut at ${p.name}; prices crash.`); } } } }
function applyHull(s,key){ const H=HULLS[key]; if(!H) return; s.hullClass=key;
  s.maxHp=H.hp*(1+CFG.HP_PER_HULL*((s.lvl?s.lvl.hull:1)-1)); s.hp=s.maxHp;
  s.holdCap=H.hold + ((s.equip&&s.equip.cargo)||0)*15; s.hullSpeed=H.speed; }
function priceOf(p,gk){ const g=GKEY[gk], ratio=(p.eq||CFG.EQ_STOCK)/Math.max(1,p.stock[gk]); return g.base*clamp(Math.pow(ratio,CFG.PRICE_ELAST),CFG.PRICE_MIN,CFG.PRICE_MAX); }
// reputation: helping a planet (trade/terraform) raises rep across its system faction; bombing it lowers it
function repAdd(p,amt){ p.rep=clamp((p.rep||0)+amt,-CFG.REP_MAX,CFG.REP_MAX); if(p.system) for(const q of p.system.planets){ if(q!==p&&planets.indexOf(q)>=0) q.rep=clamp((q.rep||0)+amt*0.5,-CFG.REP_MAX,CFG.REP_MAX); } }
function repBuyFactor(p){ return 1-clamp((p.rep||0)/CFG.REP_MAX,-1,1)*CFG.REP_DISCOUNT; }   // allied cheaper, hostile surcharge
function repSellFactor(p){ return 1+clamp((p.rep||0)/CFG.REP_MAX,-1,1)*CFG.REP_DISCOUNT; }
// ---- M4: CONTRACTS — coalition worlds post jobs vs the Hegemon (bounty / defense / supply). Player-facing goals. ----
let contracts=[], nextContractId=1, contractCd=0;
function makeContract(){ const issuer=planets[randi(0,planets.length-1)]; if(!issuer) return null; const roll=rand(0,1); let ct;
  if(roll<0.45){ const need=randi(2,5); ct={type:'bounty', need, got:0, reward:need*CFG.CONTRACT_BOUNTY_EA+randi(0,40), rep:CFG.CONTRACT_REP, desc:`Destroy ${need} Hegemon ships`}; }
  else if(roll<0.7 && systems.length){ const sy=systems[randi(0,systems.length-1)]; ct={type:'defense', sysId:sy.id, reward:CFG.CONTRACT_DEF_REWARD+randi(0,80), rep:CFG.CONTRACT_REP+2, desc:`Liberate the ${sy.name} system`}; }
  else { const g=GOODS[randi(0,GOODS.length-1)], need=randi(3,8); ct={type:'supply', good:g.k, need, reward:Math.round(need*g.base*1.6)+randi(0,50), rep:CFG.CONTRACT_REP, desc:`Deliver ${need} ${g.n} to ${issuer.name}`}; }
  ct.id=nextContractId++; ct.issuer=issuer; ct.accepted=false; ct.done=false; ct.born=T0; return ct; }
function refillContracts(){ contracts=contracts.filter(c=>!c.done); while(contracts.length<CFG.CONTRACT_MAX){ const c=makeContract(); if(!c) break; contracts.push(c); ev(`Contract posted @ ${c.issuer.name}: ${c.desc} — ${c.reward}c`); } }
function completeContract(ct){ if(ct.done) return; ct.done=true; const P=ships[0]; P.credits+=ct.reward; repAdd(ct.issuer,ct.rep); P.score+=Math.max(3,Math.round(ct.reward/25)); checkRankUp(P);   // M5: contracts advance rank
  term(`✔ CONTRACT COMPLETE: ${ct.desc} — +${ct.reward}c, +${ct.rep} rep @ ${ct.issuer.name}.`,'sys'); ev(`Contract fulfilled: ${ct.desc} (+${ct.reward}c).`); }
function contractKill(){ for(const c of contracts) if(c.accepted&&!c.done&&c.type==='bounty'){ c.got++; if(c.got>=c.need) completeContract(c); } }
function contractLiberate(sy){ for(const c of contracts) if(c.accepted&&!c.done&&c.type==='defense'&&c.sysId===sy.id) completeContract(c); }
function contractDeliver(p){ const P=ships[0]; for(const c of contracts) if(c.accepted&&!c.done&&c.type==='supply'&&c.issuer===p){ const have=P.cargo[c.good]||0; if(have>=c.need){ P.cargo[c.good]-=c.need; if(P.cargo[c.good]<=0) delete P.cargo[c.good]; completeContract(c); } } }
function growPlanet(p){ p.dev++; p.eq=CFG.EQ_STOCK*(1+CFG.DEV_EQ*(p.dev-1));
  p.mesh.scale.setScalar(1+CFG.DEV_RADIUS*(p.dev-1)); if(p.label) p.label.set(p.name+' · '+p.type.t+' · Lv'+p.dev,'#eaf2ff'); ev(`${p.name} grew to Lv${p.dev} · ${p.type.t}`); }
function advanceTerra(p,amt){ p.terra=Math.min(1,(p.terra||0)+amt);                    // barren world greens toward earth
  const col=new T.Color(p.type.col).lerp(new T.Color(0x3a86c0),p.terra*0.85); p.mesh.material.color.copy(col); p.mesh.material.emissive.copy(col).multiplyScalar(0.22);
  if(p.terra>=1 && p.type!==GARDEN){ p.type=GARDEN; p.terraformable=false; p.mesh.material.color.set(GARDEN.col); p.mesh.material.emissive.set(GARDEN.col).multiplyScalar(0.25);
    if(p.label) p.label.set(p.name+' · Garden · Lv'+p.dev,'#bfeaff'); ev(`${p.name} terraformed to EARTH-LIKE — a Garden world.`); } }
function terraformStep(p,payer){ if(!p.terraformable||p.terra>=1||payer.credits<CFG.TERRA_PAY) return 0; payer.credits-=CFG.TERRA_PAY; advanceTerra(p,CFG.TERRA_STEP); if(payer.role==='player') repAdd(p,CFG.REP_TERRA); return CFG.TERRA_PAY; }
function econTick(dt){ for(const p of planets){ const mk=p.type.makes,nd=p.type.needs, devP=1+CFG.DEV_PROD*(p.dev-1), war=(p.system&&p.system.contested)?CFG.CONTESTED_PROD:1;
  for(const g of GOODS){ let s=p.stock[g.k]; if(mk[g.k]) s+=mk[g.k]*CFG.PROD_RATE*dt*devP*war; if(nd[g.k]) s-=nd[g.k]*CFG.CONS_RATE*dt*devP; p.stock[g.k]=Math.max(0,s); }
  p.wealth+=CFG.CITIZEN_INCOME*p.dev*dt;                              // citizens (statistical) generate wealth
  const cost=CFG.DEV_COST_BASE*Math.pow(CFG.DEV_COST_GROW,p.dev-1);   // planet reinvests -> endless slow growth
  if(p.wealth>=cost){ p.wealth-=cost; growPlanet(p); }
  if(T0-(p.hullT||0)>3 && p.hull<p.maxHull) p.hull=Math.min(p.maxHull,p.hull+CFG.PLANET_REGEN*dt);                 // heals unless under sustained fire
  if(p.terraformable && p.terra<1 && p.wealth>CFG.TERRA_AI_COST){ p.wealth-=CFG.TERRA_AI_COST*dt*0.3; advanceTerra(p,CFG.TERRA_AI_STEP*dt); }   // AI self-terraforms, slowly
  p.defCd=Math.max(0,p.defCd-dt); } }
function nearestPlanet(pos){ let best=null,bd=1e9; for(const p of planets){ const d=pos.distanceTo(p.pos); if(d<bd){bd=d;best=p;} } return best; }
function cargoTotal(s){ let n=0; for(const k in s.cargo) n+=s.cargo[k]; return n; }
// buy/sell MOVE stock -> MOVE price (the organic pressure; no cheating)
function buy(s,p,gk,qty){ let price=priceOf(p,gk); if(s.role==='player') price*=repBuyFactor(p); const reserve=s.role==='player'?0:CFG.CREDIT_RESERVE;
  qty=Math.min(qty,Math.floor(Math.max(0,s.credits-reserve)/price),(s.holdCap||CFG.HOLD_CAP)-cargoTotal(s),Math.floor(p.stock[gk]-4));
  if(qty<=0) return 0; s.credits-=Math.round(price*qty); p.stock[gk]-=qty; s.cargo[gk]=(s.cargo[gk]||0)+qty; if(s.role==='player') repAdd(p,CFG.REP_TRADE); return qty; }
function sell(s,p,gk,qty){ qty=Math.min(qty,s.cargo[gk]||0); if(qty<=0) return 0; let price=priceOf(p,gk); if(s.role==='player') price*=repSellFactor(p);
  const rev=Math.round(price*qty); s.credits+=rev; p.stock[gk]+=qty; s.cargo[gk]-=qty; if(s.cargo[gk]<=0) delete s.cargo[gk]; if(s.role==='player') repAdd(p,CFG.REP_TRADE); return rev; }
function refuel(s,p){ const cap=s.fuelCap||CFG.FUEL_CAP, need=cap-s.fuel; if(need<1) return 0; const price=priceOf(p,'gas');
  const q=Math.min(Math.ceil(need),Math.floor(s.credits/price),Math.floor(p.stock.gas-4)); if(q<=0) return 0; s.credits-=Math.round(price*q); p.stock.gas-=q; s.fuel=Math.min(cap,s.fuel+q); return q; }
function bestArbitrage(s){ const opts=[]; for(const g of GOODS){ if(g.k==='gas') continue;
  for(const bp of planets){ const bpr=priceOf(bp,g.k); for(const sp of planets){ if(sp===bp) continue; const pr=priceOf(sp,g.k)-bpr;
    if(pr>CFG.PROFIT_MIN) opts.push({good:g.k,buy:bp,sell:sp,profit:pr}); } } }
  if(!opts.length) return null; opts.sort((a,b)=>b.profit-a.profit);
  return opts[Math.floor(rand(0,1)*rand(0,1)*Math.min(opts.length,6))]; }   // spread traders across top routes (anti-herding)
function planTrade(s){ if(s.fuel<CFG.FUEL_LOW){ s.tradePlan={type:'refuel',planet:nearestPlanet(s.pos)}; return; }
  if(cargoTotal(s)>0){ let bg=null,bp=null,bv=-1; for(const k in s.cargo) for(const p of planets){ const v=priceOf(p,k); if(v>bv){bv=v;bg=k;bp=p;} } s.tradePlan={type:'sell',planet:bp,good:bg}; return; }
  const arb=bestArbitrage(s); s.tradePlan=arb?{type:'buy',planet:arb.buy,good:arb.good}:null; }
// startWarp/advanceWarp REMOVED (user balance directive 2026-07-03): hyperspace let traders teleport arbitrage routes and
// made merchants too powerful — everyone flies real-space now. `s.warping` stays as an always-false field (guards inert).
function doTrade(s,dt){ s.tradeCd=Math.max(0,s.tradeCd-dt); if(!s.tradePlan && s.tradeCd<=0) planTrade(s);
  if(!s.tradePlan||!s.tradePlan.planet||planets.indexOf(s.tradePlan.planet)<0){ s.tradePlan=null; return null; } const p=s.tradePlan.planet, d=s.pos.distanceTo(p.pos);
  if(d<=CFG.DOCK_R){ const pl=s.tradePlan;
    if(pl.type==='refuel'){ const g=refuel(s,p); say(s, g>0?`Refueled at ${p.name} · +${g} gas`:`${p.name}: tanks full / no gas`); }
    else if(pl.type==='buy'){ const q=buy(s,p,pl.good,CFG.TRADE_QTY); say(s, q>0?`Bought ${q} ${GKEY[pl.good].n} @ ${p.name} (${Math.round(priceOf(p,pl.good))}c/u)`:`${p.name}: can't buy ${GKEY[pl.good].n}`); }
    else if(pl.type==='sell'){ const r=sell(s,p,pl.good,CFG.HOLD_CAP); say(s, r>0?`Sold ${GKEY[pl.good].n} @ ${p.name} · +${r}c`:`${p.name}: nothing to sell`); }
    s.tradePlan=null; s.tradeCd=CFG.TRADE_COOLDOWN; return {mode:'DOCK',target:null,aimDir:FWD.clone().applyQuaternion(s.quat),ease:0.15}; }
  return {mode:'TRADE',target:null,aimDir:_v.copy(p.pos).sub(s.pos),ease:1}; }   // hyperspace REMOVED (balance): traders fly real-space like everyone

// ---------------------------------------------------------------- cargo drops (salvage pods)
const cargoPods=[];
const CATCOL={raw:0xc08a5a,bio:0x74b45a,fuel:0x5ad0c0,ind:0x8f97ab,hi:0x5aa6c8,lux:0xc85ab0};
function spawnCargoPod(pos,good,qty){ qty=Math.round(qty); if(qty<=0) return; const col=CATCOL[GKEY[good].cat]||0xbfd8ff;
  const m=new T.Mesh(new T.BoxGeometry(2,2,2),new T.MeshStandardMaterial({color:col,emissive:new T.Color(col).multiplyScalar(0.5),roughness:0.5,metalness:0.3})); m.position.copy(pos);
  const halo=new T.Sprite(new T.SpriteMaterial({map:GLOW,color:col,blending:T.AdditiveBlending,transparent:true,depthWrite:false,opacity:0.6})); halo.scale.setScalar(7); m.add(halo); scene.add(m);
  cargoPods.push({pos:pos.clone(),vel:new T.Vector3(rand(-1,1),rand(-1,1),rand(-1,1)).setLength(rand(2,6)),good,qty,mesh:m,age:0,spin:rand(0.5,1.5)}); }
function dropCargo(s){ for(const k in s.cargo){ let left=s.cargo[k]; while(left>0){ const q=Math.min(left,CFG.POD_CHUNK);
  spawnCargoPod(_v.copy(s.pos).add(new T.Vector3(rand(-4,4),rand(-4,4),rand(-4,4))),k,q); left-=q; } } s.cargo={}; }
function scoopPod(s,c){ const g=GKEY[c.good];
  if(s.role==='trader' && cargoTotal(s)+c.qty<=CFG.HOLD_CAP){ s.cargo[c.good]=(s.cargo[c.good]||0)+c.qty; say(s,`Scooped ${c.qty} ${g.n} salvage`); }
  else { const val=Math.round(c.qty*g.base*CFG.SALVAGE); s.credits+=val; say(s,`Looted ${c.qty} ${g.n} · +${val}c`); } }
function updateCargoPods(dt){ for(let i=cargoPods.length-1;i>=0;i--){ const c=cargoPods[i]; c.age+=dt; let taken=false;
  for(const s of ships){ if(!s.alive||s.warping) continue; const d=s.pos.distanceTo(c.pos);
    if(d<CFG.GEM_MAGNET) c.vel.addScaledVector(_v.copy(s.pos).sub(c.pos).setLength(1),(CFG.GEM_MAGNET-d)*0.6*dt*8);
    if(d<CFG.GEM_PICK_R+1){ scoopPod(s,c); scene.remove(c.mesh); cargoPods.splice(i,1); taken=true; break; } }
  if(taken) continue;
  c.vel.multiplyScalar(Math.exp(-1.0*dt)); c.pos.addScaledVector(c.vel,dt); if(c.pos.length()>CFG.ARENA_R-1) c.pos.setLength(CFG.ARENA_R-1);
  c.mesh.position.copy(c.pos); c.mesh.rotation.y+=dt*c.spin; c.mesh.rotation.x+=dt*c.spin*0.6;
  if(c.age>CFG.POD_LIFE){ scene.remove(c.mesh); cargoPods.splice(i,1); } } }

function removeShip(s){ const i=ships.indexOf(s); if(i<0) return; scene.remove(s.mesh);

function planetDefense(){ for(const p of planets){ let hostile=null,defcount=0;
  for(const o of ships){ if(!o.alive) continue; if(o.role==='defender'){ if(o.home===p) defcount++; continue; }
    if(!hostile && o.pos.distanceTo(p.pos)<CFG.DEFEND_R && (o.mode==='HUNT' || (o.role==='player'&&p.rep<=CFG.REP_HOSTILE))) hostile=o; }
  if(!hostile && p.system && p.system.contested){                          // M2: coalition scrambles to liberate its own system
    let bd=1e9; for(const o of ships){ if(o.alive&&o.team==='pirate'){ const d=o.pos.distanceTo(p.pos); if(d<bd&&d<CFG.SYSTEM_R){bd=d;hostile=o;} } } }
  p.underThreat=!!hostile;
  if(hostile && p.wealth>=CFG.HIRE_COST && defcount<CFG.MAX_DEF_PER && p.defCd<=0 && ships.length<CFG.MAX_SHIPS){

// M7: a transient centered banner (created lazily; fades out)
function flashBanner(html,color){ let el=document.getElementById('warbanner'); if(!el){ el=document.createElement('div'); el.id='warbanner';

function warWin(){ const P=ships[0]; P.credits+=CFG.WIN_REWARD; P.score+=20; checkRankUp(P); campaign++; warScore=0; escalation=Math.max(0,escalation-CFG.WIN_ESC_CUT);

// turn an active player order into {mode,target,aimDir,ease}
function applyCommand(s,c,dt){ let mode='SEEK',target=null,aimDir=null,ease=1;
  if(c.type==='hunt'){ let t=c.target; if(!t||!t.alive||t===s) t=nearestRival(s); if(t){ mode='HUNT'; target=t; aimDir=_v.copy(t.pos).sub(s.pos); } else aimDir=FWD.clone().applyQuaternion(s.quat); }
  else if(c.type==='follow'){ let t=c.target; if(!t||!t.alive||t===s) t=nearestRival(s); if(t){ mode='ESCORT'; target=t; aimDir=_v.copy(t.pos).sub(s.pos); const d=s.pos.distanceTo(t.pos); if(d<16) ease=clamp(d/16,0.12,1); } else aimDir=FWD.clone().applyQuaternion(s.quat); }
  else if(c.type==='mine'){ const r=asteroids.filter(a=>s.pos.distanceTo(a.pos)<CFG.SENSE_R*CFG.CMD_MINE_MUL); if(r.length){ mode='MINE'; target=pickTarget(s,r); aimDir=_v.copy(target.pos).sub(s.pos); } else { mode='SEEK'; aimDir=FWD.clone().applyQuaternion(s.quat); } }
  else if(c.type==='collect'){ if(gems.length){ mode='COLLECT'; target=pickTarget(s,gems.slice()); aimDir=_v.copy(target.pos).sub(s.pos); const gd=s.pos.distanceTo(target.pos); if(gd<CFG.GEM_EASE_R) ease=clamp(gd/CFG.GEM_EASE_R,0.25,1); } else { mode='SEEK'; aimDir=FWD.clone().applyQuaternion(s.quat); } }
  else if(c.type==='flee'){ mode='EVADE'; const th=nearestRival(s); aimDir= th? _v.copy(s.pos).sub(th.pos) : _v.copy(s.pos).multiplyScalar(-1); }
  else if(c.type==='hold'){ mode='HOLD'; aimDir=FWD.clone().applyQuaternion(s.quat); ease=0; }
  else if(c.type==='rally'){ mode='RALLY'; const rp=c.rally||new T.Vector3(); aimDir=_v.copy(rp).sub(s.pos); if(s.pos.distanceTo(rp)<14) ease=0.15; }
  else if(c.type==='scatter'){ mode='SEEK'; aimDir= s.pos.lengthSq()>1? _v.copy(s.pos).setLength(1) : FWD.clone().applyQuaternion(s.quat); }
  else if(c.type==='trade'){ const tr=doTrade(s,dt||0.016); if(tr) return tr; aimDir=FWD.clone().applyQuaternion(s.quat); }
  else if(c.type==='refuel'){ if(!s.tradePlan||s.tradePlan.type!=='refuel') s.tradePlan={type:'refuel',planet:nearestPlanet(s.pos)}; const tr=doTrade(s,dt||0.016); if(tr) return tr; aimDir=FWD.clone().applyQuaternion(s.quat); }
  else { aimDir=FWD.clone().applyQuaternion(s.quat); }
  return {mode,target,aimDir,ease}; }

function think(s,dt){

    s._prevVal=val; }

        else { s.docked=p; s.obj=null; contractDeliver(p);
          if(s.role==='player' && p.rep>CFG.REP_HOSTILE && contraCount(s)>0 && rand(0,1)<CFG.SCAN_CHANCE) scanBust(s,p);   // M10: coalition customs
          term(`Docked at ${p.name}${p.rep>=CFG.REP_ALLIED?' (ALLIED — best prices)':''}. (market · buy · sell · refuel · outfit · upgrade · terraform · contracts · <b>land</b> to walk the surface)`,'sys'); mode='HOLD'; aimDir=FWD.clone().applyQuaternion(s.quat); ease=0.15;
          if(s.role==='player'){ marketOn=true; const mk=document.getElementById('market'); if(mk){ mk.style.display='block'; updateMarket(); } }   // auto-open the market on docking (discoverable on phone)
        } }
      else { mode='TRADE'; aimDir=_v.copy(p.pos).sub(s.pos); } }
    else if(o.type==='hunt'){ if(o.target&&o.target.alive){ mode='HUNT'; target=o.target; aimDir=_v.copy(o.target.pos).sub(s.pos); } else { s.obj=null; term('Target down / lost.','sys'); } }

    else if(o.type==='flee'){ mode='EVADE'; const th=nearestRival(s); aimDir=th?_v.copy(s.pos).sub(th.pos):_v.copy(s.pos).multiplyScalar(-1); }

  else if(cmd){ const r=applyCommand(s,cmd,dt); mode=r.mode; target=r.target; aimDir=r.aimDir; ease=r.ease; }  // player's order
  else if(s.hp<s.maxHp*CFG.EVADE_HP && threat){ mode='EVADE'; target=threat.o; aimDir=_v.copy(s.pos).sub(threat.o.pos); s.huntTarget=null; }

    else { mode='ESCORT'; aimDir=_v.copy(s.home.pos).sub(s.pos); if(s.pos.distanceTo(s.home.pos)<CFG.DEFEND_R*0.5) ease=0.35;

    s.huntTarget=tgt; if(tgt){ mode='HUNT'; target=tgt; aimDir=_v.copy(tgt.pos).sub(s.pos); } else { mode='SEEK'; aimDir=FWD.clone().applyQuaternion(s.quat); } }
  else if(s.huntTarget && s.huntTarget.alive && T0<s.huntUntil && s.pos.distanceTo(s.huntTarget.pos)<CFG.SENSE_R && s.hp>s.maxHp*0.4){

        else { const nh=pool.find(r=>r.mode!=='HUNT'); if(nh){ mode=nh.mode; target=nh.target; aimDir=_v.copy(target.pos).sub(s.pos); if(nh.mode==='COLLECT'){ const gd=s.pos.distanceTo(target.pos); if(gd<CFG.GEM_EASE_R) ease=clamp(gd/CFG.GEM_EASE_R,0.25,1); } } } }
      if(!mode && s.role!=='trader' && s.credits>=cheapestUp(s) && cargoTotal(s)===0) mode='UPGRADE';

      if(!aimDir) aimDir=_v.copy(s.vel).lengthSq()>1?s.vel.clone():FWD.clone().applyQuaternion(s.quat);   // A7: never leave aimDir null (fixes UPGRADE null-aim crash)

  if(s.wRay==null){ s.wRay={HUNT:CFG.RAY_W0,COLLECT:CFG.RAY_W0,MINE:CFG.RAY_W0}; s.rayAdapt=(s.role!=='player'&&s.team==='squad'&&(s.id%2===0)); s.rAcc={HUNT:0,COLLECT:0,MINE:0}; s.rT={HUNT:0.01,COLLECT:0.01,MINE:0.01}; s._prevVal=(s.credits||0)+(s.score||0)*CFG.SCORE_W; s._prevMode=null; }   // A9: learned ray-weights (start uniform; adapters climb reward-rate, frozen stay uniform)

  if(bought){ say(s,`${(s.credits)|0}c left → ${bought==='weapon'?'LASERS':bought==='engine'?'THRUSTERS':'HULL'} Lv${s.lvl[bought]}`); s.utter=CFG.UTTER_CD; }

// ---------------------------------------------------------------- physics
function flyStep(s,dt){
  _q.setFromAxisAngle(RGT,s.ctrl.pitch*CFG.PITCH_RATE*dt); s.quat.multiply(_q);
  _q.setFromAxisAngle(UPL,-s.ctrl.yaw*CFG.YAW_RATE*dt);    s.quat.multiply(_q); s.quat.normalize();
  s.bank=lerp(s.bank,-s.ctrl.yaw*CFG.BANK_MAX,1-Math.exp(-CFG.BANK_LERP*dt));
  const fwd=FWD.clone().applyQuaternion(s.quat);
  s.vel.addScaledVector(fwd,CFG.THRUST*(1+CFG.ENGINE_GAIN*(s.lvl.engine-1))*(s.hullSpeed||1)*s.ctrl.thr*dt);   // M9: hull class speed multiplier
  s.vel.multiplyScalar(Math.exp(-CFG.DRAG*dt));
  const vmax=CFG.VMAX*(1+CFG.ENGINE_GAIN*(s.lvl.engine-1)); if(s.vel.length()>vmax) s.vel.setLength(vmax);
  s.pos.addScaledVector(s.vel,dt);
  if(s.pos.length()>CFG.ARENA_R-CFG.SHIP_R){ s.pos.setLength(CFG.ARENA_R-CFG.SHIP_R); const n=s.pos.clone().normalize(); s.vel.addScaledVector(n,-1.5*s.vel.dot(n)); }
  for(let pi=0;pi<planets.length;pi++){ const p=planets[pi], effR=p.radius*(p.mesh.scale.x||1)+CFG.SHIP_R, dd=s.pos.distanceTo(p.pos);   // don't fly through planets
    if(dd<effR){ const n=_v2.copy(s.pos).sub(p.pos); if(n.lengthSq()<1e-4) n.set(1,0,0); n.setLength(1); s.pos.copy(p.pos).addScaledVector(n,effR); const vn=s.vel.dot(n); if(vn<0) s.vel.addScaledVector(n,-vn*1.25); } }
  s.hp=Math.min(s.maxHp,s.hp+(CFG.REGEN+(s.regenBonus||0))*dt); s.iframe=Math.max(0,s.iframe-dt);   // M3: repair droid adds regen
  _q.setFromAxisAngle(FWD,s.bank); s.mesh.position.copy(s.pos); s.mesh.quaternion.copy(s.quat).multiply(_q);
  s.mesh.userData.eng.material.opacity=0.3+0.5*s.ctrl.thr; s.mesh.userData.eng.scale.setScalar(1.3+1.5*s.ctrl.thr);
}
function step(dt){
  econTick(dt);
  for(const s of ships){
    if(s.alive){ if(s===ships[0] && MAN.active){ manualControl(s,dt); } else { think(s,dt); } flyStep(s,dt); }
    else { s.respawn-=dt; if(s.respawn<=0){ s.alive=true; s.mesh.visible=true; s.hp=s.maxHp; s.iframe=2; s.warping=false; s.tradePlan=null;
      const sys=systems.length?systems[randi(0,systems.length-1)]:{center:new T.Vector3()}; s.pos.copy(sys.center).add(new T.Vector3(rand(-1,1),rand(-0.5,0.5),rand(-1,1)).setLength(rand(30,CFG.SYSTEM_R*0.6)));
      s.vel.set(0,0,0); s.quat.setFromEuler(new T.Euler(rand(-0.4,0.4),rand(0,TAU),0)); say(s,'Respawned — back in.'); } } }
  for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i];
    if(b.homing>0 && b.target && b.target.alive){ const sp=b.vel.length(); if(sp>0.001){ _v.copy(b.target.pos).sub(b.pos); if(_v.lengthSq()>1e-4){ _v.normalize(); b.vel.addScaledVector(_v,b.homing*sp*dt).setLength(sp); } } }
    b.prev.copy(b.pos); b.pos.addScaledVector(b.vel,dt); b.life-=dt; b.mesh.position.copy(b.pos);
    if(b.life<=0||b.pos.length()>CFG.ARENA_R+8){ scene.remove(b.mesh); bullets.splice(i,1); } }
  // bullets vs rival ships (combat)
  for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i], owner=shipById[b.owner];
    for(const s of ships){ if(!s.alive||s.id===b.owner||s.iframe>0||s.warping||(owner&&owner.team===s.team)) continue;   // no friendly fire
      const hr=CFG.SHIP_R+CFG.BULLET_R; if(segDistSq(b.prev,b.pos,s.pos)<hr*hr){
        const dmg=(b.dmg!=null)?b.dmg:CFG.SHIP_BULLET_DMG;                                       // M3: damage baked at fire time
        s.hp-=dmg; noteHarm(s,owner); if(owner&&owner.team==='pirate'&&s.team==='squad'&&s.hp<s.maxHp*0.6) broadcast(s,'help',owner);   // call for backup + record the interaction note
        if(b.splash>0){ burst(b.pos,0xff7a4a,12,22,3.4); for(const o2 of ships){ if(o2===s||!o2.alive||o2.iframe>0||o2.warping||(owner&&owner.team===o2.team)) continue;
            if(o2.pos.distanceTo(b.pos)<b.splash){ o2.hp-=dmg*0.5; if(o2.hp<=0) killByShip(o2,owner); } } }                // M3: missile AoE
        burst(b.pos,s.color.getHex(),4,12,2.2); scene.remove(b.mesh); bullets.splice(i,1);
        if(s.hp<=0) killByShip(s,owner); break; } } }

function shipHits(t){ const out=[]; ships.forEach(s=>{ const i=t.indexOf(' '+s.name.toLowerCase()+' '); if(i>=0) out.push({s,i}); }); return out.sort((a,b)=>a.i-b.i); }
function parseChat(raw){
  const t=' '+raw.toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ')+' ';
  const isAll=/\b(all|everyone|every ?one|squad|team|fleet|pilots|guys|both)\b/.test(t);

  let verb=null,vidx=1e9; for(const v of VERBS){ const m=t.match(v.re); if(m){ const i=t.indexOf(m[0]); if(i<vidx){ vidx=i; verb=v.cmd; } } }
  if(!verb){ replyChatter(isAll?ships.filter(s=>s.alive):(names.length?[names[0].s]:[ships[focus]])); return; }
  const before=names.filter(n=>n.i<vidx), after=names.filter(n=>n.i>vidx);
  const addressees=isAll?ships.slice():(before.length?[before[0].s]:(after.length&&verb!=='hunt'&&verb!=='follow'?[after[0].s]:[ships[focus]]));
  let targetShip=null;
  if(verb==='hunt') targetShip=after[0]?after[0].s:(before[1]?before[1].s:null);
  if(verb==='follow') targetShip=/\b(me|you|player|lead)\b/.test(t)?ships[focus]:(after[0]?after[0].s:(before[1]?before[1].s:ships[focus]));
  const rally=/\b(me|here|you|on ?me)\b/.test(t)?ships[focus].pos.clone():new T.Vector3();
  dispatch(addressees,verb,targetShip,rally);

  function interact(){ let s=(rng()*POP)|0, l=(rng()*POP)|0; while(l===s) l=(rng()*POP)|0;

const shipBlips=[], gemBlips=[], planetBlips=[];
function topBlip(col,size,layer){ const sp=new T.Sprite(new T.SpriteMaterial({map:DISC,color:new T.Color(col),transparent:true,depthTest:false,depthWrite:false}));
  sp.scale.set(size,size,1); sp.layers.set(layer); sp.renderOrder=15; scene.add(sp); return sp; }
function buildBlips(){
  for(const p of planets){ const b=topBlip(p.type.col, p.radius*1.5, 1); b.position.copy(p.pos); b.renderOrder=13; b.material.opacity=0.9; planetBlips.push(b); }
  for(const s of ships) shipBlips[s.id]=topBlip(s.color.getStyle(),11,1);
  for(let i=0;i<48;i++){ const b=topBlip('#ffd24a',6,1); b.visible=false; gemBlips.push(b); } }
function updateBlips(){ for(const s of ships){ const b=shipBlips[s.id]; if(!b) continue; b.visible=s.alive; if(s.alive){ b.position.copy(s.pos);
    b.scale.setScalar(s===ships[focus]?17:(s.role==='defender'?8:11)); b.material.color.set(s.color.getStyle()); } }
  let gi=0; for(const g of gems){ if(gi>=gemBlips.length) break; const b=gemBlips[gi++]; b.visible=true; b.position.copy(g.pos); }
  for(let i=gi;i<gemBlips.length;i++) gemBlips[i].visible=false; }

function makeGauges(){ const defs=[['THROTTLE',176,'#46d6ff','pos'],['PITCH',128,'#7dffa6','signed'],['YAW',80,'#7dffa6','signed']]; const gx=300,gw=250,gh=14;

// ===== A0: GROUNDED REASONING CHAIN — a 10-link TDRE-style chain-of-thought tracing the pilot's REAL decision =====
// Honest: every line reads real perceptions + the pilot's actual brain.mode/target (no fabrication; hold/abstain when uncertain).
// Structure mirrors the TDRE reasoning engine: parallel hypotheses (rays) → evidence → defeasible prune → verify → commit → predict/learn.
function reasonChain(s){ if(!s) return []; const b=s.brain||{}, sr=s.senseR||CFG.SENSE_R, dsort=(a,c)=>s.pos.distanceTo(a.pos)-s.pos.distanceTo(c.pos);
  const enemies=ships.filter(o=>o.alive&&o.team!==s.team&&s.pos.distanceTo(o.pos)<sr).sort(dsort);
  const allies=ships.filter(o=>o!==s&&o.alive&&o.team===s.team&&s.pos.distanceTo(o.pos)<sr);

  const ch=[];

  ch.push(`② self — hull ${hpPct}% · ${s.credits|0}c · fuel ${(s.fuel||0)|0} · ${WEAPONS[s.weaponType||'energy'].n} W${s.lvl.weapon}.`);
  ch.push(`③ recall — ${s.foeNote?('logged: '+s.foeNote):(s.deaths?('lost hull '+s.deaths+'× here — stay wary.'):'no prior contacts on file.')}`);
  const H=[]; if(near) H.push('ENGAGE '+near.name); if(gm.length) H.push('COLLECT gem'); if(rocks.length) H.push('MINE rock'); if(hpPct<45) H.push('FLEE+regen'); if(s.role==='trader') H.push('TRADE'); if(!H.length) H.push('PATROL');
  ch.push(`④ hypotheses — ${H.length} rays: ${H.join(' · ')}.`);
  const evd=[]; if(near) evd.push(`${near.name}@${nd}u hull${Math.round(100*near.hp/Math.max(1,near.maxHp))}%`); if(gm.length) evd.push(`gem@${Math.round(s.pos.distanceTo(gm[0].pos))}u`); if(rocks.length) evd.push(`rock@${Math.round(s.pos.distanceTo(rocks[0].pos))}u`);

  ch.push(`⑧ commit — <b>${mode}</b>${tname?(' → '+tname):''} — survives prune + verify, highest-value ray.`);
  ch.push(`⑨ act — throttle ${Math.round((c.thr||0)*100)}% · pitch ${Math.round((c.pitch||0)*90)}° · yaw ${Math.round((c.yaw||0)*90)}°.`);

// =================================================================================================
//  TALK TO A SHIP — grounded conversation over a LIVE per-ship vector-triple graph (NEVER fabricates).
//  Every triple is built from the ship's ACTUAL state: identity, status, its decision + a grounded reason,
//  and what it currently perceives (sensor range only). A turn = crush the concepts in your question ->
//  extrapolate multi-hop chains -> answer with the DEEPEST grounded chain, else ABSTAIN. (Port of converse_vec.js.)
// =================================================================================================
function shipKnowledge(s){ const G={T:[],bySubj:{},byObj:{}};
  const add=(a,r,o,p)=>{ if(a==null||o==null) return; const t={s:a,r,o,pillar:p||'status'}; G.T.push(t); (G.bySubj[a]=G.bySubj[a]||[]).push(t); (G.byObj[o]=G.byObj[o]||[]).push(t); };
  const me=s.name, b=s.brain||{}, sr=s.senseR||CFG.SENSE_R, dsort=(a,c)=>s.pos.distanceTo(a.pos)-s.pos.distanceTo(c.pos);
  add(me,'is a', HULLS[s.hullClass||'fighter'].n,'identity');                                   // IDENTITY (real)
  add(me,'serves', s.team==='pirate'?'the Hegemon':'the Coalition','identity');
  if(s.score!=null) add(me,'holds rank', rankOf(s.score||0).n,'identity');
  const hpPct=Math.round(100*s.hp/Math.max(1,s.maxHp));                                          // STATUS (real)
  add(me,'at hull', hpPct+'%','status'); add(me,'carries', (s.credits|0)+' credits','status');
  add(me,'armed with', WEAPONS[s.weaponType||'energy'].n,'status');
  const mode=b.mode||s.mode||'HOLD', tgt=b.target, tname=tgt?(tgt.name||(mode==='MINE'?'an ore rock':mode==='COLLECT'?'a gem':'its target')):null;
  add(me,'intends', mode,'decision'); if(tname && tname!=='its target') add(mode,'aimed at', tname,'decision');          // DECISION (real, from brain; skip the placeholder target)
  const enemies=ships.filter(o=>o.alive&&o.team!==s.team&&s.pos.distanceTo(o.pos)<sr).sort(dsort);
  const allies=ships.filter(o=>o!==s&&o.alive&&o.team===s.team&&s.pos.distanceTo(o.pos)<sr).sort(dsort);
  const gm=gems.filter(g=>!g.artifact&&s.pos.distanceTo(g.pos)<sr).sort(dsort);
  const rk=asteroids.filter(a=>s.pos.distanceTo(a.pos)<sr).sort(dsort);
  const pl=planets.filter(p=>s.pos.distanceTo(p.pos)<sr*1.4).sort(dsort);
  let reason;                                                                                    // GROUNDED reason for the mode
  if(hpPct<45&&enemies[0]) reason='hull is low, surviving comes first';
  else if(enemies[0]&&/HUNT|ENGAGE|ATTACK/.test(mode)) reason=enemies[0].name+' is the nearest threat in range';
  else if(mode==='MINE') reason='ore pays and the sector is calm enough to work';
  else if(mode==='COLLECT') reason='a gem is worth grabbing before a rival gets it';
  else if(/FLEE|EVADE/.test(mode)) reason='under pressure, breaking off to regen';

  if(allies[0]){ const al=allies[0]; add(me,'sees', al.name,'ally'); add(al.name,'is','a wingman','ally'); add(al.name,'at range', Math.round(s.pos.distanceTo(al.pos))+'u','ally'); }
  if(gm[0]){ add(me,'sees','a gem','resource'); add('a gem','worth', (gm[0].credits|0)+' credits','resource'); add('a gem','at range', Math.round(s.pos.distanceTo(gm[0].pos))+'u','resource'); }
  if(rk[0]){ add(me,'sees','an ore rock','resource'); add('an ore rock','at range', Math.round(s.pos.distanceTo(rk[0].pos))+'u','resource'); }
  if(pl[0]){ const p=pl[0]; add(me,'near', p.name,'economy'); add(p.name,'is','a port','economy');
    let ck=null,cp=1e9; GOODS.forEach(g=>{ const pr=priceOf(p,g.k); if(pr<cp){cp=pr;ck=g;} }); if(ck) add(p.name,'sells cheap', ck.n+' at '+Math.round(cp)+'c','economy'); }
  return {G, ctx:{me,enemies,allies,gm,rk,pl,mode,tname,hpPct}}; }
// map a question to the pillar(s) it is really about (most-wanted first); [] = no strong intent -> deepest/most-diverse.
function tIntent(text){ const t=' '+text.toLowerCase().replace(/[^a-z0-9 ]/g,' ')+' ', has=(...ws)=>ws.some(w=>t.indexOf(' '+w+' ')>=0), P=[], add=(...ps)=>{ for(const p of ps) if(!P.includes(p)) P.push(p); };

  if(has('danger','dangerous','threat','threats','hostile','hostiles','safe','risky','trouble','enemy','enemies','attack','attacking','fight','fighting','pirate','pirates','shoot','kill')) add('threat');
  if(has('doing','why','plan','plans','intent','intend','mission','task','objective','goal','strategy','orders','purpose','engaging')) add('decision');
  if(has('hull','health','hp','damage','damaged','hurt','wounded','shield','armor','armour','condition','ok','alive')) add('status');
  if(has('money','credits','credit','rich','cargo','wealth','cash','weapon','weapons','gun','guns','armed','arms','loadout','firepower','missile','laser','cannon')) add('status');
  if(has('ally','allies','friend','friends','friendlies','friendly','wingman','wingmen','buddies','squad','squadmate','help')) add('ally');
  if(has('gem','gems','loot','food','crystal','rock','rocks','ore','mine','mining','asteroid','asteroids','resource')) add('resource');
  if(has('rank','ranks','promotion','promoted','veteran','ace','legend','commander','recruit','ranger','rating')) add('identity','meta');
  if(has('contract','contracts','job','jobs','missions','bounty','work')) add('meta','economy');

  if(has('planet','planets','port','dock','where','station','market','price','prices','sell','buy','trade','trading','nearest','profit','commodity','goods')) add('economy');

  if(has('backstory','history','origin','lore','background','bio','past','who','yourself','fight')) add('lore');

function tCrush(c,G){ return [...(G.bySubj[c]||[]), ...(G.byObj[c]||[])]; }
function tChains(c,depth,G,seen,path){ seen=seen||new Set([c]); path=path||[]; const out=[];
  for(const t of (G.bySubj[c]||[])){ const step={s:t.s,r:t.r,o:t.o,pillar:t.pillar}, np=[...path,step];
    out.push(np); if(depth>1 && !seen.has(t.o)){ const s2=new Set(seen); s2.add(t.o); for(const ch of tChains(t.o,depth-1,G,s2,np)) out.push(ch); } }
  return out; }
function gAdd(G,a,r,o,p){ if(a==null||o==null) return; if(G.T.some(t=>t.s===a&&t.r===r&&t.o===o)) return;   // append a triple (dedup)
  const t={s:a,r,o,pillar:p||'meta'}; G.T.push(t); (G.bySubj[a]=G.bySubj[a]||[]).push(t); (G.byObj[o]=G.byObj[o]||[]).push(t); }
// LAZY WORLD-LOAD ("the crusher"): for every noun/topic the statement mentions, pull everything GROUNDED about it from
// live game data into the graph, so the crush can find + speak it. Only real state -> still 0-fab. Perception stays
// honest: another ship's live hull/range is added only if within THIS pilot's sensor range, else "beyond my sensors".
function lazyWorld(question, focus, G){ const q=' '+String(question||'').toLowerCase().replace(/[^a-z0-9· \-]/g,' ').replace(/\s+/g,' ')+' ';
  const qt=q.trim().split(/\s+/), has=(...w)=>w.some(x=>qt.includes(x)), me=focus.name, sr=focus.senseR||CFG.SENSE_R, inRange=e=>focus.pos.distanceTo(e.pos)<sr;
  for(const o of ships){ if(!o.alive||o===focus) continue; const nm=o.name.toLowerCase(), seg=nm.split('·').pop();                 // NAMED SHIPS (token-exact, so "Halc" ⊄ "Halcyon")
    if(qt.includes(nm) || (seg&&seg.length>2&&qt.includes(seg))){ const foe=o.team!==focus.team;
      gAdd(G,o.name,'flies for', o.team==='pirate'?'the Hegemon':'the Coalition','faction');
      if(inRange(o)||o.role==='player'){ gAdd(G,me,'sees',o.name, foe?'threat':'ally'); gAdd(G,o.name,'is', foe?'a threat':'a wingman', foe?'threat':'ally');
        gAdd(G,o.name,'at range',Math.round(focus.pos.distanceTo(o.pos))+'u', foe?'threat':'ally'); gAdd(G,o.name,'at hull',Math.round(100*o.hp/Math.max(1,o.maxHp))+'%', foe?'threat':'ally'); }
      else gAdd(G,o.name,'is','beyond my sensors','faction'); } }
  for(const p of planets){ if(q.indexOf(' '+p.name.toLowerCase())<0) continue;                                                    // NAMED PLANETS
    gAdd(G,me,'near',p.name,'economy'); gAdd(G,p.name,'is','a '+p.type.t+' world','economy'); if(p.system) gAdd(G,p.name,'lies in',p.system.name,'economy'); gAdd(G,p.name,'worth',Math.round(p.wealth)+'c','economy');
    let ck=null,cp=1e9,dk=null,dp=-1; GOODS.forEach(g=>{const pr=priceOf(p,g.k); if(pr<cp){cp=pr;ck=g;} if(pr>dp){dp=pr;dk=g;}}); if(ck) gAdd(G,p.name,'sells cheap',ck.n+' at '+Math.round(cp)+'c','economy'); if(dk) gAdd(G,p.name,'pays most for',dk.n+' at '+Math.round(dp)+'c','economy');
    if(p.underThreat) gAdd(G,p.name,'is','under Hegemon threat','war'); if(p.rep!=null) gAdd(G,p.name,'standing',(p.rep>0?'+':'')+Math.round(p.rep),'faction'); }
  if(has('war','hegemon','front','escalation','invasion','campaign','battle','offensive','stronghold')){ const T=HEG_TIERS[hegTier()], cc=systems.filter(sy=>sy.contested).length;   // WAR
    gAdd(G,'the Hegemon','at escalation',Math.floor(escalation)+'','war'); gAdd(G,'the Hegemon','fields',T.n+'-class ships','war');
    gAdd(G,'the front','favors', (warScore>=0?'the Coalition':'the Hegemon')+' by '+Math.abs(warScore).toFixed(1)+' of '+CFG.WIN_THRESHOLD,'war');
    gAdd(G,'the war','has', cc+' of '+systems.length+' systems contested','war'); if(typeof stronghold!=='undefined'&&stronghold) gAdd(G,'the Hegemon','holds a stronghold in',stronghold.system?stronghold.system.name:'the front','war'); }
  if(has('rank','ranks','promotion','promoted','veteran','ace','legend','commander','recruit','ranger','rating')){ const i=rankIdx(focus.score||0), nx=RANKS[i+1];   // RANK
    gAdd(G,me,'holds rank',RANKS[i].n,'identity'); if(nx) gAdd(G,RANKS[i].n,'advances to',nx.n+' at '+nx.pts+' score','meta'); }
  if(has('weapon','weapons','gun','guns','loadout','missile','laser','cannon','armed','arms','firepower')){ const W=WEAPONS[focus.weaponType||'energy'];   // WEAPON
    gAdd(G,me,'armed with',W.n,'status'); gAdd(G,W.n,'deals',W.dmg+' damage'+(W.homing?', homing':'')+(W.splash?', splash':''),'status'); }
  if(has('contract','contracts','job','jobs','mission','missions','bounty','work')){ const act=contracts.filter(c=>c.accepted);   // CONTRACTS
    if(act.length) act.slice(0,2).forEach(c=>gAdd(G,'a contract','wants',c.desc+' for '+c.reward+'c','meta')); else if(contracts.length) gAdd(G,'the job board','offers',contracts.length+' open contracts','meta'); }
  if(has('market','price','prices','trade','trading','buy','sell','selling','profit','cargo','commodity','goods','ore','gas','crystal','alloy')){ const p=nearestPlanet(focus.pos);   // MARKET (no planet named)
    if(p){ let ck=null,cp=1e9; GOODS.forEach(g=>{const pr=priceOf(p,g.k); if(pr<cp){cp=pr;ck=g;}}); gAdd(G,me,'near',p.name,'economy'); if(ck) gAdd(G,p.name,'sells cheap',ck.n+' at '+Math.round(cp)+'c','economy'); } }
}
// BROAD CRUSH: match EVERY content noun in the statement against the graph (name / substring / name-token), then add
// intent seeds for pronoun/topic words that don't literally name a node. This is the "crush everything useful" behaviour.
function tConcepts(text,G,ctx){ const toks=(' '+text.toLowerCase()+' ').replace(/[^a-z0-9· \-]/g,' ').split(/\s+/).filter(Boolean), found=new Set();
  const nodes=[...new Set(Object.keys(G.bySubj).concat(Object.keys(G.byObj)))];
  const STOP=new Set(['you','the','are','and','what','how','why','who','was','has','its','for','can','did','does','your','with','this','that','they','them','out','get','got','any','all','about','think','tell','have','some','near','here','there','nearby','around','close','doing','right','now','anything','something','going','over','into','from','are','were']);
  for(const n of nodes){ const ln=n.toLowerCase(), nt=ln.split(/[ ·\-]+/).filter(Boolean);
    if(toks.some(w=> !STOP.has(w) && (ln===w || nt.includes(w) || (w.length>3&&ln.indexOf(w)>=0) || (w.length>3&&nt.some(x=>x.length>3&&(x.indexOf(w)>=0||w.indexOf(x)>=0)))))) found.add(n); }
  const intent=tIntent(text), me=ctx.me;

  if(intent.includes('identity')||intent.includes('status')) found.add(me);
  if(intent.includes('threat')&&ctx.enemies[0]) found.add(ctx.enemies[0].name);
  if(intent.includes('ally')&&ctx.allies[0]) found.add(ctx.allies[0].name);
  if(intent.includes('resource')){ if(ctx.gm[0]) found.add('a gem'); if(ctx.rk[0]) found.add('an ore rock'); }
  if(intent.includes('economy')&&ctx.pl[0]) found.add(ctx.pl[0].name);
  if(intent.some(p=>['threat','ally','resource','economy','war','faction','meta'].includes(p))) found.add(me);   // seed ME so "sees/near" edges chain
  for(const p of intent){ if(['identity','status','decision'].includes(p)) continue; for(const t of G.T) if(t.pillar===p) found.add(t.s); }   // topic intent (war/faction/…) -> crush its whole subgraph
  return [...found]; }
function tVerbalize(chain){ if(!chain.length) return null; let s=chain[0].s; for(const st of chain) s+=` —${st.r}→ ${st.o}`; return s; }

// ---- STRUCTURAL RENDERER (AGI-honest, de-muppeted). Print the VERIFIED / GIVEN triples VERBATIM — no hand-authored
// per-relation prose, no word-swaps. The old fluent templates (MODE_VERB/headClause/tailFrag/fluentFacts) were a
// MUPPET (I hand-wrote the language, the agent learned nothing) — removed per AGI_CHAT_AUDIT.md. Fluent English, if ever
// wanted, must be a LEARNED renderer (bench + model behind a round-trip guard), never authored. Commas are generic glue.
function renderChain(chain){ if(!chain||!chain.length) return null; let s=String(chain[0].s); for(const st of chain) s+=` ${st.r} ${st.o}`; return s+'.'; }
function renderFacts(subj, facts){ if(!facts||!facts.length) return null; return `${subj}: `+facts.map(t=>`${t.r} ${t.o}`).join(', ')+'.'; }

// ===================== STORY CRUSH + faction DISPOSITION MEMORY (game feature, LABELED) =====================
// Crush a short story into GROUNDED triples: facts = the story's OWN sentences, keyed by whoever they mention — a ship
// can only cite text that is actually there (else it abstains). Each ship carries a DISPOSITION: a GIVEN faction-stance
// prior stored as MEMORY and nudged by what the crushed story shows (harm vs aid). Facts are grounded (📖 story); stance
// is a labeled memory (🧭 stance · memory), never a fabricated fact. Same crush/abstain discipline as talkToShip.
const STORY_FACTIONS={ coalition:{n:'the Coalition', alias:['coalition','warden','wardens']},
  synod:{n:'the Iron Synod', alias:['synod','iron synod','hegemon']},
  traders:{n:'the Free Traders', alias:['trader','traders','free trader','free traders','guild']} };
const DISPOS_PRIOR={ coalition:{coalition:0.6,synod:-0.9,traders:0.2}, synod:{coalition:-0.9,synod:0.5,traders:-0.3}, traders:{coalition:0.2,synod:-0.3,traders:0.5} };
const HARM_WORDS=['burn','burned','tithe','tithed','took','kill','killed','raid','raided','starve','starved','conquer','enforce','crush','siege'];
const AID_WORDS=['found','save','saved','swore','medicine','hold','held','shield','rescue','protect','protected','heal','freed','free'];
const SAMPLE_STORY="In the ruins of Halcyon Station, the Coalition Warden Vale found a child hiding in a cargo bay. The Iron Synod had tithed the colony and burned what it could not take. Warlord Kaine of the Iron Synod ordered the lane put to the torch. A Free Trader convoy under Mercer slipped past the blockade with medicine, asking no side for permission. Vale swore to hold the lane open. Kaine called that mercy a weakness. The Iron Synod raided the outer relays and tithed three more colonies. Vale rallied the Coalition and freed the miners Kaine had taken. Mercer sold fuel to both sides and slipped the blockade again. The Coalition sheltered the refugees Kaine had starved. Kaine swore to break Vale at Halcyon. The Coalition and the Free Traders held the lane together while the Iron Synod burned what it could not hold. Vale spared a Synod pilot who surrendered. Kaine executed his own captain for retreating. Mercer warned Vale of the coming fleet, though the Traders cared only that someone paid.";
let STORY={ text:'', G:{T:[],bySubj:{},byObj:{}}, ents:[], rep:{coalition:0,synod:0,traders:0}, _v:0 };
function facOf(text){ const t=' '+String(text).toLowerCase()+' '; for(const k in STORY_FACTIONS) if(STORY_FACTIONS[k].alias.some(a=>t.indexOf(' '+a)>=0)) return k; return null; }
function factionName(k){ return STORY_FACTIONS[k]?STORY_FACTIONS[k].n:k; }
function shipFaction(s){ return s.team==='pirate'?'synod':'coalition'; }
function dispForFaction(fk){ const base=DISPOS_PRIOR[fk]||{}, d={}; for(const f in DISPOS_PRIOR) d[f]=Math.max(-1,Math.min(1,(base[f]||0)+(STORY.rep[f]||0)*0.5)); return d; }   // faction-level: GIVEN prior + story-nudged
// GENETIC seed: a new ship inherits its disposition from living same-faction "parents" (blend) + faction prior + mutation.
function seedGeneticDisp(s){ const fk=shipFaction(s), prior=DISPOS_PRIOR[fk]||{}, d={};
  const parents=ships.filter(o=>o!==s&&o.alive&&o._gdisp&&shipFaction(o)===fk).slice(0,2);
  const mut=(typeof rand==='function')?()=>rand(-1,1):()=>Math.random()*2-1;
  for(const f in DISPOS_PRIOR){ const inh=parents.length?parents.reduce((a,o)=>a+(o._gdisp[f]||0),0)/parents.length:(prior[f]||0);
